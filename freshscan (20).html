<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FreshScan</title>
<style>
  :root{
    --green:#1b7a3d; --green-d:#155c2e; --red:#d0413a; --yellow:#e0a526;
    --bg:#f4f6f5; --card:#ffffff; --text:#1c2620; --muted:#6b7a72; --border:#e1e6e3;
    --accent:#1b7a3d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:24px;
    -webkit-user-select:none; user-select:none;
  }
  input, textarea{ -webkit-user-select:text; user-select:text; }

  /* ---- Top brand bar (minimal, white-label-ready) ---- */
  header{
    background:var(--accent); color:#fff; padding:14px 16px;
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
  }
  header .brand{display:flex; align-items:center; gap:10px;}
  header .logo{
    width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  header h1{font-size:18px; margin:0; font-weight:800; letter-spacing:-.01em;}
  header .customer{font-size:11px; opacity:.85; margin-top:1px;}
  #menuBtn{
    background:rgba(255,255,255,.15); border:none; border-radius:10px; font-size:20px;
    padding:6px 12px; width:auto; color:#fff; cursor:pointer;
  }
  .save-indicator{
    position:fixed; top:64px; right:14px; font-size:12px; font-weight:700;
    background:#fff; color:var(--green-d); padding:5px 12px; border-radius:999px;
    box-shadow:0 2px 8px rgba(0,0,0,.12); z-index:60; opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  .save-indicator.show{opacity:1;}

  .container{padding:16px; max-width:520px; margin:0 auto;}

  /* ---- Cards & generic building blocks ---- */
  .card{
    background:var(--card); border-radius:16px; padding:18px; margin-bottom:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid var(--border);
  }
  .card h2{margin:0 0 10px; font-size:17px; font-weight:700;}
  .card h3{margin:14px 0 8px; font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;}
  .row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row .name{font-weight:600; font-size:16px;}
  .row .sub{font-size:12px; color:var(--muted);}
  .small-muted{font-size:12px; color:var(--muted);}
  .empty{color:var(--muted); font-size:14px; text-align:center; padding:30px 0;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:6px 4px; border-bottom:1px solid var(--border);}
  th{color:var(--muted); font-weight:600; font-size:12px;}

  /* ---- Inputs: large, one-hand friendly ---- */
  input[type=number]{
    width:120px; font-size:30px; text-align:center; padding:14px 4px; border-radius:14px;
    border:2px solid var(--border); background:#f9faf9; font-weight:800; color:var(--green-d);
  }
  input[type=number]:focus{border-color:var(--green); outline:none;}
  input[type=text], input[type=password], input[type=time], input[type=file]{
    width:100%; font-size:16px; padding:13px; border-radius:12px; border:1px solid var(--border);
    background:#f9faf9; margin-bottom:10px;
  }
  select{
    width:100%; font-size:16px; padding:13px; border-radius:12px; border:1px solid var(--border);
    background:#f9faf9; margin-bottom:10px;
  }
  label{font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:5px;}
  textarea{
    width:100%; font-size:16px; padding:13px; border-radius:12px; border:1px solid var(--border);
    background:#f9faf9; margin-bottom:10px; font-family:inherit; resize:vertical; min-height:70px;
  }

  /* ---- Buttons: big, thumb-friendly ---- */
  button{
    border:none; border-radius:14px; padding:18px; font-size:17px; font-weight:700;
    cursor:pointer; width:100%;
  }
  .btn-primary{background:var(--green); color:#fff;}
  .btn-primary:active{background:var(--green-d);}
  .btn-secondary{background:#eef2ef; color:var(--text); margin-top:10px;}
  .btn-toggle{padding:10px 16px; border-radius:999px; font-size:13px; width:auto;}
  .active-toggle{background:var(--green); color:#fff;}
  .inactive-toggle{background:#eef2ef; color:var(--muted);}

  /* ---- Forside: 3 big tiles ---- */
  .home-tiles{display:flex; flex-direction:column; gap:14px; margin-top:6px;}
  .home-tile{
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:26px 20px; display:flex; align-items:center; gap:18px;
    box-shadow:0 1px 3px rgba(0,0,0,.06); cursor:pointer; text-align:left;
  }
  .home-tile:active{background:#f3f6f4;}
  .home-tile .ico{font-size:34px; flex-shrink:0;}
  .home-tile .label{font-size:19px; font-weight:800;}
  .home-tile .desc{font-size:13px; color:var(--muted); margin-top:2px;}
  .home-tile.primary{background:var(--green); border-color:var(--green);}
  .home-tile.primary .label, .home-tile.primary .desc{color:#fff;}
  .home-tile.primary .desc{opacity:.85;}

  .suggestion-banner{
    margin-top:16px; background:#fff8e8; border:1px solid #f0d896; border-radius:14px;
    padding:14px 16px; font-size:15px; font-weight:600; color:#7a5b14;
    display:flex; align-items:center; gap:10px;
  }
  .suggestion-banner .ico{font-size:22px;}

  /* ---- Registration flow ---- */
  .progress-dots{display:flex; justify-content:center; gap:6px; margin-bottom:16px;}
  .progress-dots span{width:8px; height:8px; border-radius:50%; background:var(--border);}
  .progress-dots span.done{background:var(--green);}
  .progress-dots span.current{background:var(--green); width:20px; border-radius:4px;}

  .camera-tile{
    width:100%; aspect-ratio:4/3; border-radius:18px; background:#eef2ef;
    border:2px dashed var(--border); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:8px; cursor:pointer; margin-bottom:14px;
    overflow:hidden; position:relative;
  }
  .camera-tile img{width:100%; height:100%; object-fit:cover;}
  .camera-tile .ico{font-size:46px;}
  .camera-tile .lbl{font-size:15px; font-weight:700; color:var(--muted);}
  .camera-tile .retake{
    position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,.6); color:#fff;
    font-size:12px; padding:6px 12px; border-radius:999px; width:auto;
  }

  .stepper{display:flex; align-items:center; justify-content:center; gap:18px; margin:14px 0;}
  .stepper button{
    width:64px; height:64px; border-radius:50%; font-size:30px; font-weight:800;
    background:#eef2ef; color:var(--text); flex-shrink:0;
  }
  .stepper .val{font-size:44px; font-weight:800; min-width:90px; text-align:center; color:var(--green-d);}

  /* ---- Menu sheet ---- */
  .sheet-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:300;
  }
  .sheet{
    background:#fff; max-width:480px; margin:0 auto; border-radius:18px 18px 0 0;
    padding:20px; position:absolute; bottom:0; left:0; right:0;
    max-height:85vh; overflow-y:auto;
  }
  .sheet-handle{width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px;}
  .sheet h2{margin:0 0 14px;}
  .menu-item{
    display:flex; align-items:center; gap:14px; padding:16px 4px; border-bottom:1px solid var(--border);
    font-size:16px; font-weight:600; cursor:pointer;
  }
  .menu-item:last-child{border-bottom:none;}
  .menu-item .ico{font-size:22px; width:28px; text-align:center;}

  /* ---- Admin ---- */
  .admin-badge{
    display:inline-block; background:#eef2ef; color:var(--muted); font-size:11px;
    font-weight:700; padding:3px 10px; border-radius:999px; margin-bottom:10px;
  }

  .pin-pad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:18px auto 0;}
  .pin-pad button{
    aspect-ratio:1; border-radius:50%; font-size:24px; font-weight:700;
    background:#eef2ef; color:var(--text);
  }
  .pin-dots{display:flex; justify-content:center; gap:12px; margin:20px 0;}
  .pin-dots span{width:14px; height:14px; border-radius:50%; background:var(--border);}
  .pin-dots span.filled{background:var(--green);}

  .back-row{display:flex; align-items:center; gap:10px; margin-bottom:14px; cursor:pointer;}
  .back-row .ico{font-size:20px;}
  .back-row .lbl{font-size:15px; font-weight:700; color:var(--muted);}

  .tag-grid{display:flex; flex-wrap:wrap; gap:8px;}
  .tag-chip{
    padding:9px 15px; border-radius:999px; font-size:13px; font-weight:600;
    background:#eef2ef; color:var(--muted); cursor:pointer; width:auto;
  }
  .tag-chip.active{background:#fdf6e3; color:#8a6213; border:1px solid #e0a526;}
  .badge{font-size:11px; padding:2px 8px; border-radius:999px; font-weight:700;}

  /* ---- Admin sub-page support classes (Dashboard/Historik/Mønstre) ---- */
  .topcards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .topcard{background:var(--card); border-radius:14px; padding:14px; border:1px solid var(--border); text-align:center;}
  .topcard .num{font-size:26px; font-weight:800; color:var(--green-d);}
  .topcard .lbl{font-size:12px; color:var(--muted); margin-top:2px;}
  .suggestion{font-size:14px; padding:10px; border-radius:10px; margin-top:6px; background:#f9faf9;}
  .suggestion.red{background:#fbeceb; color:#9c3a35;}
  .suggestion.yellow{background:#fdf6e3; color:#8a6213;}
  .step-pill{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;}
  .step-pill span{background:#eef2ef; border-radius:999px; padding:4px 10px; font-size:12px; color:var(--muted); font-weight:600;}
  .step-pill span.done{background:var(--green); color:#fff;}
  .date-row{display:flex; align-items:center; gap:8px; cursor:pointer; margin-bottom:10px;}
  .date-row .date-text{font-size:14px; font-weight:600;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo" id="brandLogo">🍞</div>
    <div>
      <h1 id="brandName">FreshScan</h1>
      <div class="customer" id="brandCustomer">–</div>
    </div>
  </div>
  <button id="menuBtn" aria-label="Menu">☰</button>
</header>

<div class="save-indicator" id="saveIndicator">✅ Gemt</div>

<div class="container" id="app"></div>

<!-- ☰ Hovedmenu -->
<div class="sheet-overlay" id="mainMenuOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Menu</h2>
    <div class="menu-item" id="menuHome"><span class="ico">🏠</span>Forside</div>
    <div class="menu-item" id="menuAdmin"><span class="ico">🔐</span>Administrator</div>
  </div>
</div>

<!-- Vare-vælger sheet -->
<div class="sheet-overlay" id="vareSheetOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Vælg vare</h2>
    <div id="vareSheetList"></div>
  </div>
</div>

<!-- Barcode scanner modal -->
<div id="scanModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
  <div style="color:#fff; font-size:17px; font-weight:700; margin-bottom:14px;">Hold kameraet hen mod stregkoden</div>
  <div style="position:relative; width:min(340px,90vw); aspect-ratio:1;">
    <video id="scanVideo" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover; border-radius:12px;"></video>
    <div style="position:absolute; inset:0; border:3px solid #00e676; border-radius:12px; pointer-events:none;"></div>
    <div id="scanLine" style="position:absolute; left:5%; right:5%; top:50%; height:2px; background:#00e676; opacity:0.8; box-shadow:0 0 8px #00e676;"></div>
  </div>
  <div id="scanStatus" style="color:#aaa; font-size:14px; margin-top:12px;">Søger efter stregkode...</div>
  <button id="scanClose" onclick="FreshScanScanner.stop();" style="margin-top:18px; padding:10px 28px; background:#fff; color:#000; border:none; border-radius:24px; font-size:15px; font-weight:700; width:auto;">Annuller</button>
</div>

<!-- Kamera-optagelse modal (til vare-billede i registrering) -->
<div id="photoModal" style="display:none; position:fixed; inset:0; background:#000; z-index:9998; flex-direction:column; align-items:center; justify-content:center;">
  <video id="photoVideo" autoplay playsinline muted style="width:100%; max-height:80vh; object-fit:cover;"></video>
  <canvas id="photoCanvas" style="display:none;"></canvas>
  <div style="display:flex; gap:20px; margin-top:24px;">
    <button id="photoCancel" style="width:auto; padding:14px 24px; background:#333; color:#fff; border-radius:999px;">Annuller</button>
    <button id="photoCapture" style="width:80px; height:80px; border-radius:50%; background:#fff; border:4px solid #ccc;"></button>
  </div>
</div>

<script>
/* ---------- Helpers ---------- */
const $ = sel => document.querySelector(sel);
const app = $('#app');

const TIMEZONE = 'Europe/Copenhagen';
// Returner dagens dato (YYYY-MM-DD) i dansk tid, uanset enhedens egen tidszone.
function todayISO(){
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: TIMEZONE, year:'numeric', month:'2-digit', day:'2-digit'
  }).format(new Date());
}
const DAY_NAMES = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
const MONTH_NAMES = ["januar","februar","marts","april","maj","juni","juli","august","september","oktober","november","december"];
// Al datoaritmetik foregår på kalenderdatoer (YYYY-MM-DD) via UTC-baserede
// Date-objekter, så vi aldrig påvirkes af enhedens lokale tidszone eller sommertid.
function isoToUTCDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(Date.UTC(y, m-1, d));
}
function utcDateToISO(d){ return d.toISOString().slice(0,10); }
function fmtDateDK(iso){
  const d = isoToUTCDate(iso);
  return DAY_NAMES[d.getUTCDay()] + " " + d.getUTCDate() + ". " + MONTH_NAMES[d.getUTCMonth()];
}
function weekdayName(iso){
  return DAY_NAMES[isoToUTCDate(iso).getUTCDay()];
}
function isoDaysAgo(n){
  const d = isoToUTCDate(todayISO());
  d.setUTCDate(d.getUTCDate()-n);
  return utcDateToISO(d);
}
function avg(arr){ if(!arr.length) return 0; return arr.reduce((a,b)=>a+b,0)/arr.length; }
function round1(n){ return Math.round(n*10)/10; }

/* ---------- Storage ---------- */
const memStore = {};
function storageGet(key){
  try{
    const v = localStorage.getItem('freshscan_'+key);
    return v===null ? undefined : v;
  }catch(e){
    return memStore[key];
  }
}
function storageSet(key, val){
  try{
    localStorage.setItem('freshscan_'+key, val);
  }catch(e){
    memStore[key] = val;
  }
}

// Returnerer altid en streng, uanset om "error" er et Error/DOMException-objekt,
// en streng, eller noget helt andet. Bruges i ALLE catch-blokke, så vi aldrig
// gemmer eller logger rå Error-/Response-/AbortController-objekter, som kan
// udløse "DataCloneError: The object can not be cloned" i Safari/iPad.
function errMsg(error){
  try{
    if(error == null) return 'Ukendt fejl';
    if(typeof error === 'string') return error;
    if(error.message) return String(error.message);
    return String(error);
  }catch(e){ return 'Ukendt fejl'; }
}
// Konverterer en værdi til en JSON-sikker struktur, der kun indeholder
// strings, numbers, booleans, null, arrays og almindelige {}-objekter.
// Funktioner, Error-/DOMException-/Response-/AbortController-objekter, Dates,
// osv. konverteres til tekst (eller fjernes), så JSON.stringify/localStorage
// aldrig kan ramme et ikke-serialiserbart objekt (root cause for DataCloneError).
function safePlainObject(obj, seen){
  seen = seen || new Set();
  if(obj === null || obj === undefined) return null;
  const t = typeof obj;
  if(t === 'string' || t === 'number' || t === 'boolean') return obj;
  if(t === 'function') return undefined;
  if(t !== 'object'){
    try{ return String(obj); }catch(e){ return null; }
  }
  if(Array.isArray(obj)){
    return obj.map(item => safePlainObject(item, seen));
  }
  if(obj instanceof Error){
    return errMsg(obj);
  }
  if(seen.has(obj)) return null; // bryd cirkulære referencer
  seen.add(obj);
  const proto = Object.getPrototypeOf(obj);
  if(proto !== Object.prototype && proto !== null){
    // Ikke et "almindeligt" objekt (Date, DOMException, Response, AbortController, ...)
    try{ return String(obj); }catch(e){ return null; }
  }
  const out = {};
  for(const key of Object.keys(obj)){
    const val = safePlainObject(obj[key], seen);
    if(val !== undefined) out[key] = val;
  }
  return out;
}
function safeStringify(obj){
  try{ return JSON.stringify(safePlainObject(obj)); }
  catch(e){ return 'null'; }
}

let VARER = [];       // master data
let REGS = {};        // date -> { varEan: {modtaget, kl13, luk, status} }
const DEFAULT_MALEPUNKTER = [
  {id:'modtaget', label:'Morgen',  emoji:'🌅', timeStr:'07:00', aktiv:true, isModtaget:true, isLuk:false},
  {id:'kl13',    label:'Kl. 13',  emoji:'☀️', timeStr:'13:00', aktiv:true, isModtaget:false, isLuk:false},
  {id:'luk',     label:'Luk',     emoji:'🌙', timeStr:'18:00', aktiv:true, isModtaget:false, isLuk:true},
];
const DEFAULT_SETTINGS = {
  butiksnavn:'Føtex Ebeltoft', by:'Ebeltoft', postnr:'8400', land:'Danmark',
  lat:null, lon:null, turistMonths:[6,7,8],
  malepunkter: DEFAULT_MALEPUNKTER,
  primaertMalepunkt:'kl13',
  // White-label / kundeprofil (samme struktur som ReolScan, SafetyScan m.fl.)
  kundeNavn:'Føtex Ebeltoft', logo:'🍞', accentColor:'#1b7a3d',
  afdeling:'Bager', ansvarlig:''
};
let SETTINGS = {...DEFAULT_SETTINGS, malepunkter: DEFAULT_MALEPUNKTER.map(m=>({...m})) };
let EVENTS = [];       // lokale arrangementer: {id, navn, start, slut, impact, kommentar}

/* ---------- DATABASE-VERSION & MIGRATION ----------
   Hver gang datamodellen ændres, bumpes CURRENT_DB_VERSION og der tilføjes
   et nyt trin i MIGRATIONS. Migrationer er additive: de opretter manglende
   felter med fornuftige standardværdier, men sletter eller nulstiller ALDRIG
   eksisterende værdier. localStorage ryddes aldrig som led i en opdatering. */
const CURRENT_DB_VERSION = 2;
const MIGRATIONS = {
  // v1 → v2: kl13-feltet flyttes til det fleksible målepunkt-system (mp_kl13).
  // Det gamle kl13-felt bevares uændret ved siden af, så intet historisk tal går tabt.
  2: function(){
    let changed = false;
    Object.keys(REGS).forEach(date=>{
      const dayRegs = REGS[date];
      if(!dayRegs || typeof dayRegs !== 'object') return;
      Object.keys(dayRegs).forEach(ean=>{
        if(ean.startsWith('_')) return; // _weather m.fl.
        const r = dayRegs[ean];
        if(!r || typeof r !== 'object') return;
        if(r.kl13!=null && r['mp_kl13']==null){
          r['mp_kl13'] = r.kl13;
          changed = true;
        }
      });
    });
    return changed;
  }
};
async function runMigrations(){
  let fromVersion = parseInt(storageGet('dbversion') || '1', 10);
  if(isNaN(fromVersion) || fromVersion < 1) fromVersion = 1;
  let anyChange = false;
  for(let v = fromVersion+1; v <= CURRENT_DB_VERSION; v++){
    if(typeof MIGRATIONS[v] === 'function'){
      try{
        const changed = MIGRATIONS[v]();
        if(changed) anyChange = true;
      }catch(e){ console.error('Migration til v'+v+' fejlede:', errMsg(e)); }
    }
  }
  if(anyChange) await saveRegs();
  storageSet('dbversion', String(CURRENT_DB_VERSION));
}

async function loadAll(){
  let varerKeyExisted = false;
  try{
    const v = storageGet('varer');
    varerKeyExisted = (v !== undefined && v !== null);
    VARER = v ? JSON.parse(v) : [];
  }catch(e){ console.error('loadAll varer error:', errMsg(e)); VARER = []; }
  try{
    const r = storageGet('registreringer');
    REGS = r ? JSON.parse(r) : {};
  }catch(e){ console.error('loadAll regs error:', errMsg(e)); REGS = {}; }
  if(!Array.isArray(VARER)) VARER = [];
  if(!REGS || typeof REGS !== 'object') REGS = {};

  await runMigrations();

  try{
    const s = storageGet('settings');
    if(s){
      SETTINGS = Object.assign({...DEFAULT_SETTINGS, malepunkter: DEFAULT_MALEPUNKTER.map(m=>({...m}))}, JSON.parse(s));
      if(!Array.isArray(SETTINGS.turistMonths) || SETTINGS.turistMonths.length===0) SETTINGS.turistMonths=[6,7,8];
      if(!Array.isArray(SETTINGS.malepunkter) || SETTINGS.malepunkter.length===0){
        SETTINGS.malepunkter = DEFAULT_MALEPUNKTER.map(m=>({...m}));
      }
      if(!SETTINGS.primaertMalepunkt) SETTINGS.primaertMalepunkt = 'kl13';
    } else {
      SETTINGS = {...DEFAULT_SETTINGS, malepunkter: DEFAULT_MALEPUNKTER.map(m=>({...m}))};
      await saveSettings();
    }
  }catch(e){ console.error('loadAll settings error:', errMsg(e)); }
  try{
    const ev = storageGet('events');
    EVENTS = ev ? JSON.parse(ev) : [];
  }catch(e){ console.error('loadAll events error:', errMsg(e)); EVENTS = []; }
  if(!Array.isArray(EVENTS)) EVENTS = [];
  try{

const FreshScanCamera = (function(){
  let stream = null;
  let onCaptured = null;

  function getEls(){
    return {
      modal: document.getElementById('photoModal'),
      video: document.getElementById('photoVideo'),
      canvas: document.getElementById('photoCanvas')
    };
  }

  async function stop(){
    if(stream){ try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){} stream=null; }
    const {modal, video} = getEls();
    if(video){ try{ video.pause(); }catch(e){} video.srcObject=null; }
    if(modal) modal.style.display='none';
  }

  async function start(callback){
    onCaptured = callback;
    const {modal, video} = getEls();
    if(!modal || !video || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      alert('Kamera ikke tilgængeligt på denne enhed.');
      return;
    }
    modal.style.display = 'flex';
    try{
      stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:960}}});
      video.srcObject = stream;
      await video.play();
    }catch(e){
      alert('Kunne ikke åbne kamera: '+errMsg(e));
      stop();
    }
  }

  function capture(){
    const {video, canvas} = getEls();
    if(!video || !canvas) return null;
    canvas.width = video.videoWidth || 800;
    canvas.height = video.videoHeight || 600;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    let dataUrl;
    try{ dataUrl = canvas.toDataURL('image/jpeg', 0.6); }catch(e){ dataUrl = null; }
    stop();
    if(onCaptured) onCaptured(dataUrl);
    return dataUrl;
  }

  return {start, stop, capture};
})();

/* ---------- AUTOMATISK HANDELSKALENDER ---------- */
function easterSunday(year){
  // Anonymous Gregorian algorithm
  const a=year%19, b=Math.floor(year/100), c=year%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4), k=c%4;
  const l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  return new Date(Date.UTC(year, month-1, day));
}
function addDays(date, n){
  const d = new Date(date); d.setUTCDate(d.getUTCDate()+n); return d;
}
function dISO(d){ return d.toISOString().slice(0,10); }

// Cache: year -> {holidays: {iso: label}, ferieRanges: {key:[start,end]}}
const _autoCalCache = {};
function getAutoCalendarYear(year){
  if(_autoCalCache[year]) return _autoCalCache[year];
  const easter = easterSunday(year);
  const holidays = {};
  holidays[dISO(new Date(Date.UTC(year,0,1)))] = 'Nytårsdag';
  holidays[dISO(addDays(easter,-3))] = 'Skærtorsdag';
  holidays[dISO(addDays(easter,-2))] = 'Langfredag';
  holidays[dISO(easter)] = 'Påskedag';
  holidays[dISO(addDays(easter,1))] = '2. påskedag';
  holidays[dISO(addDays(easter,39))] = 'Kristi Himmelfartsdag';
  holidays[dISO(addDays(easter,49))] = 'Pinsedag';
  holidays[dISO(addDays(easter,50))] = '2. pinsedag';
  holidays[dISO(new Date(Date.UTC(year,11,25)))] = 'Juledag';
  holidays[dISO(new Date(Date.UTC(year,11,26)))] = '2. juledag';

  // Ferieperioder (vejledende, danske skoleferier)
  const paaskeferieStart = addDays(easter,-10); // ca. palmesøndag-ugen
  const paaskeferieEnd = addDays(easter,1);
  const ferieRanges = {
    vinterferie: [dISO(new Date(Date.UTC(year,1,10))), dISO(new Date(Date.UTC(year,1,18)))], // uge 7, ca.
    paaskeferie: [dISO(paaskeferieStart), dISO(paaskeferieEnd)],
    sommerferie: [dISO(new Date(Date.UTC(year,5,24))), dISO(new Date(Date.UTC(year,7,9)))], // ca. uge 26-31
    efterarsferie: [dISO(new Date(Date.UTC(year,9,14))), dISO(new Date(Date.UTC(year,9,22)))], // uge 42
    juleferie: [dISO(new Date(Date.UTC(year,11,21))), dISO(new Date(Date.UTC(year+1,0,2)))],
  };
  const result = {holidays, ferieRanges};
  _autoCalCache[year] = result;
  return result;
}
function inRange(iso, range){
  return iso >= range[0] && iso <= range[1];
}
function getAutoTags(date){
  const d = isoToUTCDate(date);
  const year = d.getUTCFullYear();
  const cal = getAutoCalendarYear(year);
  // juleferie may span into next year; also check previous year's juleferie range
  const calPrev = getAutoCalendarYear(year-1);

  const tags = {};
  const reasons = [];

  // Helligdag
  let holidayName = cal.holidays[date];
  if(!holidayName && calPrev.holidays[date]) holidayName = calPrev.holidays[date];
  if(holidayName){
    tags.helligdag = true;
    reasons.push(holidayName);
  }

  // Ferieperioder
  FERIE_KEYS.forEach(key=>{
    if(inRange(date, cal.ferieRanges[key]) || inRange(date, calPrev.ferieRanges[key])){
      tags[key] = true;
      const labels = {vinterferie:'vinterferie', paaskeferie:'påskeferie', sommerferie:'sommerferie', efterarsferie:'efterårsferie', juleferie:'juleferie'};
      reasons.push(labels[key]);
    }
  });

  // Lønweekend: fredag-søndag i de sidste 7 dage af måneden
  const dow = d.getUTCDay(); // 0=søn..6=lør
  const lastDayOfMonth = new Date(Date.UTC(year, d.getUTCMonth()+1, 0)).getUTCDate();
  if((dow===5||dow===6||dow===0) && d.getUTCDate() >= lastDayOfMonth-6){
    tags.lonweekend = true;
    reasons.push('lønweekend');
  }

  // Turistsæson: konfigurerbare måneder (standard juni-august)
  const month = d.getUTCMonth()+1;
  const turistMonths = (SETTINGS.turistMonths && SETTINGS.turistMonths.length) ? SETTINGS.turistMonths : [6,7,8];
  if(turistMonths.includes(month)){
    tags.turistsaeson = true;
    reasons.push('turistsæson');
  }

  return {tags, reasons};
}
function getEffectiveTags(date){
  const auto = getAutoTags(date);
  const manual = getDayTags(date);
  const effective = {};
  const reasons = {auto: [], manual: []};
  const autoActiveKeys = [];
  CAL_TAGS.forEach(t=>{
    const autoVal = !!auto.tags[t.key];
    if(autoVal) autoActiveKeys.push(t.key);
    if(Object.prototype.hasOwnProperty.call(manual, t.key)){
      effective[t.key] = !!manual[t.key];
      if(manual[t.key]) reasons.manual.push(t.label);
    } else {
      effective[t.key] = autoVal;
    }
  });
  if(auto.reasons.length) reasons.autoText = auto.reasons.join(', ');
  return {tags: effective, reasons, autoActiveKeys};
}

/* ---------- LOKALE ARRANGEMENTER ---------- */
const IMPACT_PCT = {lav:0.05, middel:0.10, hoj:0.20};
const IMPACT_LABEL = {lav:'Lav', middel:'Middel', hoj:'Høj'};
function getActiveEvents(date){
  return EVENTS.filter(e=>{
    if(e.aktiv===false) return false;
    if(e.gentagAarligt){
      const md = date.slice(5); // MM-DD
      const startMd = e.start.slice(5), slutMd = e.slut.slice(5);
      if(startMd<=slutMd){
        return md>=startMd && md<=slutMd;
      } else {
        // spænder over årsskifte
        return md>=startMd || md<=slutMd;
      }
    }
    return date>=e.start && date<=e.slut;
  });
}
function eventFactor(date){
  const evs = getActiveEvents(date);
  if(evs.length===0) return null;
  let maxPct=0, maxEv=null;
  evs.forEach(e=>{
    const pct = IMPACT_PCT[e.impact] || 0;
    if(pct>maxPct){ maxPct=pct; maxEv=e; }
  });
  return {pct:maxPct, events:evs, top:maxEv};
}

// Safari/iPad afgiver ofte en generisk "Load failed"-fejl ved det første
// cross-origin fetch (fx efter at appen har ligget i baggrunden, eller pga.
// aggressiv caching). Vi undgår caching, undgår at sende referrer/credentials
// cross-origin (som kan udløse ekstra CORS-tjek i Safari), sætter en timeout
// så et hængende kald ikke blokerer appen, og prøver en gang til ved fejl.
async function fetchJSON(url, timeoutMs){
  timeoutMs = timeoutMs || 8000;
  let lastErr;
  for(let attempt=1; attempt<=2; attempt++){
    const controller = new AbortController();
    const timer = setTimeout(()=>controller.abort(), timeoutMs);
    try{
      const res = await fetch(url, {
        method:'GET',
        cache:'no-store',
        mode:'cors',
        credentials:'omit',
        referrerPolicy:'no-referrer',
        signal: controller.signal
      });
      clearTimeout(timer);
      WEATHER_DEBUG.httpStatus = res.status;
      const text = await res.text();
      WEATHER_DEBUG.rawResponse = text.slice(0, 1500);
      let json;
      try{ json = JSON.parse(text); }
      catch(parseErr){
        throw new Error('HTTP '+res.status+' – svaret var ikke gyldig JSON: '+text.slice(0,200));
      }
      if(!res.ok && !(json && json.error)){
        // Open-Meteo svarer normalt med {error:true, reason:...} og status 400 ved ugyldige
        // parametre – det håndteres af kalderen. Andre ikke-200-svar (5xx, proxy-fejl, mv.)
        // har vi tidligere aldrig opdaget, fordi res.ok aldrig blev tjekket.
        throw new Error('HTTP '+res.status+' fra '+url);
      }
      return json;
    }catch(e){
      clearTimeout(timer);
      lastErr = e;
      if(attempt===2) throw e;
      await new Promise(r=>setTimeout(r, 400)); // kort pause før nyt forsøg
    }
  }
  throw lastErr;
}
function weatherCodeFlags(code, precip, snow){
  // WMO weather codes (Open-Meteo)
  const res = {sol:false, regn:false, sne:false};
  if(code===0 || code===1) res.sol = true;
  if([51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code) || (precip!=null && precip>0.2)) res.regn = true;
  if([71,73,75,77,85,86].includes(code) || (snow!=null && snow>0)) res.sne = true;
  if(res.sne) res.regn = false; // sne og regn er gensidigt udelukkende i visningen
  return res;
}
// Kort, læsbar oversættelse af WMO weather code til "vejrtype" – kun til
// menneskelig aflæsning i fx Developer Mode-debuglinjen.
function weatherCodeLabel(code){
  if(code==null) return '–';
  const map = {
    0:'Klart vejr', 1:'Næsten klart', 2:'Delvist skyet', 3:'Overskyet',
    45:'Tåge', 48:'Rimtåge',
    51:'Let støvregn', 53:'Støvregn', 55:'Tæt støvregn',
    56:'Underafkølet støvregn', 57:'Tæt underafkølet støvregn',
    61:'Let regn', 63:'Regn', 65:'Kraftig regn',
    66:'Underafkølet regn', 67:'Kraftig underafkølet regn',
    71:'Let snefald', 73:'Snefald', 75:'Kraftigt snefald', 77:'Snekorn',
    80:'Lette regnbyger', 81:'Regnbyger', 82:'Voldsomme regnbyger',
    85:'Lette snebyger', 86:'Kraftige snebyger',
    95:'Tordenvejr', 96:'Tordenvejr med hagl', 99:'Kraftigt tordenvejr med hagl'
  };
  return map[code] || ('Kode '+code);
}
async function geocodeStore(){
  if(SETTINGS.lat!=null && SETTINGS.lon!=null){
    resetWeatherDebugLocation();
    WEATHER_DEBUG.query = SETTINGS.by + (SETTINGS.postnr ? ` (${SETTINGS.postnr})` : '') + (SETTINGS.land ? `, ${SETTINGS.land}` : '');
    WEATHER_DEBUG.latitude = SETTINGS.lat;
    WEATHER_DEBUG.longitude = SETTINGS.lon;
    setWeatherDebugApi('OK', '', '');
    return true;
  }
  resetWeatherDebugLocation();
  if(!SETTINGS.by){
    WEATHER_DEBUG.query = '';
    setWeatherDebugApi('FAILED', '', 'Ingen by angivet under Varer → Butiksplacering.');
    return false;
  }
  const countryCode = COUNTRY_CODES[(SETTINGS.land||'Danmark').trim().toLowerCase()] || '';
  // NB: Open-Meteo geocoding API understøtter ikke et "country"-filter-parameter.
  // Søgning sker derfor kun på bynavn, og bedste match vælges efterfølgende.
  const searchTerm = SETTINGS.by;
  WEATHER_DEBUG.query = searchTerm + (SETTINGS.postnr ? ` (${SETTINGS.postnr})` : '') + (SETTINGS.land ? `, ${SETTINGS.land}` : '');
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(searchTerm)}&count=10&language=da&format=json`;
  try{
    const data = await fetchJSON(url);
    if(data && data.error){
      setWeatherDebugApi('FAILED', url, data.reason || 'Geokodning afviste forespørgslen.');
      return false;
    }
    const results = data && data.results;
    if(!results || !results.length){
      setWeatherDebugApi('FAILED', url, 'Ingen resultater fundet for byen.');
      return false;
    }
    // Find bedste match: foretræk postnummer-match, derefter landekode-match, ellers første resultat
    let best = results[0];
    if(SETTINGS.postnr){
      const pcMatch = results.find(r=> Array.isArray(r.postcodes) && r.postcodes.includes(String(SETTINGS.postnr)));
      if(pcMatch) best = pcMatch;
    }
    if(best===results[0] && countryCode){
      const ccMatch = results.find(r=> r.country_code===countryCode);
      if(ccMatch) best = ccMatch;
    }
    SETTINGS.lat = best.latitude;
    SETTINGS.lon = best.longitude;
    await saveSettings();
    WEATHER_DEBUG.latitude = best.latitude;
    WEATHER_DEBUG.longitude = best.longitude;
    setWeatherDebugApi('OK', url, '');
    return true;
  }catch(e){
    setWeatherDebugApi('FAILED', url, e);
  }
  return false;
}

// To daglige variabel-navngivninger har eksisteret i Open-Meteo's API over tid.
// Vi prøver den klassiske navngivning først og falder tilbage til den nyere,
// så vejrhentning ikke fejler permanent pga. et enkelt ukendt parameternavn.
const WEATHER_VAR_SETS = [
  'temperature_2m_max,precipitation_sum,wind_speed_10m_max,snowfall_sum,weather_code',
  'temperature_2m_max,precipitation_sum,windspeed_10m_max,snowfall_sum,weathercode'
];

async function fetchAutoWeather(date){
  WEATHER_DEBUG.temp = null;
  WEATHER_DEBUG.currentTemp = null;
  WEATHER_DEBUG.weathercode = null;
  WEATHER_DEBUG.auto = null;

  const ok = await geocodeStore();
  if(!ok){
    WEATHER_DEBUG.auto = false;
    // geocodeStore har allerede sat apiStatus/apiUrl/errorMessage
    return false;
  }

  // Open-Meteo's /v1/forecast dækker ca. 92 dage tilbage og 16 dage frem.
  // Ældre datoer hentes fra arkiv-API'et (ERA5).
  const daysFromToday = Math.round((new Date(date+"T00:00:00Z") - new Date(todayISO()+"T00:00:00Z")) / 86400000);
  const useArchive = daysFromToday < -92;
  const base = useArchive ? 'https://archive-api.open-meteo.com/v1/archive' : 'https://api.open-meteo.com/v1/forecast';
  // "Aktuel temperatur" (lige nu) giver kun mening for i dag, og kun forecast-API'et
  // understøtter "current"-parametre.
  const includeCurrent = !useArchive && date===todayISO();

  let lastError = '', lastUrl = '';
  for(const vars of WEATHER_VAR_SETS){
    let url = `${base}?latitude=${SETTINGS.lat}&longitude=${SETTINGS.lon}&start_date=${date}&end_date=${date}&daily=${vars}&timezone=auto`;
    if(includeCurrent) url += `&current=temperature_2m`;
    lastUrl = url;
    try{
      const data = await fetchJSON(url);
      if(data && data.error){
        lastError = data.reason || 'Vejr-API afviste forespørgslen.';
        continue; // prøv næste variabelnavngivning
      }
      if(!data || !data.daily || !data.daily.time || data.daily.time.length===0){
        lastError = 'Vejr-API returnerede ingen data for datoen.';
        continue;
      }
      const idx = data.daily.time.indexOf(date);
      if(idx===-1){
        lastError = `Datoen findes ikke i vejr-API'ets svar (modtog: ${data.daily.time.join(', ')}).`;
        continue;
      }
      const d = data.daily;
      const temp = d.temperature_2m_max ? d.temperature_2m_max[idx] : null;
      const precip = d.precipitation_sum ? d.precipitation_sum[idx] : null;
      const snow = d.snowfall_sum ? d.snowfall_sum[idx] : null;
      const wind = d.windspeed_10m_max ? d.windspeed_10m_max[idx] : (d.wind_speed_10m_max ? d.wind_speed_10m_max[idx] : null);
      const code = d.weathercode ? d.weathercode[idx] : (d.weather_code ? d.weather_code[idx] : null);
      const flags = weatherCodeFlags(code, precip, snow);
      const currentTemp = (data.current && data.current.temperature_2m!=null) ? data.current.temperature_2m : null;

      const w = getDayWeather(date);
      w.temp = temp!=null ? Math.round(temp*10)/10 : w.temp;
      w.currentTemp = currentTemp!=null ? Math.round(currentTemp*10)/10 : w.currentTemp;
      w.sol = flags.sol;
      w.regn = flags.regn;
      w.sne = flags.sne;
      w.vind = wind!=null ? wind>=25 : w.vind;
      w.vindHard = wind!=null ? wind>=40 : false;
      w.weathercode = code!=null ? code : w.weathercode;
      w.auto = true;

      setWeatherDebugApi('OK', url, '');
      WEATHER_DEBUG.temp = w.temp;
      WEATHER_DEBUG.currentTemp = w.currentTemp;
      WEATHER_DEBUG.weathercode = w.weathercode;
      WEATHER_DEBUG.auto = true;

      await saveRegs();
      await saveLastGoodWeather(date, w, includeCurrent);
      return true;
    }catch(e){
      lastError = errMsg(e);
    }
  }
  setWeatherDebugApi('FAILED', lastUrl, lastError || 'Ukendt fejl ved vejrhentning.');
  WEATHER_DEBUG.auto = false;
  return false;
}
async function ensureWeatherAuto(date, isStillRelevant){
  const w = getDayWeather(date);
  if(w.auto === true) return; // allerede hentet automatisk med succes for denne dato
  if(w.manualOverride) return; // brugeren har rettet manuelt – overskriv ikke
  const before = w.auto;
  const ok = await fetchAutoWeather(date);
  if(!ok){
    getDayWeather(date).auto = false;
    await saveRegs();
  }
  const after = getDayWeather(date).auto;
  if(before !== after && isStillRelevant()) render();
}

function vareTrend(ean, dates14){
  // dates14 sorted nyeste->ældste. Split i to halvdele af 7 dage.
  const recent = dates14.slice(0,7), older = dates14.slice(7,14);
  function gnsSalg(ds){
    let sold=[];
    ds.forEach(date=>{
      const r = REGS[date] && REGS[date][ean];
      if(r && r.modtaget!=null && r.luk!=null) sold.push(r.modtaget-r.luk);
    });
    return avg(sold);
  }
  const a = gnsSalg(recent), b = gnsSalg(older);
  if(b===0 && a===0) return {arrow:'→', label:'stabil'};
  if(b===0) return {arrow:'↑', label:'stigende efterspørgsel'};
  const pct = (a-b)/b;
  if(pct>0.1) return {arrow:'↑', label:'stigende efterspørgsel'};
  if(pct<-0.1) return {arrow:'↓', label:'faldende efterspørgsel'};
  return {arrow:'→', label:'stabil'};
}

/* ---------- FORECAST ENGINE (Fase 2) ---------- */
function soldOn(date, ean){
  const r = REGS[date] && REGS[date][ean];
  if(r && r.modtaget!=null && r.luk!=null) return Math.max(0, r.modtaget - r.luk);
  return null;
}
function tomorrowISO(){
  const d = isoToUTCDate(todayISO());
  d.setUTCDate(d.getUTCDate()+1);
  return utcDateToISO(d);
}
function computeForecastRaw(ean, targetDate, dates56){
  const weekday = weekdayName(targetDate);
  const sameWeekday = dates56.filter(d=>weekdayName(d)===weekday)
    .map(d=>soldOn(d,ean)).filter(x=>x!=null);

  let basis, quality;
  if(sameWeekday.length>=2){
    basis = avg(sameWeekday);
    quality = 'ok';
  } else {
    const allSold = dates56.map(d=>soldOn(d,ean)).filter(x=>x!=null);
    if(allSold.length>0){
      basis = avg(allSold);
      quality = 'low';
    } else {
      // fallback: seneste registrerede modtaget-antal
      let lastMod = null;
      for(const d of dates56){
        const r = REGS[d] && REGS[d][ean];
        if(r && r.modtaget!=null){ lastMod = r.modtaget; break; }
      }
      basis = lastMod!=null ? lastMod : 0;
      quality = 'none';
    }
  }

  const {tags, reasons} = getEffectiveTags(targetDate);
  const weather = weatherForDisplay(targetDate).w;
  const factors = [];

  if(tags.lonweekend) factors.push({label:'Lønweekend', pct:0.10});
  if(FERIE_KEYS.some(k=>tags[k])) factors.push({label:'Ferieperiode', pct:0.10});
  if(tags.turistsaeson) factors.push({label:'Turistsæson', pct:0.15});
  if(tags.helligdag) factors.push({label:'Helligdag', pct:0.10});
  if(tags.lokalt) factors.push({label:'Lokalt arrangement', pct:0.10});
  if(weather.regn) factors.push({label:'Regn', pct:0.05});
  if(weather.sol && weather.temp!=null && weather.temp>20) factors.push({label:'Sol og temperatur >20°', pct:0.05});
  if(weather.sne) factors.push({label:'Sne', pct:0.05});
  if(weather.vind && weather.vindHard) factors.push({label:'Kraftig vind', pct:-0.05});

  const ev = eventFactor(targetDate);
  if(ev && !tags.lokalt){
    factors.push({label:`${ev.top.navn} (${IMPACT_LABEL[ev.top.impact]})`, pct:ev.pct});
  }

  const totalPct = factors.reduce((s,f)=>s+f.pct, 0);
  const forecast = Math.round(basis * (1+totalPct));

  return {weekday, basis: round1(basis), factors, totalPct, forecast, quality, calReasons:reasons};
}

/* ---------- FORECAST LÆRING (statistisk, ingen AI) ---------- */
function getLearningFactor(ean, dates56){
  const sampleDates = dates56.slice(7); // ekskluder de seneste 7 dage
  const ratios = [];
  sampleDates.forEach(d=>{
    const actual = soldOn(d, ean);
    if(actual==null) return;
    const priorDates = dates56.filter(dd=>dd<d);
    if(priorDates.length<2) return;
    const raw = computeForecastRaw(ean, d, priorDates);
    if(raw.forecast>0) ratios.push(actual/raw.forecast);
  });
  if(ratios.length<5) return {factor:1, samples:ratios.length};
  let factor = avg(ratios);
  factor = Math.max(0.8, Math.min(1.2, factor));
  return {factor: Math.round(factor*100)/100, samples:ratios.length};
}

/* ---------- FORECAST SIKKERHED ---------- */
function forecastConfidence(ean, quality){
  const historyDays = Object.keys(REGS).filter(d=>soldOn(d,ean)!=null).length;
  let label;
  if(historyDays<=30) label='Lav';
  else if(historyDays<=90) label='Mellem';
  else label='Høj';
  let pct = Math.min(95, Math.round(45 + historyDays*0.55));
  if(quality==='low') pct = Math.max(30, pct-15);
  if(quality==='none') pct = Math.max(20, pct-30);
  return {pct, label, historyDays};
}

/* ---------- UDSOLGT-RISIKO ---------- */
function stockoutRisk(ean, dates56){
  const pmp = getPrimaertMP();
  const pmpField = mpFieldKey(pmp);
  const days28 = dates56.slice(0,28);
  let zero=0, total=0;
  days28.forEach(d=>{
    const r = REGS[d] && REGS[d][ean];
    if(!r) return;
    const val = r[pmpField] ?? (pmpField==='mp_kl13' ? r.kl13 : null);
    if(val!=null){ total++; if(val===0) zero++; }
  });
  if(total===0) return {level:'Lav', sharePct:0};
  const share = zero/total;
  const level = share>=0.4 ? 'Høj' : (share>=0.15 ? 'Mellem' : 'Lav');
  return {level, sharePct: Math.round(share*100)};
}

function computeForecast(ean, targetDate, dates56){
  const raw = computeForecastRaw(ean, targetDate, dates56);
  const learning = getLearningFactor(ean, dates56);
  const forecast = Math.max(0, Math.round(raw.basis * (1+raw.totalPct) * learning.factor));

  // sikkerhedsbuffer hvis varen ofte er udsolgt kl.13
  const pmpField = mpFieldKey(getPrimaertMP());
  const last7 = dates56.slice(0,7);
  const kl13zero = last7.filter(d=>{
    const r = REGS[d] && REGS[d][ean];
    if(!r) return false;
    const val = r[pmpField] ?? (pmpField==='mp_kl13' ? r.kl13 : null);
    return val===0;
  }).length;
  const buffer = kl13zero>=2 ? 1 : 0;
  const anbefalet = forecast + buffer;

  const confidence = forecastConfidence(ean, raw.quality);
  const risk = stockoutRisk(ean, dates56);

  return {...raw, forecast, anbefalet, buffer, kl13zero, learning, confidence, risk};
}
function forecastExplanation(v, f){
  if(f.quality==='none'){
    return `Ingen historik for ${v.navn} – forslaget er baseret på seneste registrering.`;
  }
  const parts = [];
  if(f.factors.length===0){
    parts.push(`historikken for ${f.weekday.toLowerCase()} viser et gennemsnitligt salg på ${f.basis} stk.`);
  } else {
    const factorTxt = f.factors.map(fa=>{
      const p = Math.round(fa.pct*100);
      return `${fa.label} ${p>=0?'+':''}${p}%`;
    }).join(', ');
    parts.push(`varen er forventet påvirket af ${factorTxt}, og historikken for ${f.weekday.toLowerCase()} viser i gennemsnit ${f.basis} stk.`);
  }
  if(f.buffer>0){
    parts.push(`Der lægges +1 stk. til som buffer, fordi varen har været udsolgt kl.13 ${f.kl13zero} gange på de sidste 7 dage.`);
  }
  if(f.learning && f.learning.factor!==1){
    const pct = Math.round((f.learning.factor-1)*100);
    parts.push(`Forecastet er ${pct>=0?'justeret op':'justeret ned'} ${Math.abs(pct)}% baseret på, hvordan tidligere forecasts har holdt sammenlignet med det faktiske salg.`);
  }
  let prefix = `Anbefalet ${f.anbefalet} stk., fordi `;
  let text = prefix + parts.join(' ');
  if(f.quality==='low'){
    text += ' (Begrænset historik for denne ugedag – forslaget bygger på det generelle gennemsnit.)';
  }
  return text;
}
/* =====================================================================
   AI DECISION ENGINE  (v3.0)
   ---------------------------------------------------------------------
   Lokal, regelfri mønstergenkendelse oven på FreshScans eksisterende
   registreringsdata. Ingen eksterne AI-tjenester, ingen API-nøgler,
   ingen hardcodede forretningsregler — alle "regler" AI'en finder er
   resultatet af at måle faktisk salgsafvigelse på dage hvor en given
   faktor (ugedag/vejr/kalender/...) var til stede, sammenlignet med
   dage hvor den ikke var.

   ARKITEKTUR (modulopdelt, så nye AI-moduler kan tilføjes senere uden
   at ændre eksisterende kode):

     AI_Engine.collectObservations(ean, dates)
        → rå datapunkter: {date, sold, factors:{...}}
     AI_Engine.minePatterns(observations)
        → fundne mønstre med confidence, observationer, sidst set
     AI_Engine.explainForecast(ean, targetDate, dates56, forecastResult)
        → menneskelæsbar "Forklar AI"-pakke, genbruger Smart Forecasts
          egne tal (ingen dobbelt-beregning, ingen uoverensstemmelse)
     AI_Engine.trendStatements(ean, dates)
        → "X er steget Y% de seneste N uger"-sætninger
     AI_Engine.topInsights(dates)
        → de 5 vigtigste tværgående observationer til Dashboard-kortet

   Fremtidig udvidelse (ShelfScan AI, kameraoptælling, kædebenchmark,
   automatisk bestilling, eksterne modeller) kan tilføjes som nye
   AI_Engine.xxx-funktioner uden at røre disse.
   ===================================================================== */
const AI_Engine = (function(){

  // ---- Faktor-udtræk: for en given dato, hvilke binære/numeriske
  // faktorer var til stede? Dette er den eneste "viden" om domænet AI'en
  // har adgang til — selve sammenhængene (om en faktor betyder noget for
  // en given vare) udledes udelukkende statistisk, ikke kodet ind.
  function extractFactors(date){
    const d = isoToUTCDate(date);
    const eff = getEffectiveTags(date);
    const weather = getDayWeather(date);
    const events = getActiveEvents(date);
    const f = {
      ugedag: weekdayName(date),
      maaned: MONTH_NAMES[d.getUTCMonth()],
    };
    CAL_TAGS.forEach(t=>{ f['cal_'+t.key] = !!eff.tags[t.key]; });
    f.lokaltArrangement = events.length>0;
    f.sol = !!weather.sol;
    f.regn = !!weather.regn;
    f.vind = !!weather.vind;
    f.sne = !!weather.sne;
    f.varmt = weather.temp!=null && weather.temp>=20;
    f.koldt = weather.temp!=null && weather.temp<=5;
    f.temp = weather.temp;
    return f;
  }

  // ---- Saml observationer: for hver dag med solgt-data, gem salg + faktorer.
  function collectObservations(ean, dates){
    const obs = [];
    dates.forEach(date=>{
      const sold = soldOn(date, ean);
      if(sold==null) return;
      obs.push({date, sold, factors: extractFactors(date)});
    });
    return obs;
  }

  // ---- Generisk mønster-mining: for hver binær faktor, sammenlign
  // gennemsnitssalg på dage MED faktoren vs. dage UDEN. En statistisk
  // signifikant afvigelse (nok observationer + tilstrækkelig effekt)
  // bliver et "mønster". Ingen tærskelværdier er domænespecifikke —
  // de er generelle krav til datamængde og effektstørrelse.
  const MIN_OBS_WITH = 4;     // mindst 4 dage med faktoren for at udtale sig
  const MIN_OBS_WITHOUT = 4;  // mindst 4 dage uden, til sammenligning
  const MIN_EFFECT_PCT = 8;   // mindst 8% afvigelse for at være "et mønster"

  function binaryFactorKeys(obs){
    if(!obs.length) return [];
    const sample = obs[0].factors;
    return Object.keys(sample).filter(k=> typeof sample[k] === 'boolean');
  }

  function minePatternsForFactor(obs, key, labelFn){
    const withF = obs.filter(o=>o.factors[key]===true).map(o=>o.sold);
    const withoutF = obs.filter(o=>o.factors[key]===false).map(o=>o.sold);
    if(withF.length < MIN_OBS_WITH || withoutF.length < MIN_OBS_WITHOUT) return null;
    const avgWith = avg(withF), avgWithout = avg(withoutF);
    if(avgWithout<=0) return null;
    const pct = Math.round(((avgWith-avgWithout)/avgWithout)*100);
    if(Math.abs(pct) < MIN_EFFECT_PCT) return null;
    const lastSeen = obs.filter(o=>o.factors[key]===true).map(o=>o.date).sort().slice(-1)[0];
    return {
      key, type:'binary',
      label: labelFn(pct),
      pct, avgWith: round1(avgWith), avgWithout: round1(avgWithout),
      observations: withF.length,
      totalObservations: obs.length,
      lastSeen,
      confidence: patternConfidence(withF.length, withoutF.length, pct)
    };
  }

  // ---- Ugedag-mønstre (kategorisk faktor: hver ugedag mod resten)
  function mineWeekdayPatterns(obs, navn){
    const patterns = [];
    DAY_NAMES.forEach(day=>{
      const withD = obs.filter(o=>o.factors.ugedag===day).map(o=>o.sold);
      const withoutD = obs.filter(o=>o.factors.ugedag!==day).map(o=>o.sold);
      if(withD.length < MIN_OBS_WITH || withoutD.length < MIN_OBS_WITHOUT) return;
      const avgWith = avg(withD), avgWithout = avg(withoutD);
      if(avgWithout<=0) return;
      const pct = Math.round(((avgWith-avgWithout)/avgWithout)*100);
      if(pct < MIN_EFFECT_PCT) return; // kun "topper" (positiv afvigelse) er en nyttig ugedags-indsigt
      const lastSeen = obs.filter(o=>o.factors.ugedag===day).map(o=>o.date).sort().slice(-1)[0];
      patterns.push({
        key:'ugedag_'+day, type:'weekday',
        label: `${navn} topper altid ${day.toLowerCase()}`,
        pct, avgWith: round1(avgWith), avgWithout: round1(avgWithout),
        observations: withD.length, totalObservations: obs.length,
        lastSeen, confidence: patternConfidence(withD.length, withoutD.length, pct)
      });
    });
    return patterns;
  }

  // ---- Confidence-beregning: stiger med antal observationer (begge grupper)
  // og med effektstørrelsen, men er aldrig "skråsikker" af få datapunkter.
  function patternConfidence(nWith, nWithout, pct){
    const sampleScore = Math.min(60, (Math.min(nWith,nWithout))*4); // op til 60 point for datamængde
    const effectScore = Math.min(35, Math.abs(pct)*0.7);            // op til 35 point for effektstørrelse
    return Math.round(Math.min(96, 20 + sampleScore*0.5 + effectScore));
  }

  function describeBinary(key, pct){
    const dir = pct>=0 ? 'øger' : 'reducerer';
    const abs = Math.abs(pct);
    const LABELS = {
      cal_tilbudsavis:'Tilbudsavis', cal_lonweekend:'Lønweekend', cal_vinterferie:'Vinterferie',
      cal_paaskeferie:'Påskeferie', cal_sommerferie:'Sommerferie', cal_efterarsferie:'Efterårsferie',
      cal_juleferie:'Juleferie', cal_helligdag:'Helligdag', cal_turistsaeson:'Turistsæson',
      cal_lokalt:'Lokalt arrangement (kalender)', lokaltArrangement:'Lokale arrangementer',
      sol:'Sol', regn:'Regn', vind:'Vind', sne:'Sne', varmt:'Temperatur over 20°', koldt:'Temperatur under 5°'
    };
    const navn = LABELS[key] || key;
    return `${navn} ${dir} salget med ${abs}%`;
  }

  // ---- Mine alle mønstre for én vare ----
  function minePatterns(ean, varenavn, dates){
    const obs = collectObservations(ean, dates);
    if(obs.length < MIN_OBS_WITH + MIN_OBS_WITHOUT){
      return {patterns:[], observationCount: obs.length, dataReady:false};
    }
    const patterns = [];
    binaryFactorKeys(obs).forEach(key=>{
      if(key==='temp') return; // numerisk, håndteres separat via varmt/koldt
      const p = minePatternsForFactor(obs, key, pct=>describeBinary(key, pct));
      if(p) patterns.push(p);
    });
    patterns.push(...mineWeekdayPatterns(obs, varenavn));
    patterns.sort((a,b)=> Math.abs(b.pct) - Math.abs(a.pct));
    return {patterns, observationCount: obs.length, dataReady:true};
  }

  // ---- Trend-motor: glidende sammenligning af seneste uger mod tidligere uger ----
  function trendStatement(ean, varenavn, dates56){
    const obs = collectObservations(ean, dates56);
    if(obs.length < 14) return null;
    const sorted = obs.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const recent = sorted.slice(-14);   // seneste ~2 uger
    const earlier = sorted.slice(0, Math.max(0, sorted.length-14)).slice(-28); // op til 4 uger før det
    if(recent.length<5 || earlier.length<5) return null;
    const avgRecent = avg(recent.map(o=>o.sold));
    const avgEarlier = avg(earlier.map(o=>o.sold));
    if(avgEarlier<=0) return null;
    const pct = Math.round(((avgRecent-avgEarlier)/avgEarlier)*100);
    if(Math.abs(pct) < 8) return null;
    const weeks = Math.max(1, Math.round(recent.length/7));
    const dir = pct>=0 ? 'steget' : 'faldet';
    return {
      ean, text: `Salget af ${varenavn} er ${dir} ${Math.abs(pct)}% de seneste ${weeks==1?'uge':weeks+' uger'}.`,
      pct, weeks
    };
  }

  // ---- Stockout-mønster på tværs af alle varer: hvornår sker det oftest? ----
  function stockoutTimingInsight(dates){
    const pmpField = mpFieldKey(getPrimaertMP());
    const byWeekday = {};
    let total=0;
    dates.forEach(date=>{
      const dayRegs = REGS[date];
      if(!dayRegs) return;
      Object.keys(dayRegs).forEach(ean=>{
        if(ean.startsWith('_')) return;
        const r = dayRegs[ean];
        const val = r && (r[pmpField] ?? r.kl13);
        if(val===0){
          const wd = weekdayName(date);
          byWeekday[wd] = (byWeekday[wd]||0)+1;
          total++;
        }
      });
    });
    if(total<5) return null;
    const sorted = Object.entries(byWeekday).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length) return null;
    const [topDay, count] = sorted[0];
    const share = Math.round((count/total)*100);
    if(share<25) return null;
    const pmpLabel = getPrimaertMP().label;
    return `Udsolgte varer forekommer oftest ${topDay.toLowerCase()} omkring ${pmpLabel.toLowerCase()}.`;
  }

  // ---- Top 5 tværgående indsigter til Dashboard "AI Indsigt"-kort ----
  function topInsights(varer, dates56){
    const candidates = [];
    varer.forEach(v=>{
      const mined = minePatterns(v.ean, v.navn, dates56);
      mined.patterns.slice(0,2).forEach(p=>{
        candidates.push({
          text: `${v.navn} ${p.pct>=0?'+':''}${p.pct}% ${p.type==='weekday' ? 'om '+p.key.replace('ugedag_','').toLowerCase() : 'ved relevant faktor'}.`,
          richText: p.type==='weekday' ? p.label : `${v.navn}: ${describeBinary(p.key, p.pct)}.`,
          confidence: p.confidence,
          abs: Math.abs(p.pct)
        });
      });
      const trend = trendStatement(v.ean, v.navn, dates56);
      if(trend) candidates.push({text:trend.text, richText:trend.text, confidence: Math.min(90, 40+Math.abs(trend.pct)), abs:Math.abs(trend.pct)});
    });
    const stockoutMsg = stockoutTimingInsight(dates56.slice(0,28));
    if(stockoutMsg) candidates.push({text:stockoutMsg, richText:stockoutMsg, confidence:70, abs:30});

    // Lav-risiko-observation for i morgen (positiv, nyttig signal når der ikke er problemer)
    candidates.push({text:null, richText:null, confidence:0, abs:-1}); // placeholder fjernes nedenfor

    candidates.sort((a,b)=> (b.confidence*b.abs) - (a.confidence*a.abs));
    return candidates.filter(c=>c.richText).slice(0,5);
  }

  // ---- "Forklar AI": fuld gennemsigtig pakke for én vares forecast ----
  function explainForecast(v, f, dates56){
    const mined = minePatterns(v.ean, v.navn, dates56);
    const matchingPatterns = [];
    // Find hvilke af de minede mønstre er AKTIVE for målrettet dato (matcher de faktorer
    // forecastet allerede har identificeret i f.factors / f.calReasons)
    const tomorrow = tomorrowISO();
    const tFactors = extractFactors(tomorrow);
    mined.patterns.forEach(p=>{
      if(p.type==='weekday'){
        if(tFactors.ugedag === p.key.replace('ugedag_','')) matchingPatterns.push(p);
      } else if(tFactors[p.key]===true){
        matchingPatterns.push(p);
      }
    });

    // Sammenlignelige historiske dage: samme ugedag, op til 8 seneste
    const compareDates = dates56
      .filter(d=>weekdayName(d)===f.weekday && soldOn(d,v.ean)!=null)
      .slice(0,8)
      .map(d=>({date:d, sold:soldOn(d,v.ean), label:fmtDateDK(d)}));

    return {
      varenavn: v.navn,
      basis: f.basis,
      weekday: f.weekday,
      factors: f.factors,         // de faktorer Smart Forecast selv brugte (samme tal, ingen dobbeltberegning)
      learning: f.learning,
      confidence: f.confidence,
      anbefalet: f.anbefalet,
      matchingPatterns,           // AI-minede mønstre der er relevante for i morgen
      compareDates,                // historiske sammenlignelige dage
      dataReady: mined.dataReady,
      observationCount: mined.observationCount
    };
  }

  return {
    extractFactors, collectObservations, minePatterns, trendStatement,
    stockoutTimingInsight, topInsights, explainForecast, describeBinary,
    patternConfidence
  };
})();
/* ---------- FORSIDE ----------
   Viser KUN: Ny registrering, Fortsæt registrering, Rapporter, og ét
   valgfrit handlingsorienteret bestillingsforslag (intet diagram, ingen
   AI-sprog, ingen procenter — bare et konkret tal medarbejderen kan handle på). */
function getSimpleSuggestion(){
  // Genbruger Smart Forecast-motoren, men reducerer til ÉT tal for den vare
  // med højest udsolgt-risiko i morgen. Ingen grafer, ingen forklaring her —
  // det er bevidst holdt til administrator-siden. Vises kun hvis der reelt
  // er nok historik til at stole på forslaget (Mellem eller Høj sikkerhed).
  try{
    const aktive = VARER.filter(v=>v.aktiv);
    if(aktive.length===0) return null;
    const dates56 = periodDates(56);
    const tDate = tomorrowISO();
    let best = null;
    aktive.forEach(v=>{
      const f = computeForecast(v.ean, tDate, dates56);
      if(f.risk && f.risk.level==='Høj' && f.confidence && f.confidence.label!=='Lav'){
        if(!best || f.anbefalet > best.f.anbefalet){ best = {v, f}; }
      }
    });
    if(!best) return null;
    return `Forslag i morgen: Bestil ${best.f.anbefalet} ekstra ${best.v.navn}`;
  }catch(e){
    console.error('getSimpleSuggestion error:', errMsg(e));
    return null;
  }
}

function hasOpenRegistration(){
  const today = REGS[currentDate];
  if(!today) return false;
  const aktive = VARER.filter(v=>v.aktiv);
  if(aktive.length===0) return false;
  const mps = getMalepunkter(true);
  // "Åben" = mindst én aktiv vare mangler mindst ét aktivt målepunkt i dag
  return aktive.some(v=>{
    const r = today[v.ean];
    return mps.some(mp=>{
      const key = mpFieldKey(mp);
      const val = r ? r[key] : null;
      return val===null || val===undefined;
    });
  });
}

function renderHome(){
  const suggestion = getSimpleSuggestion();
  const openReg = hasOpenRegistration();

  let html = `<div class="home-tiles">
    <div class="home-tile primary" id="tileNewReg">
      <div class="ico">➕</div>
      <div>
        <div class="label">Ny registrering</div>
        <div class="desc">Vælg vare, tag billede, registrer antal</div>
      </div>
    </div>`;

  if(openReg){
    html += `<div class="home-tile" id="tileContinueReg">
      <div class="ico">📂</div>
      <div>
        <div class="label">Fortsæt registrering</div>
        <div class="desc">Du har ikke registreret alle varer i dag endnu</div>
      </div>
    </div>`;
  }

  html += `<div class="home-tile" id="tileReports">
      <div class="ico">📄</div>
      <div>
        <div class="label">Rapporter</div>
        <div class="desc">Se og del dagens rapport</div>
      </div>
    </div>
  </div>`;

  if(suggestion){
    html += `<div class="suggestion-banner"><span class="ico">💡</span><span>${suggestion}</span></div>`;
  }

  app.innerHTML = html;

  $('#tileNewReg').addEventListener('click', ()=>{
    newRegState = null; // nulstil evt. gammel session
    currentTab='newreg'; render();
  });
  const contBtn = $('#tileContinueReg');
  if(contBtn) contBtn.addEventListener('click', ()=>{ currentTab='continuereg'; render(); });
  $('#tileReports').addEventListener('click', ()=>{ currentTab='reports'; render(); });

  // RODÅRSAG TIL "VEJR VIRKER IKKE LÆNGERE": automatisk vejrhentning blev
  // tidligere kun udløst fra Admin → Dashboard/Mønstre. Almindelige brugere
  // åbner aldrig Admin, så vejret blev reelt aldrig hentet, og forsidens
  // bestillingsforslag faldt altid tilbage til "intet forslag". Forsiden er
  // appens faktiske indgang og skal derfor selv sørge for at vejret hentes.
  ensureWeatherAuto(todayISO(), ()=> currentTab==='home');
  ensureWeatherAuto(tomorrowISO(), ()=> currentTab==='home');
}
/* ---------- NY REGISTRERING ----------
   Kerneflow: Vælg vare → (valgfrit) tag billede → registrer antal →
   (valgfri) kommentar → Gem → automatisk videre til næste vare.
   Ingen ekstra klik, ingen dashboards undervejs. */
let newRegState = null;
// { mp: <målepunkt-objekt>, queue: [ean,...], idx: 0, photo: dataUrl|null, kommentar: '' }

function activeRegMP(){
  // Vælger det første aktive målepunkt, der mangler registreringer i dag.
  // Falder tilbage til det primære målepunkt hvis alt er udfyldt (så man kan rette).
  const mps = getMalepunkter(true);
  const aktive = VARER.filter(v=>v.aktiv);
  for(const mp of mps){
    const key = mpFieldKey(mp);
    const missing = aktive.some(v=>{
      const r = getReg(currentDate, v.ean);
      return r[key]===null || r[key]===undefined;
    });
    if(missing) return mp;
  }
  return getPrimaertMP();
}

function startNewRegSession(mpOverride){
  const mp = mpOverride || activeRegMP();
  const aktive = VARER.filter(v=>v.aktiv);
  const key = mpFieldKey(mp);
  // Kø: varer der mangler dette målepunkt først, derefter resten (så man kan rette)
  const missing = aktive.filter(v=>{
    const r = getReg(currentDate, v.ean);
    return r[key]===null || r[key]===undefined;
  });
  const rest = aktive.filter(v=>!missing.includes(v));
  newRegState = {
    mp, queue: [...missing, ...rest].map(v=>v.ean),
    idx: 0, photo: null, kommentar: ''
  };
}

function renderNewReg(){
  const aktive = VARER.filter(v=>v.aktiv);
  if(aktive.length===0){
    app.innerHTML = backRow('Forside') + `<div class="card empty">Ingen varer oprettet endnu.<br>Bed en administrator om at tilføje varer.</div>`;
    wireBackRow(goHome);
    return;
  }
  if(!newRegState) startNewRegSession();
  if(newRegState.idx >= newRegState.queue.length){
    renderRegComplete();
    return;
  }

  const ean = newRegState.queue[newRegState.idx];
  const v = VARER.find(x=>x.ean===ean);
  if(!v){ newRegState.idx++; renderNewReg(); return; }
  const mp = newRegState.mp;
  const key = mpFieldKey(mp);
  const r = getReg(currentDate, ean);
  const currentVal = r[key];

  // Progress dots (maks 8 vist, så det ikke fylder for meget ved mange varer)
  const total = newRegState.queue.length;
  const idx = newRegState.idx;
  let dots = '';
  const showCount = Math.min(total, 8);
  for(let i=0;i<showCount;i++){
    const cls = i<idx ? 'done' : (i===idx ? 'current' : '');
    dots += `<span class="${cls}"></span>`;
  }

  let html = backRow('Forside');
  html += `<div class="progress-dots">${dots}</div>`;
  html += `<div class="card">
    <div class="small-muted" style="text-align:center; margin-bottom:4px;">${mp.emoji} ${mp.label} · vare ${idx+1} af ${total}</div>
    <h2 style="text-align:center; font-size:22px;">${v.navn}</h2>`;

  // Kamera-felt (valgfri dokumentation)
  if(newRegState.photo){
    html += `<div class="camera-tile" id="photoTile">
      <img src="${newRegState.photo}" alt="Billede af ${v.navn}">
      <button class="retake" id="retakePhoto">Tag nyt billede</button>
    </div>`;
  } else {
    html += `<div class="camera-tile" id="photoTile">
      <div class="ico">📷</div>
      <div class="lbl">Tag billede (valgfrit)</div>
    </div>`;
  }

  // Antal-stepper (store, ét-hånds betjening)
  html += `<div class="stepper">
    <button id="stepDown">−</button>
    <div class="val" id="stepVal">${currentVal ?? 0}</div>
    <button id="stepUp">+</button>
  </div>`;

  // Kommentar (valgfri, foldet ud kun ved tryk for at holde skærmen ren)
  html += `<details id="kommentarDetails">
    <summary style="cursor:pointer; color:var(--green-d); font-size:14px; text-align:center; list-style:none;">💬 Tilføj kommentar (valgfrit)</summary>
    <textarea id="kommentarInput" placeholder="F.eks. årsag til spild, kvalitet, mv.">${newRegState.kommentar || r.kommentar || ''}</textarea>
  </details>`;

  html += `<button class="btn-primary" id="saveAndNext" style="margin-top:16px;">Gem og fortsæt</button>
  </div>`;

  app.innerHTML = html;
  wireBackRow(()=>{ newRegState=null; goHome(); });

  $('#photoTile').addEventListener('click', (e)=>{
    if(e.target.id==='retakePhoto' || e.target.closest('#retakePhoto') || !newRegState.photo){
      FreshScanCamera.start((dataUrl)=>{
        if(dataUrl){ newRegState.photo = dataUrl; }
        renderNewReg();
      });
    }
  });

  const valEl = $('#stepVal');
  let val = currentVal ?? 0;
  $('#stepDown').addEventListener('click', ()=>{ val = Math.max(0, val-1); valEl.textContent = val; });
  $('#stepUp').addEventListener('click', ()=>{ val = val+1; valEl.textContent = val; });

  $('#saveAndNext').addEventListener('click', async ()=>{
    const reg = getReg(currentDate, ean);
    reg[key] = val;
    const komInp = $('#kommentarInput');
    if(komInp && komInp.value.trim()) reg.kommentar = komInp.value.trim();
    if(newRegState.photo) reg.foto = newRegState.photo;
    await saveRegsAuto();
    newRegState.idx++;
    newRegState.photo = null;
    newRegState.kommentar = '';
    renderNewReg(); // automatisk videre til næste vare — ingen ekstra klik
  });
}

function renderRegComplete(){
  const mp = newRegState ? newRegState.mp : getPrimaertMP();
  app.innerHTML = `<div class="card" style="text-align:center; padding:32px 18px;">
    <div style="font-size:48px; margin-bottom:10px;">✅</div>
    <h2>${mp.label} er registreret</h2>
    <div class="small-muted" style="margin-bottom:20px;">Alle aktive varer er gemt for i dag.</div>
    <button class="btn-primary" id="regCompleteHome">Til forsiden</button>
  </div>`;
  $('#regCompleteHome').addEventListener('click', ()=>{ newRegState=null; goHome(); });
}

/* ---------- FORTSÆT REGISTRERING ----------
   Viser hvilke målepunkter der mangler i dag, og lader medarbejderen
   hoppe direkte ind i samme ét-vare-ad-gangen flow for det valgte punkt. */
function renderContinueReg(){
  const aktive = VARER.filter(v=>v.aktiv);
  if(aktive.length===0){
    app.innerHTML = backRow('Forside') + `<div class="card empty">Ingen varer oprettet endnu.</div>`;
    wireBackRow(goHome);
    return;
  }
  const mps = getMalepunkter(true);
  let html = backRow('Forside');
  html += `<div class="card"><h2>Fortsæt registrering</h2>
    <div class="small-muted" style="margin-bottom:10px;">Vælg hvilket målepunkt du vil fortsætte med.</div>`;
  mps.forEach(mp=>{
    const key = mpFieldKey(mp);
    const done = aktive.filter(v=>{
      const r = getReg(currentDate, v.ean);
      return r[key]!==null && r[key]!==undefined;
    }).length;
    const total = aktive.length;
    const complete = done===total;
    html += `<div class="row" style="cursor:pointer;" data-mp="${mp.id}">
      <div>
        <div class="name">${mp.emoji} ${mp.label}</div>
        <div class="sub">${complete ? 'Færdig' : done+' af '+total+' varer registreret'}</div>
      </div>
      <div style="font-size:20px;">${complete ? '✅' : '→'}</div>
    </div>`;
  });
  html += `</div>`;
  app.innerHTML = html;
  wireBackRow(goHome);

  app.querySelectorAll('[data-mp]').forEach(row=>{
    row.addEventListener('click', ()=>{
      const mp = mps.find(m=>m.id===row.dataset.mp);
      startNewRegSession(mp);
      currentTab='newreg'; render();
    });
  });
}
/* ---------- RAPPORTER ----------
   Enkel rapport: dato, butik, en kort tabel over dagens registreringer,
   og knapper til at gemme som PDF eller dele.
   Ingen BI, ingen grafer, ingen analyser her — det er admin-domæne. */
let reportDate = todayISO();

function buildReportData(date){
  const aktive = VARER.filter(v=>v.aktiv);
  const mps = getMalepunkter(true);
  const rows = aktive.map(v=>{
    const r = getReg(date, v.ean);
    const cells = mps.map(mp=>({label:mp.label, val: r[mpFieldKey(mp)]}));
    return {navn:v.navn, cells, kommentar:r.kommentar||'', harFoto:!!r.foto};
  });
  return {date, mps, rows};
}

function renderReports(){
  const data = buildReportData(reportDate);
  let html = backRow('Forside');
  html += `<div class="card">
    <h2>📄 Dagens rapport</h2>
    <label>Dato</label>
    <input type="text" id="reportDateLabel" value="${fmtDateDK(reportDate)}" readonly style="background:#eef2ef;">
    <table>
      <tr><td class="small-muted">Butik</td><td>${SETTINGS.kundeNavn || SETTINGS.butiksnavn || '–'}</td></tr>
    </table>
  </div>`;

  html += `<div class="card">
    <h3 style="margin-top:0;">Registreringer</h3>`;
  if(data.rows.length===0){
    html += `<div class="empty">Ingen varer at vise.</div>`;
  } else {
    html += `<table><tr><th>Vare</th>${data.mps.map(mp=>`<th>${mp.label}</th>`).join('')}<th>📷</th></tr>`;
    data.rows.forEach(row=>{
      html += `<tr><td>${row.navn}</td>${row.cells.map(c=>`<td>${c.val ?? '–'}</td>`).join('')}<td>${row.harFoto?'✅':'–'}</td></tr>`;
    });
    html += `</table>`;
  }
  html += `</div>`;

  html += `<button class="btn-primary" id="reportPdf">⬇️ Gem som PDF</button>
    <button class="btn-secondary" id="reportShare">📤 Del</button>`;

  app.innerHTML = html;
  wireBackRow(goHome);

  $('#reportPdf').addEventListener('click', ()=>{
    // Bruger browserens indbyggede "Udskriv til PDF" — ingen ekstern afhængighed.
    window.print ? window.print() : alert('Print/PDF understøttes ikke i denne visning.');
  });
  $('#reportShare').addEventListener('click', async ()=>{
    const text = `FreshScan-rapport – ${SETTINGS.kundeNavn||SETTINGS.butiksnavn} – ${fmtDateDK(reportDate)}\n` +
      data.rows.map(r=>`${r.navn}: `+r.cells.map(c=>`${c.label} ${c.val??'–'}`).join(', ')).join('\n');
    if(navigator.share){
      try{ await navigator.share({title:'FreshScan-rapport', text}); }
      catch(e){ /* brugeren annullerede deling, intet at gøre */ }
    } else if(navigator.clipboard && navigator.clipboard.writeText){
      try{ await navigator.clipboard.writeText(text); alert('Rapport kopieret til udklipsholder.'); }
      catch(e){ alert('Kunne ikke dele rapporten på denne enhed.'); }
    } else {
      alert('Deling understøttes ikke i denne browser.');
    }
  });
}

const DEFAULT_ADMIN_PIN = '1234';
let adminUnlocked = false;
let adminPinEntry = '';

function getAdminPin(){
  return storageGet('adminpin') || DEFAULT_ADMIN_PIN;
}

function openAdminPanel(){
  if(adminUnlocked){
    currentTab = 'admin';
    render();
    return;
  }
  adminPinEntry = '';
  currentTab = '__pinpad__';
  renderPinPad();
}

function renderPinPad(){
  const dots = Array.from({length:4}, (_,i)=> i<adminPinEntry.length ? 'filled' : '').map(c=>`<span class="${c}"></span>`).join('');
  let html = backRow('Forside');
  html += `<div class="card" style="text-align:center;">
    <div style="font-size:40px;">🔐</div>
    <h2>Administrator</h2>
    <div class="small-muted">Indtast PIN-kode</div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-pad" id="pinPad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-pin="${n}">${n}</button>`).join('')}
      <button data-pin="clear" style="background:#fbeceb; color:var(--red);">✕</button>
      <button data-pin="0">0</button>
      <button data-pin="back">⌫</button>
    </div>
    <div id="pinError" class="small-muted" style="color:var(--red); margin-top:10px; min-height:16px;"></div>
  </div>`;
  app.innerHTML = html;
  wireBackRow(goHome);

  app.querySelectorAll('[data-pin]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const v = btn.dataset.pin;
      if(v==='clear'){ adminPinEntry=''; }
      else if(v==='back'){ adminPinEntry = adminPinEntry.slice(0,-1); }
      else if(adminPinEntry.length<4){ adminPinEntry += v; }
      if(adminPinEntry.length===4){
        if(adminPinEntry===getAdminPin()){
          adminUnlocked = true;
          currentTab='admin';
          render();
          return;
        } else {
          $('#pinError').textContent = 'Forkert PIN – prøv igen.';
          adminPinEntry='';
        }
      }
      renderPinPad();
    });
  });
}
