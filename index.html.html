  aktive.forEach((v,i)=>{
    const f=forecasts[v.ean];
    const factorTxt=f.factors.length?f.factors.map(fa=>{const p=Math.round(fa.pct*100);return`${p>=0?'+':''}${p}% ${fa.label.toLowerCase()}`;}).join(', '):'ingen særlige påvirkninger';
    const riskColor=f.risk.level==='Høj'?'var(--red)':(f.risk.level==='Mellem'?'#8a6213':'var(--muted)');
    html+=`<div style="${i>0?'border-top:1px solid var(--border); padding-top:10px; margin-top:10px;':''}">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <div class="name">${v.navn}</div>
        ${Confidence_Engine.badge(f.confidence.label)}
      </div>
      <table style="margin-bottom:6px;">
        <tr><th>Basis</th><th>Påvirkninger</th><th>AI-anbefaling</th></tr>
        <tr><td>${f.basis} stk.</td><td style="font-size:12px;">${factorTxt}</td><td><b>${f.anbefalet} stk.</b></td></tr>
      </table>
      <div class="small-muted" style="margin-bottom:4px;">${forecastExplanation(v,f)}</div>
      <div style="display:flex; gap:14px; font-size:12px; align-items:center;">
        <div>Konfidens: <b>${f.confidence.pct}%</b> (${f.confidence.label})</div>
        <div style="color:${riskColor};">Udsolgt-risiko: <b>${f.risk.level}</b></div>
      </div>
      <button class="btn-secondary" data-explain-ai="${v.ean}" style="margin-top:8px; font-size:13px; padding:8px 14px;">🔍 Forklar AI</button>
      <div id="aiExplain_${v.ean}" style="display:none; margin-top:10px;"></div>
    </div>`;
  });
  html+=`</div>`;

  // ---- AI Indsigt ----
  html+=`<div class="card"><h2>🧠 AI Indsigt</h2>
    <div class="small-muted" style="margin-bottom:10px;">Fundne mønstre i jeres egne data.</div>`;
  let aiInsights=[];
  try{aiInsights=Pattern_Engine.topInsights(aktive,dates56).filter(i=>i.confidence>=55);}catch(e){}
  if(!aiInsights.length)html+=`<div class="small-muted">FreshScan AI lærer stadig butikkens salgsmønstre.</div>`;
  else aiInsights.forEach(ins=>{html+=`<div style="padding:5px 0; font-size:14px;">• ${ins.richText} <span class="small-muted">(${ins.confidence}%)</span></div>`;});
  html+=`</div>`;

  // ---- Servicegrad + AI vurdering ----
  const pmp=getPrimaertMP();const pmpField=mpFieldKey(pmp);
  let withStock=0,withReg=0,udsolgte=0,lavRest=0,hojRestCnt=0;
  aktive.forEach(v=>{
    const r=today[v.ean];if(!r)return;
    const val=r[pmpField]??(pmpField==='mp_kl13'?r.kl13:null);
    if(val!=null){withReg++;if(val>0)withStock++;else udsolgte++;}
    if(r.luk!=null){if(r.luk>=1&&r.luk<=2)lavRest++;else if(r.luk>4)hojRestCnt++;}
  });
  let servicegrad=withReg?Math.round((withStock/withReg)*100):null;
  let sgEmoji=servicegrad!=null?(servicegrad<80?'🔴':(servicegrad<90?'🟡':'🟢')):'–';
  html+=`<div class="topcards">
    <div class="topcard"><div class="num">${sgEmoji} ${servicegrad!=null?servicegrad:0}%</div><div class="lbl">Servicegrad ${pmp.label}</div></div>
    <div class="topcard"><div class="num">🔴 ${udsolgte||0}</div><div class="lbl">Udsolgte ${pmp.label}</div></div>
    <div class="topcard"><div class="num">🟡 ${lavRest||0}</div><div class="lbl">Lav rest ved luk</div></div>
    <div class="topcard"><div class="num">🔵 ${hojRestCnt||0}</div><div class="lbl">Høj rest ved luk</div></div>
  </div>`;

  // ---- AI udsolgt-risiko ----
  html+=`<div class="card"><h2>🧠 AI udsolgt-risiko i morgen</h2>`;
  aktive.forEach(v=>{
    const f=forecasts[v.ean];if(!f)return;
    const riskColor=f.risk.level==='Høj'?'var(--red)':(f.risk.level==='Mellem'?'#8a6213':'var(--muted)');
    html+=`<div class="row"><div class="name">${v.navn}</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="color:${riskColor}; font-weight:600;">${f.risk.level}</div>
        ${Confidence_Engine.badge(f.confidence.label)}
      </div>
    </div>`;
  });
  html+=`</div>`;

  // ---- Vejr ----
  const todayDisp=weatherForDisplay(todayISO());const todayW=todayDisp.w;
  const todayCurTemp=todayW.currentTemp!=null?todayW.currentTemp:todayW.temp;
  html+=`<div class="card"><h2>Dagens vejr</h2>`;
  if(todayCurTemp==null&&!todayW.sol&&!todayW.regn&&!todayW.vind&&!todayW.sne){
    html+=`<div class="name">Vejr ikke registreret endnu.</div>`;
  }else{
    const wp=[];if(todayCurTemp!=null)wp.push(todayCurTemp+'°C');if(todayW.sol)wp.push('sol');if(todayW.regn)wp.push('regn');if(todayW.vind)wp.push(todayW.vindHard?'kraftig vind':'blæst');if(todayW.sne)wp.push('sne');
    html+=`<div class="name">${wp.join(', ')}.</div>`;
    if(todayDisp.fromFallback)html+=`<div class="small-muted">⚠️ Seneste kendte vejr anvendes.</div>`;
    else html+=`<div class="small-muted">${weatherStatusMessage(todayW)}</div>`;
  }
  html+=`</div>`;

  // ---- Hurtig status ----
  const dates14arr=Array.from({length:14},(_,i)=>isoDaysAgo(i));
  let spildfriDage=0;
  dates14arr.forEach(date=>{
    const day=REGS[date];if(!day)return;
    let allReg=true,sumLuk=0;
    aktive.forEach(v=>{const r=day[v.ean];if(!r||r.luk==null){allReg=false;return;}sumLuk+=r.luk;});
    if(allReg&&sumLuk===0)spildfriDage++;
  });
  const topUdsolgt=aktive.map(v=>({v,n:summarize(v.ean,dates7).kl13zero})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n)[0];
  html+=`<div class="card"><h2>Hurtig status</h2>
    <div class="row"><div class="name">✅ ${spildfriDage} af 14 dage uden spild</div></div>
    ${topUdsolgt?`<div class="row"><div class="name">⚠️ ${topUdsolgt.v.navn} udsolgt ${topUdsolgt.n} gange (7 dage)</div></div>`:''}
  </div>`;

  app.innerHTML=html;wireAdminBackRow();
  ensureWeatherAuto(todayISO(),()=>currentTab==='admin-dashboard');
  ensureWeatherAuto(tDate,()=>currentTab==='admin-dashboard');

  app.querySelectorAll('[data-explain-ai]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const ean=btn.dataset.explainAi;const panel=$(`#aiExplain_${ean}`);if(!panel)return;
      if(panel.style.display==='block'){panel.style.display='none';btn.textContent='🔍 Forklar AI';return;}
      const v=aktive.find(x=>x.ean===ean);const f=forecasts[ean];
      panel.innerHTML=buildExplainPanel(v,f,dates56);panel.style.display='block';btn.textContent='🔼 Skjul forklaring';
    });
  });
}

function buildExplainPanel(v,f,dates56){
  const outcomes=AI_MemoryEngine.getOutcomesForVare(v.ean).slice(0,5);
  const corr=Learning_Engine.getCorrection(v.ean);
  let html=`<div style="padding:12px; background:var(--ai-light); border-radius:10px; font-size:13px; border:1px solid #c4b5fd;">`;
  html+=`<div style="font-weight:700; color:var(--ai); margin-bottom:8px;">AI Forklaring: ${f.anbefalet} stk.</div>`;
  // Kalender/vejr faktorer
  if(f.factors.length){f.factors.forEach(fa=>{const p=Math.round(fa.pct*100);html+=`<div>✓ ${fa.label} (${p>=0?'+':''}${p}%)</div>`;});}
  else html+=`<div class="small-muted">Ingen særlige faktorer i morgen.</div>`;
  // Learning korrektioner
  if(corr.ready&&corr.factor!==1){
    const p=Math.round((corr.factor-1)*100);
    html+=`<div style="margin-top:6px;">🧠 Læringskorr. ${p>=0?'+':''}${p}% (${corr.samples} historiske dage)</div>`;
  }
  if(f.learning&&f.learning.appliedFactors&&f.learning.appliedFactors.length){
    f.learning.appliedFactors.forEach(af=>{
      const p=Math.round((af.multiplier-1)*100);
      html+=`<div>🧠 Faktor-kalibrering: ${Pattern_Engine.FACTOR_LABELS[af.factor]||af.factor} (${p>=0?'+':''}${p}%)</div>`;
    });
  }
  html+=`<div style="margin-top:8px;">Konfidens: ${Confidence_Engine.badge(f.confidence.label)} ${f.confidence.pct}% (${f.confidence.dataPoints} læringsdag${f.confidence.dataPoints!==1?'e':''})</div>`;
  // Seneste outcomes
  if(outcomes.length){
    html+=`<div style="font-weight:700; margin-top:12px; margin-bottom:6px;">Seneste AI-læringsdata</div>
      <table><tr><th>Dato</th><th>Forecast</th><th>Faktisk</th><th>Afvigelse</th></tr>`;
    outcomes.forEach(o=>{
      const dev=o.pctDeviation!=null?`${o.pctDeviation>=0?'+':''}${o.pctDeviation}%`:'–';
      const devColor=o.pctDeviation!=null?(Math.abs(o.pctDeviation)<=15?'color:var(--green);':'color:var(--red);'):'';
      html+=`<tr><td>${fmtDateDK(o.date).split(' ').slice(1).join(' ')}</td><td>${o.forecast}</td><td>${o.actual}</td><td style="${devColor}">${dev}</td></tr>`;
    });
    html+=`</table>`;
  }else{
    html+=`<div class="small-muted" style="margin-top:10px;">Ingen læringsdata endnu – AI begynder at lære efter første afsluttede dag.</div>`;
  }
  html+=`</div>`;
  return html;
}

/* =====================================================================
   UI – HISTORIK (fra v1.0, minor AI-berigelse)
   ===================================================================== */
let histPeriod=14,histVareEan='alle',histLev='alle',histUgedag='alle',histDate=isoDaysAgo(1);
function renderAdminHistorik(){
  const aktive=VARER.filter(v=>v.aktiv);
  if(!aktive.length){app.innerHTML=adminBackRow()+`<div class="card empty">Ingen aktive varer endnu.</div>`;wireAdminBackRow();return;}
  const periods=[{label:'2 uger',val:14},{label:'4 uger',val:28},{label:'8 uger',val:56},{label:'År til dato',val:'ytd'}];
  let days;
  if(histPeriod==='ytd'){const start=isoToUTCDate(todayISO().slice(0,4)+'-01-01');days=Math.floor((isoToUTCDate(todayISO())-start)/86400000)+1;}
  else days=histPeriod;
  const dates=periodDates(days);
  let html=adminBackRow()+`<div class="card">
    <h2>Historik</h2>
    <div class="step-pill">`;
  periods.forEach(p=>{html+=`<span class="${histPeriod===p.val?'done':''}" data-period="${p.val}" style="cursor:pointer;">${p.label}</span>`;});
  html+=`</div>
    <label>Vis vare</label>
    <select id="histVare">
      <option value="alle" ${histVareEan==='alle'?'selected':''}>Alle varer</option>`;
  aktive.forEach(v=>{html+=`<option value="${v.ean}" ${histVareEan===v.ean?'selected':''}>${v.navn}</option>`;});
  html+=`</select>
    <label>Producent</label><select id="histLev"><option value="alle">Alle</option>`;
  [...new Set(aktive.map(v=>v.leverandor))].forEach(lev=>{html+=`<option value="${lev}" ${histLev===lev?'selected':''}>${lev}</option>`;});
  html+=`</select>
    <label>Ugedag</label><select id="histUgedag"><option value="alle">Alle</option>`;
  ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"].forEach(d=>{html+=`<option value="${d}" ${histUgedag===d?'selected':''}>${d}</option>`;});
  html+=`</select>
    <div class="small-muted">Periode: ${fmtDateDK(dates[dates.length-1])} – ${fmtDateDK(dates[0])}</div>
  </div>`;

  let filteredDates=histUgedag==='alle'?dates:dates.filter(date=>weekdayName(date)===histUgedag);
  const showVarer=(histVareEan==='alle'?aktive:aktive.filter(v=>v.ean===histVareEan)).filter(v=>histLev==='alle'||v.leverandor===histLev);

  if(!showVarer.length){html+=`<div class="card empty">Ingen varer matcher filter.</div>`;app.innerHTML=html;wireAdminBackRow();return;}

  // Uge for uge
  let weekBuckets={};
  filteredDates.forEach(date=>{const d=isoToUTCDate(date);const key=d.getUTCFullYear()+"-U"+String(isoWeek(d)).padStart(2,'0');if(!weekBuckets[key])weekBuckets[key]=[];weekBuckets[key].push(date);});
  const weekKeys=Object.keys(weekBuckets).sort();
  html+=`<div class="card"><h2>Uge for uge</h2><table><tr><th>Uge</th><th>Vare</th><th>Gns. modtaget</th><th>Gns. kl.13</th><th>Gns. luk</th></tr>`;
  weekKeys.forEach(wk=>{showVarer.forEach(v=>{const s=summarize(v.ean,weekBuckets[wk]);if(!s.regDays)return;html+=`<tr><td>${wk}</td><td>${v.navn}</td><td>${s.gnsModtaget}</td><td>${s.gnsKl13}</td><td>${s.gnsLuk}</td></tr>`;});});
  html+=`</table></div>`;

  // Dagsoversigt
  html+=`<div class="card"><h2>Dagsoversigt</h2>
    <div class="date-row" id="histDateRow" style="cursor:pointer; color:var(--green-d); margin-bottom:10px;">
      <span class="date-text">${fmtDateDK(histDate)}</span>
    </div>
    <input type="date" id="histDatePicker" style="position:absolute; opacity:0; width:1px; height:1px;">`;
  const histDates56=periodDates(56).filter(d=>d<histDate);
  // Byg visningsliste: inkl. slettede varer der har registreringer på den valgte dato
  const dayRegsForHist=REGS[histDate]||{};
  const eanerMedReg=Object.keys(dayRegsForHist).filter(k=>!k.startsWith('_'));
  // Flet showVarer + ean'er fra registreringer der ikke er i showVarer
  const extraEans=eanerMedReg.filter(ean=>!showVarer.find(v=>v.ean===ean));
  const allHistVarer=[
    ...showVarer,
    ...extraEans.map(ean=>({ean,navn:'Slettet vare',leverandor:'–',slettet:true}))
  ];
  html+=`<table><tr><th>Vare</th><th>Modtaget</th><th>${getPrimaertMP().label}</th><th>Luk</th><th>Solgt</th><th>Forecast</th><th>Afvigelse</th></tr>`;
  allHistVarer.forEach(v=>{
    const r=REGS[histDate]&&REGS[histDate][v.ean];
    const sold=soldOn(histDate,v.ean);
    let forecastVal='–',afvigelseTxt='–';
    if(!v.slettet&&histDates56.length>=2){
      try{const f=computeForecast(v.ean,histDate,histDates56);forecastVal=''+f.anbefalet;
      if(sold!=null){const diff=sold-f.anbefalet;afvigelseTxt=diff===0?'Præcist':((diff>0?'+':'')+diff+' stk.');}}catch(e){}
    }
    const memEntry=AI_MemoryEngine.getOutcomesForVare(v.ean).find(o=>o.date===histDate);
    const devColor=memEntry&&memEntry.pctDeviation!=null?(Math.abs(memEntry.pctDeviation)<=15?'color:var(--green);':'color:var(--red);'):'';
    const nameDisplay=v.slettet?`<span style="color:var(--muted);font-style:italic;">Slettet vare (${v.ean})</span>`:v.navn;
    html+=`<tr><td>${nameDisplay}</td><td>${r&&r.modtaget!=null?r.modtaget:'–'}</td>
      <td>${(()=>{const pf=mpFieldKey(getPrimaertMP());const val=r&&(r[pf]??r.kl13);return val!=null?val:'–';})()}</td>
      <td>${r&&r.luk!=null?r.luk:'–'}</td><td>${sold!=null?sold:'–'}</td>
      <td>${forecastVal}</td>
      <td style="${devColor}">${afvigelseTxt}${memEntry&&memEntry.pctDeviation!=null?` (${memEntry.pctDeviation>=0?'+':''}${memEntry.pctDeviation}%)`:''}
      </td></tr>`;
  });
  html+=`</table></div>`;

  // Sammenligning
  function sumSalg(ds){let t=0;showVarer.forEach(v=>{ds.forEach(date=>{const r=REGS[date]&&REGS[date][v.ean];if(r&&r.modtaget!=null&&r.luk!=null)t+=r.modtaget-r.luk;});});return t;}
  function pctDiff(a,b){if(!b)return a===0?'0%':'–';const p=Math.round(((a-b)/b)*100);return(p>=0?'+':'')+p+'%';}
  const last7=periodDates(7),prev7=periodDates(14).slice(7,14);
  const last30=periodDates(30),prev30=periodDates(60).slice(30,60);
  html+=`<div class="card"><h2>Sammenligninger</h2><table>
    <tr><th></th><th>Periode</th><th>Forrige</th><th>Ændring</th></tr>
    <tr><td>Uge vs. forrige</td><td>${sumSalg(last7)}</td><td>${sumSalg(prev7)}</td><td>${pctDiff(sumSalg(last7),sumSalg(prev7))}</td></tr>
    <tr><td>30 dage vs. forrige</td><td>${sumSalg(last30)}</td><td>${sumSalg(prev30)}</td><td>${pctDiff(sumSalg(last30),sumSalg(prev30))}</td></tr>
  </table></div>`;

  app.innerHTML=html;wireAdminBackRow();
  app.querySelectorAll('[data-period]').forEach(el=>{el.addEventListener('click',()=>{const val=el.dataset.period;histPeriod=val==='ytd'?'ytd':parseInt(val,10);renderAdminHistorik();});});
  $('#histVare').addEventListener('change',e=>{histVareEan=e.target.value;renderAdminHistorik();});
  $('#histLev').addEventListener('change',e=>{histLev=e.target.value;renderAdminHistorik();});
  $('#histUgedag').addEventListener('change',e=>{histUgedag=e.target.value;renderAdminHistorik();});
  $('#histDateRow').addEventListener('click',()=>{const dp=$('#histDatePicker');dp.value=histDate;dp.showPicker?dp.showPicker():dp.click();});
  $('#histDatePicker').addEventListener('change',e=>{if(e.target.value){histDate=e.target.value;renderAdminHistorik();}});
  ensureWeatherAuto(histDate,()=>currentTab==='admin-historik'&&histDate===histDate);
}

/* =====================================================================
   UI – MØNSTRE & KALENDER (fra v1.0 med AI-berigelse)
   ===================================================================== */
function renderAdminMonstre(){
  const aktive=VARER.filter(v=>v.aktiv);
  if(!aktive.length){app.innerHTML=adminBackRow()+`<div class="card empty">Ingen aktive varer endnu.</div>`;wireAdminBackRow();return;}
  const dates=periodDates(56);
  const dayNames=["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
  const dayIdx=[1,2,3,4,5,6,0];
  let html=adminBackRow()+`<div class="card"><h2>Ugedagsmønster</h2>
    <div class="small-muted" style="margin-bottom:8px;">Gennemsnit pr. ugedag (seneste 8 uger).</div>`;
  aktive.forEach(v=>{
    html+=`<h3>${v.navn}</h3><table><tr><th>Dag</th><th>Gns. modtaget</th><th>Gns. kl.13</th><th>Gns. luk</th></tr>`;
    dayIdx.forEach((dn,i)=>{const dDates=dates.filter(date=>isoToUTCDate(date).getUTCDay()===dn);const s=summarize(v.ean,dDates);html+=`<tr><td>${dayNames[i]}</td><td>${s.gnsModtaget||'–'}</td><td>${s.gnsKl13||'–'}</td><td>${s.gnsLuk||'–'}</td></tr>`;});
    html+=`</table>`;
  });
  html+=`</div>`;

  // AI-mønstre
  html+=`<div class="card"><h2>🧠 AI-fundne mønstre</h2>
    <div class="small-muted" style="margin-bottom:8px;">Statistisk analyseret fra butikkens egne data + læringshukommelse.</div>`;
  aktive.forEach(v=>{
    const mined=Pattern_Engine.mine(v.ean,v.navn,dates);
    if(!mined.dataReady){html+=`<div class="small-muted">${v.navn}: Kræver flere registreringer (${mined.observationCount} dage).</div>`;return;}
    html+=`<div style="margin-bottom:10px;"><div class="name" style="margin-bottom:6px;">${v.navn}</div>`;
    if(!mined.patterns.length)html+=`<div class="small-muted">Ingen signifikante mønstre fundet endnu.</div>`;
    else{
      mined.patterns.slice(0,4).forEach(p=>{
        html+=`<div style="padding:6px 0; font-size:13px; border-bottom:1px solid var(--border);">
          ${p.label} <span class="small-muted">(${p.confidence}% sikkerhed · ${p.observations} obs.)</span>
          <div class="progress-bar" style="margin-top:3px;"><div class="progress-fill ai" style="width:${p.confidence}%;"></div></div>
        </div>`;
      });
    }
    html+=`</div>`;
  });
  html+=`</div>`;

  // Tendens
  const dates14=periodDates(14);
  html+=`<div class="card"><h2>Tendens</h2>`;
  aktive.forEach(v=>{const t=vareTrend(v.ean,dates14);html+=`<div class="row"><div class="name">${v.navn}</div><div class="sub">${t.arrow} ${t.label}</div></div>`;});
  html+=`</div>`;

  // Effekter
  function totalSoldOnDate(date){let total=0,any=false;aktive.forEach(v=>{const s=soldOn(date,v.ean);if(s!=null){total+=s;any=true;}});return any?total:null;}
  function tagEffect(predicate){
    const withTag=[],withoutTag=[];
    dates.forEach(date=>{const t=totalSoldOnDate(date);if(t==null)return;if(predicate(date))withTag.push(t);else withoutTag.push(t);});
    if(withTag.length<2||withoutTag.length<2)return null;
    const a=avg(withTag),b=avg(withoutTag);if(!b)return null;
    return Math.round(((a-b)/b)*100);
  }
  const ferieEff=tagEffect(date=>{const tags=getEffectiveTags(date).tags;return FERIE_KEYS.some(k=>tags[k]);});
  const lonEff=tagEffect(date=>getEffectiveTags(date).tags.lonweekend);
  const solEff=tagEffect(date=>{const w=getDayWeather(date);return w.sol&&w.temp!=null&&w.temp>20;});
  const regnEff=tagEffect(date=>getDayWeather(date).regn);
  const evEff=tagEffect(date=>getActiveEvents(date).length>0);

  [[ferieEff,'Ferieeffekt'],[lonEff,'Lønweekend-effekt'],[solEff,'Sol >20° effekt'],[regnEff,'Regnvejrseffekt'],[evEff,'Lokale arrangementer']].forEach(([eff,label])=>{
    html+=`<div class="card"><h2>${label}</h2>`;
    html+=eff!=null?`<div class="suggestion ai">Salget er ${(eff>=0?'+':'')+eff}% sammenlignet med normale dage.</div>`:
      `<div class="small-muted">Kræver flere registreringer.</div>`;
    html+=`</div>`;
  });

  // Handelskalender
  html+=`<div class="card"><h2>Handelskalender</h2>
    <div class="date-row" id="calDateRow" style="cursor:pointer; color:var(--green-d); margin-bottom:10px;">
      <span class="date-text" id="calDateLabel">${fmtDateDK(calDate)}</span>
    </div>

function renderAdminVarer(){
  let html=adminBackRow();
  html+='<div class="card"><h2>Tilføj vare</h2>'

    +'<button class="btn-secondary" id="scanBtn" style="white-space:nowrap;margin-top:0;width:auto;">📷 Scan</button>'
    +'</div>'
    +'<label>Varenavn <span style="color:var(--red);">*</span></label>'
    +'<input type="text" id="newNavn" placeholder="f.eks. Solsikkerugbrød">'
    +'<button class="btn-primary" id="addVare" style="margin-top:10px;">Tilføj vare</button>'
    +'<div id="addErr" class="small-muted" style="color:var(--red);margin-top:6px;"></div>'
    +'</div>';

  html+='<div class="card"><h2>Varer ('+VARER.length+')</h2>';
  if(!VARER.length){
    html+='<div class="empty">Ingen varer endnu.</div>';
  } else {
    VARER.forEach(function(v){
      var lc=AI_MemoryEngine.getOutcomesForVare(v.ean).length;
      var aiTekst=lc>0?' · AI: '+lc+' dage':'';
      var aktivKls=v.aktiv?'active-toggle':'inactive-toggle';
      var aktivTxt=v.aktiv?'Aktiv':'Inaktiv';
      html+='<div class="row" style="display:block;padding:12px 0;">'
          +'<div style="display:flex;justify-content:space-between;align-items:center;">'
          +'<div>'
          +'<div class="name">'+v.navn+'</div>'
          +'<div class="sub">'+(v.leverandor||'Ukendt')+' · EAN '+v.ean+aiTekst+'</div>'
          +'</div>'
          +'<div style="display:flex;gap:8px;flex-shrink:0;">'
          +'<button class="btn-toggle '+aktivKls+'" onclick="__varerToggleAktiv(\''+v.ean+'\')">'+aktivTxt+'</button>'
          +'<button class="btn-toggle" onclick="__varerSlet(\''+v.ean+'\')" style="background:var(--red);color:#fff;font-weight:700;padding:10px 16px;">Slet</button>'
          +'</div>'
          +'</div>'
          +'</div>';
    });
  }
  html+='</div>';
  app.innerHTML=html;
  wireAdminBackRow();

  var scanBtn=document.getElementById('scanBtn');
  if(scanBtn) scanBtn.addEventListener('click',function(){
    if(typeof FreshScanScanner==='undefined'){alert('Scanner ikke tilgængelig.');return;}
    FreshScanScanner.start(function(ean){var el=document.getElementById('newEan');if(el)el.value=ean;});
  });

  var addBtn=document.getElementById('addVare');
  if(addBtn) addBtn.addEventListener('click',async function(){
    var ean=document.getElementById('newEan').value.trim();
    var navn=document.getElementById('newNavn').value.trim();
    var errEl=document.getElementById('addErr');
    errEl.textContent='';
    if(!ean){errEl.textContent='EAN-nummer er påkrævet.';return;}
    if(!navn){errEl.textContent='Varenavn er påkrævet.';return;}
    if(VARER.some(function(v){return v.ean===ean;})){errEl.textContent='EAN findes allerede.';return;}
    VARER.push({ean:ean,navn:navn,leverandor:'Ukendt',aktiv:true,omraade:''});
    await saveVarerAuto();
    renderAdminVarer();
  });
}

// Globale handlers for Aktiv-toggle og Slet (onclick kompatible med alle browsere)
window.__varerToggleAktiv=async function(ean){
  var v=VARER.find(function(x){return x.ean===ean;});
  if(!v)return;
  v.aktiv=!v.aktiv;
  await saveVarerAuto();
  renderAdminVarer();
};
window.__varerSlet=async function(ean){
  var v=VARER.find(function(x){return x.ean===ean;});
  if(!v)return;
  if(!confirm('Er du sikker på, at varen skal slettes?\n\n'+v.navn+'\n\nHistorik og registreringer bevares.'))return;
  // Slet KUN fra VARER — REGS og AI-hukommelse røres IKKE
  VARER=VARER.filter(function(x){return x.ean!==ean;});
  await saveVarerAuto();
  renderAdminVarer();
};

    <button class="btn-secondary" id="adminResetDemo" style="color:var(--red);">⚠️ Nulstil demo</button>
  </div>`;
  app.innerHTML=html;wireAdminBackRow();
  $('#adminChangePin').addEventListener('click',async()=>{

    if(!cur||!nw||!conf){result.textContent='❌ Udfyld alle felter.';return;}

    if(!/^\d{4,8}$/.test(nw)){result.textContent='❌ Ny PIN skal være 4-8 cifre.';return;}
    if(nw!==conf){result.textContent='❌ Ny PIN og gentagelse stemmer ikke overens.';return;}

  });
  $('#adminExport').addEventListener('click',async()=>{

      const backup={version:'FreshScan AI v2.0',exportedAt:new Date().toISOString(),VARER,REGS,SETTINGS,EVENTS,AI_MEMORY:AI_MemoryEngine.getMemory()};
      const json=safeStringify(backup);const blob=new Blob([json],{type:'application/json'});

      if(data.VARER)VARER=data.VARER;if(data.REGS)REGS=data.REGS;
      if(data.SETTINGS){const{kundeNavn,logo,accentColor,...rest}=data.SETTINGS;SETTINGS=Object.assign({...SETTINGS},rest);}
      if(data.EVENTS)EVENTS=data.EVENTS;
      if(data.AI_MEMORY){storageSet('ai_memory',JSON.stringify(data.AI_MEMORY));AI_MemoryEngine.load();}

  $('#adminDeleteAI').addEventListener('click',async()=>{
    if(!confirm('Nulstil AI-læringsdata? Dette sletter præcisionsmålinger og bias-korrektioner. Registreringer bevares.'))return;
    AI_MemoryEngine.clear();alert('AI-læringsdata nulstillet.');renderAdminSettings();
  });
  $('#adminResetDemo').addEventListener('click',async()=>{
    if(!confirm('Sletter ALT inkl. AI-læringsdata. Fortsæt?'))return;
    if(!confirm('Sidste bekræftelse – kan ikke fortrydes.'))return;
    const keepBrand={kundeNavn:SETTINGS.kundeNavn,logo:SETTINGS.logo,accentColor:SETTINGS.accentColor};
    VARER=[];REGS={};EVENTS=[];AI_MemoryEngine.clear();
    SETTINGS={...DEFAULT_SETTINGS,...keepBrand,malepunkter:DEFAULT_MALEPUNKTER.map(m=>({...m}))};
    await saveVarerAuto();await saveRegsAuto();await saveSettingsAuto();await saveEventsAuto();
    await loadAll();alert('Nulstillet.');currentTab='admin';render();
  });
}

const FreshScanScanner=(function(){
  let stream=null,detectInterval=null,zxingReader=null,active=false;
  let _lastScanned=null,_lastScannedAt=null,_lastError=null,_cameraFound=false,_scannerReady=false;
  function getEls(){return{modal:document.getElementById('scanModal'),video:document.getElementById('scanVideo'),status:document.getElementById('scanStatus')};}
  function stop(){
    active=false;_scannerReady=false;
    if(detectInterval){clearInterval(detectInterval);detectInterval=null;}
    if(zxingReader){try{zxingReader.reset();}catch(e){}zxingReader=null;}
    if(stream){try{stream.getTracks().forEach(t=>t.stop());}catch(e){}stream=null;}
    const{modal,video}=getEls();
    if(video){try{video.pause();}catch(e){}video.srcObject=null;}
    if(modal)modal.style.display='none';
  }
  // iPhone/iPad Safari (og iOS-baserede browsere som alle bruger WebKit under motorhjelmen):
  // dækker "iPhone/iPod/iPad" i UA samt iPadOS 13+, der i desktop-tilstand udgiver sig for MacIntel.
  function isIOSDevice(){
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
           (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  }
  function supportLevel(){
    const hasCamera=!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia);
    if(!hasCamera)return'none';
    // Safari/iOS' indbyggede BarcodeDetector er ustabil (kan lukke kameraet/stoppe scanning uden varsel) —
    // brug derfor altid ZXing-fallback på iPhone/iPad, uanset om API'et findes i window.
    if(isIOSDevice())return'fallback';
    if('BarcodeDetector' in window)return'native';
    return'fallback';
  }
  function getStatus(){return{lastScanned:_lastScanned,lastScannedAt:_lastScannedAt,lastError:_lastError,cameraFound:_cameraFound,scannerReady:_scannerReady,supportLevel:supportLevel()};}

  // Vent til videoen reelt leverer billeddata (readyState >= 2 = HAVE_CURRENT_DATA).
  // Lukker ALDRIG scanneren selv — falder blot igennem efter kort sikkerhedsfrist,
  // så scan-loopet altid startes, også hvis 'loadeddata' undtagelsesvis ikke fyrer.
  function waitForVideoReady(video){
    return new Promise(resolve=>{
      if(video.readyState>=2){resolve();return;}
      const onReady=()=>{video.removeEventListener('loadeddata',onReady);resolve();};
      video.addEventListener('loadeddata',onReady);
      setTimeout(()=>{video.removeEventListener('loadeddata',onReady);resolve();},1500);
    });
  }

  // ZXing læser frames direkte fra vores allerede-kørende <video>-element.
  // ZXing åbner IKKE sit eget kamera her (decodeFromVideoElementContinuously, ikke decodeFromVideoDevice) —
  // det undgår to samtidige kamera-streams, som tidligere fik kameraet til at fryse/lukke på mobil.
  async function startZXingLoop(video,status,onDetected){
    try{
      await new Promise((res,rej)=>{
        if(window.ZXing){res();return;}
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.21.3/umd/index.min.js';
        s.onload=res;
        s.onerror=()=>rej(new Error('Kunne ikke indlæse scanner-bibliotek'));
        document.head.appendChild(s);
      });
    }catch(e){
      // Kun scanner-biblioteket manglede at kunne indlæses — det er IKKE en kamerafejl.
      // Kameraet forbliver derfor åbent (krav 8): brugeren ser stadig levende billede
      // og kan altid taste EAN manuelt eller trykke Annuller selv.
      if(!active)return;
      _lastError=errMsg(e);
      status.textContent='⚠️ Auto-scanning utilgængelig lige nu — indtast EAN manuelt, eller vent og prøv igen.';
      return;
    }
    if(!active)return;
    try{
      // ZXing venter internt på et 'playing'-event på videoen, før den starter sit scan-loop.
      // Vores video kører allerede, så det event er formentlig allerede fyret og kommer ikke igen —
      // det ville få ZXing til at hænge og aldrig begynde at scanne. En kort pause + ZXings eget
      // play()-kald udløser et FRISK 'playing'-event, uden at kameraet lukkes eller genåbnes.
      try{video.pause();}catch(e){}
      zxingReader=new window.ZXing.BrowserMultiFormatReader();
      // VIGTIGT: decodeFromVideoElementContinuously (ikke decodeFromVideoElement) — kun denne
      // variant scanner løbende billede efter billede fra vores eksisterende <video>-element.
      // decodeFromVideoElement uden "Continuously" laver kun ÉT enkelt afkodningsforsøg og
      // tager ingen callback, hvilket ville stoppe scanningen efter første (formentlig
      // mislykkede) forsøg.
      zxingReader.decodeFromVideoElementContinuously(video,(result)=>{
        if(!active)return;
        if(result){
          const text=result.getText();
          _lastScanned=text;_lastScannedAt=new Date().toISOString();
          stop();onDetected(text);
        }
        // Intet resultat i dette billede -> ZXing kalder blot igen ved næste frame. Fortsæt uændret, luk ikke.
      });
    }catch(e){
      // Selve afkodningen kunne ikke startes — heller ikke en kamerafejl (krav 8), så kameraet forbliver åbent.
      if(!active)return;
      _lastError=errMsg(e);
      status.textContent='⚠️ Auto-scanning utilgængelig lige nu — indtast EAN manuelt, eller vent og prøv igen.';
    }
  }

  async function start(onDetected){
    if(active)stop();active=true;_lastError=null;_cameraFound=false;_scannerReady=false;
    const{modal,video,status}=getEls();
    if(!modal||!video||!status){alert('Scanneren kunne ikke åbnes.');active=false;_lastError='DOM-elementer mangler';return;}
    modal.style.display='flex';status.textContent='📷 Åbner kamera...';
    const support=supportLevel();
    if(support==='none'){status.textContent='❌ Scanner understøttes ikke på denne enhed. Indtast EAN manuelt.';_lastError='Ingen kamera/getUserMedia';active=false;return;}

    // ÉT getUserMedia-kald uanset native/fallback — undgår dobbelt kamera-åbning på alle enheder.
    // Fejl herfra er den ENESTE grund til at vise en fejl og lukke scanneren (krav 8).
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    }catch(e){
      status.textContent='❌ Kamera ikke tilgængeligt: '+errMsg(e)+'. Indtast EAN manuelt.';
      _lastError=errMsg(e);active=false;return;
    }
    if(!active){try{stream.getTracks().forEach(t=>t.stop());}catch(e){}stream=null;return;}
    _cameraFound=true;
    video.srcObject=stream;
    try{await video.play();}catch(e){/* Afspilning kan starte en anelse forsinket på iOS — ikke fatalt, ingen luk */}

    await waitForVideoReady(video);
    if(!active)return;

    status.textContent='✅ Kamera fundet · Scanner klar – hold stregkoden i rammen';
    _scannerReady=true;

    if(support==='native'){
      let detector;
      try{
        detector=new window.BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e']});
      }catch(e){
        // Native detector kunne uventet ikke oprettes — fald tilbage til ZXing i stedet for at lukke kameraet.
        _lastError=errMsg(e);
        startZXingLoop(video,status,onDetected);
        return;
      }
      detectInterval=setInterval(async()=>{
        if(!active)return;
        try{
          const codes=await detector.detect(video);
          if(codes&&codes.length){
            const raw=codes[0].rawValue;
            _lastScanned=raw;_lastScannedAt=new Date().toISOString();
            stop();onDetected(raw);
          }
        }catch(e){_lastError=errMsg(e);} // Intet fundet i dette billede -> fortsæt uændret, luk ikke.
      },250);
      return;
    }

    // Fallback (bruges altid på iPhone/iPad, jf. supportLevel()).
    startZXingLoop(video,status,onDetected);
  }
  return{start,stop,supportLevel,getStatus};
})();
window.startBarcodeScanner=function(callback){FreshScanScanner.start(function(ean){if(callback)callback(ean);});};

/* =====================================================================
   STREGKODESCANNING TIL REGISTRERING  (nyt)
   ---------------------------------------------------------------------
   Hurtig vej: Forside -> Scan stregkode -> kamera aabner -> EAN laeses.
   - Kendt EAN: vare vaelges automatisk, hop direkte til antal-registrering.
   - Ukendt EAN: "Ny vare fundet"-modal, brugeren skriver kun varenavn.
   - Manuel indtastning er altid muligt og er ikke et krav.
   ===================================================================== */
function __scanSupportLevel(){
  try{ return FreshScanScanner.supportLevel(); }catch(e){ return 'none'; }
}

function __startQuickScan(){
  if(__scanSupportLevel()==='none'){
    newRegState=null; currentTab='newreg'; render();
    return;
  }
  FreshScanScanner.start(function(ean){
    __handleScannedEAN(ean);
  });
}

function __handleScannedEAN(ean){
  ean=(ean||'').trim();
  if(!ean){ return; }
  var v=VARER.find(function(x){return x.ean===ean;});
  if(v){
    if(!v.aktiv){
      alert('Varen "'+v.navn+'" findes, men er markeret som inaktiv. Aktivér den under Admin -> Varer for at registrere.');
      currentTab='home'; render();
      return;
    }
    var mp=activeRegMP();
    newRegState={mp:mp,queue:[ean],idx:0,photo:null,kommentar:''};
    currentTab='newreg';
    render();
  } else {
    __showNewVareFromScan(ean);
  }
}

function __showNewVareFromScan(ean){
  var overlay=document.createElement('div');
  overlay.className='sheet-overlay';
  overlay.style.display='block';
  overlay.id='__newVareScanOverlay';
  overlay.innerHTML=
    '<div class="sheet">'
    +'<div class="sheet-handle"></div>'
    +'<div style="text-align:center;margin-bottom:14px;">'
    +'<div style="font-size:36px;margin-bottom:6px;">📷✨</div>'
    +'<h2 style="margin:0;">Ny vare fundet</h2>'
    +'<div class="small-muted" style="margin-top:4px;">EAN '+ean+' findes ikke i varekartoteket endnu.</div>'
    +'</div>'
    +'<label>EAN-nummer</label>'
    +'<input type="text" id="__scanNewEan" value="'+ean+'" readonly style="background:#eef2ef;">'
    +'<label>Varenavn</label>'
    +'<input type="text" id="__scanNewNavn" placeholder="f.eks. Solsikkerugbrød" autofocus>'
    +'<div id="__scanNewErr" class="small-muted" style="color:var(--red);min-height:18px;margin-bottom:6px;"></div>'
    +'<button class="btn-primary" id="__scanNewSave">Gem som ny vare</button>'
    +'<button class="btn-secondary" id="__scanNewCancel">Annuller</button>'
    +'</div>';
  document.body.appendChild(overlay);

  function closeOverlay(){
    var el=document.getElementById('__newVareScanOverlay');
    if(el) el.remove();
  }

  overlay.addEventListener('click',function(e){ if(e.target===overlay) closeOverlay(); });
  document.getElementById('__scanNewCancel').addEventListener('click',function(){ closeOverlay(); });
  document.getElementById('__scanNewSave').addEventListener('click',async function(){
    var navn=document.getElementById('__scanNewNavn').value.trim();
    var errEl=document.getElementById('__scanNewErr');
    errEl.textContent='';
    if(!navn){ errEl.textContent='Indtast varenavn.'; return; }
    if(VARER.some(function(x){return x.ean===ean;})){ errEl.textContent='Varen findes allerede.'; return; }
    VARER.push({ean:ean,navn:navn,leverandor:'Ukendt',aktiv:true,omraade:''});
    await saveVarerAuto();
    closeOverlay();
    var mp=activeRegMP();
    newRegState={mp:mp,queue:[ean],idx:0,photo:null,kommentar:''};
    currentTab='newreg';
    render();
  });
}


/* =====================================================================
   INIT
   ===================================================================== */

(async()=>{
  try{ await initApp(); }catch(e){
    console.error('[FreshScan] initApp() crashed:', errMsg(e));
    try{
      if(!Array.isArray(VARER)||!VARER.length)VARER=[{ean:"5701234500011",navn:"Solsikkerugbrød",leverandor:"Kohberg",aktiv:true},{ean:"5701234500028",navn:"Kernerugbrød",leverandor:"Schulstad",aktiv:true},{ean:"5701234500035",navn:"Fuldkorn",leverandor:"Kohberg",aktiv:true}];
      if(!REGS||typeof REGS!=='object')REGS={};
      if(!SETTINGS||typeof SETTINGS!=='object')SETTINGS={...DEFAULT_SETTINGS,malepunkter:DEFAULT_MALEPUNKTER.map(m=>({...m}))};
      if(!Array.isArray(EVENTS))EVENTS=[];
      try{AI_MemoryEngine.load();}catch(ae){}
      currentTab='home';render();
      // Demo-tilstand: ingen synlig tekst på forsiden
    }catch(e2){const appEl=document.getElementById('app');if(appEl)appEl.innerHTML='<div class="card empty" style="margin:20px;">FreshScan AI kunne ikke indlæses. Genindlæs siden.</div>';}
  }
  setTimeout(()=>{
    try{ensureWeatherAuto(todayISO(),()=>currentTab==='home');}catch(e){}
    try{ensureWeatherAuto(tomorrowISO(),()=>currentTab==='home');}catch(e){}
  },2000);
})();

</script>
