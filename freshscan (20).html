function adminBackRow(){
  return `<div class="back-row" id="adminBackRow"><span class="ico">←</span><span class="lbl">Administrator</span></div>`;
}
function wireAdminBackRow(){
  const el = $('#adminBackRow');
  if(el) el.addEventListener('click', ()=>{ currentTab='admin'; render(); });
}
function renderAdminDashboard(){
  const aktive = VARER.filter(v=>v.aktiv);
  if(aktive.length===0){
    app.innerHTML = adminBackRow() + `<div class="card empty">Ingen aktive varer endnu.</div>`;
    wireAdminBackRow();
    return;
  }

  const hasAnyData = Object.keys(REGS).some(date=>
    REGS[date] && Object.values(REGS[date]).some(r=>
      r.modtaget!=null || r.kl13!=null || r.luk!=null || Object.keys(r).some(k=>k.startsWith("mp_") && r[k]!=null)));

  if(!hasAnyData){
    app.innerHTML = adminBackRow() + `<div class="card" style="text-align:center;">
      <h2>Ingen registreringer endnu</h2>
      <p class="small-muted">Der er endnu ingen registreringer.</p>
      <button class="btn-primary" id="goToReg">Start ny registrering</button>
    </div>`;
    wireAdminBackRow();
    $('#goToReg').addEventListener('click', ()=>{
      newRegState = null;
      currentTab = 'newreg';
      render();
    });
    return;
  }
  const dates14 = Array.from({length:14}, (_,i)=>isoDaysAgo(i));
  const dates7 = dates14.slice(0,7);
  const today = REGS[currentDate] || {};

  // ---- Forecast for i morgen (bruges af "Dagens Forecast" og "Smart Forecast") ----
  const dates56 = periodDates(56);
  const tDate = tomorrowISO();
  const tWeekday = weekdayName(tDate);
  const tEffective = getEffectiveTags(tDate);
  const tWeatherDisp = weatherForDisplay(tDate);
  const tWeather = tWeatherDisp.w;
  const tEvents = getActiveEvents(tDate);
  const forecasts = {};
  let anyLowQuality = false;
  aktive.forEach(v=>{
    const f = computeForecast(v.ean, tDate, dates56);
    forecasts[v.ean] = f;
    if(f.quality!=='ok') anyLowQuality = true;
  });

  // ---- Dagens Forecast (topkort) ----
  const TAG_EMOJI = {
    tilbudsavis:'📰', lonweekend:'💰', vinterferie:'🏖', paaskeferie:'🏖',
    sommerferie:'🏖', efterarsferie:'🏖', juleferie:'🎄', helligdag:'🎉', turistsaeson:'🧳'
  };
  const fcChips = [];
  if(tWeather.sne) fcChips.push('❄️ Sne');
  else if(tWeather.regn) fcChips.push('🌧️ Regn');
  else if(tWeather.sol) fcChips.push('☀️ Sol');
  if(tWeather.temp!=null) fcChips.push('maks. '+tWeather.temp+'°C');
  if(tWeather.vind) fcChips.push(tWeather.vindHard ? '💨 Kraftig vind' : '💨 Vind');
  CAL_TAGS.forEach(t=>{
    if(t.key!=='lokalt' && tEffective.tags[t.key]){
      fcChips.push(`${TAG_EMOJI[t.key]||''} ${t.label}`.trim());
    }
  });
  tEvents.forEach(e=> fcChips.push(`🎪 ${e.navn}`));
  if(fcChips.length===0) fcChips.push('Normal dag');

  const avgTotalPct = avg(aktive.map(v=>forecasts[v.ean].totalPct*100));
  const avgConfidence = Math.round(avg(aktive.map(v=>forecasts[v.ean].confidence.pct)));

  let html = adminBackRow() + `<div class="card">
    <h2>Dagens Forecast</h2>
    <div class="small-muted" style="margin-bottom:8px;">Forventet i morgen (${tWeekday} d. ${fmtDateDK(tDate).split(' ').slice(1).join(' ')}):</div>
    <div class="name" style="margin-bottom:10px;">${fcChips.join(' · ')}</div>
    <div class="topcards">
      <div class="topcard">
        <div class="num">${avgTotalPct>=0?'+':''}${Math.round(avgTotalPct)}%</div>
        <div class="lbl">Anbefalet produktion</div>
      </div>
      <div class="topcard">
        <div class="num">${avgConfidence}%</div>
        <div class="lbl">Forecast sikkerhed</div>
      </div>
    </div>
  </div>`;

  // ---- AI Indsigt ----
  html += `<div class="card"><h2>🧠 AI Indsigt</h2>
    <div class="small-muted" style="margin-bottom:10px;">De vigtigste observationer fundet i jeres egne data.</div>`;
  let aiInsights = [];
  try{ aiInsights = AI_Engine.topInsights(aktive, dates56).filter(i=>i.confidence>=55); }catch(e){ console.error('AI_Engine.topInsights error:', errMsg(e)); }
  if(aiInsights.length===0){
    html += `<div class="small-muted">FreshAI lærer stadig butikkens salgsmønstre.</div>`;
  } else {
    aiInsights.forEach(ins=>{
      html += `<div style="padding:5px 0; font-size:14px;">• ${ins.richText} <span class="small-muted" style="font-size:11px;">(${ins.confidence}% sikkerhed)</span></div>`;
    });
  }
  html += `</div>`;

  // ---- AI vurdering: udsolgt-risiko, diskret rådgivning (ikke automatisk handling) ----
  html += `<div class="card"><h2>🧠 AI vurdering</h2>
    <div class="small-muted" style="margin-bottom:10px;">Risiko for udsolgt efter ${getPrimaertMP().label.toLowerCase()}:</div>`;
  aktive.forEach(v=>{
    const f = forecasts[v.ean];
    if(!f) return;
    const riskColor = f.risk.level==='Høj' ? 'var(--red)' : (f.risk.level==='Mellem' ? '#8a6213' : 'var(--muted)');
    const riskText = f.risk.sharePct>0 ? f.risk.level : 'Ingen risiko';
    html += `<div class="row"><div class="name">${v.navn}</div><div style="color:${riskColor}; font-weight:600;">${riskText}</div></div>`;
  });
  const hojRisikoVarer = aktive.filter(v=>forecasts[v.ean] && forecasts[v.ean].risk.level==='Høj');
  if(hojRisikoVarer.length){
    const eksempel = hojRisikoVarer[0];
    const f = forecasts[eksempel.ean];
    html += `<div class="small-muted" style="margin-top:10px;">Begrundelse: ${forecastExplanation(eksempel, f)}</div>
      <div style="margin-top:6px;">Forslag: Overvej at bage ${f.anbefalet} ekstra ${eksempel.navn.toLowerCase()}. Du vælger selv – FreshAI bestiller aldrig automatisk.</div>`;
  }
  html += `</div>`;

  const pmp = getPrimaertMP();
  const pmpField = mpFieldKey(pmp);
  const pmpLabel = pmp.label;

  let withStock=0, withReg=0, udsolgte=0, lavRest=0, hojRestCnt=0, lukReg=0;
  aktive.forEach(v=>{
    const r = today[v.ean];
    if(r){
      const val = r[pmpField] ?? (pmpField==='mp_kl13' ? r.kl13 : null);
      if(val!=null){
        withReg++;
        if(val>0) withStock++;
        else udsolgte++;
      }
    }
    if(r && r.luk!=null){
      lukReg++;
      if(r.luk>=1 && r.luk<=2) lavRest++;
      else if(r.luk>4) hojRestCnt++;
    }
  });
  let servicegrad = withReg? Math.round((withStock/withReg)*100) : null;
  let sgEmoji='🟢';
  if(servicegrad!=null){
    if(servicegrad<80){ sgEmoji='🔴'; }
    else if(servicegrad<90){ sgEmoji='🟡'; }
  }

  html += `<div class="topcards">
    <div class="topcard">
      <div class="num">${sgEmoji} ${servicegrad!=null? servicegrad : 0}%</div>
      <div class="lbl">Servicegrad ${pmpLabel}</div>
    </div>
    <div class="topcard">
      <div class="num">🔴 ${udsolgte||0}</div>
      <div class="lbl">Udsolgte varer ${pmpLabel}</div>
    </div>
    <div class="topcard">
      <div class="num">🟡 ${lavRest||0}</div>
      <div class="lbl">Lav rest ved luk</div>
    </div>
    <div class="topcard">
      <div class="num">🔵 ${hojRestCnt||0}</div>
      <div class="lbl">Høj rest ved luk</div>
    </div>
  </div>
  <div class="card small-muted" style="text-align:center; margin-top:-4px;">
    ${withReg? withStock+' af '+withReg+' varer har beholdning ved '+pmpLabel+' i dag' : 'Ingen registrering for '+pmpLabel+' endnu i dag'}
  </div>`;

  // ---- Per-vare stats (14 dage) ----
  const stats = {};
  aktive.forEach(v=>{
    const s14 = summarize(v.ean, dates14);
    const s7 = summarize(v.ean, dates7);
    const trend = vareTrend(v.ean, dates14);
    stats[v.ean] = {v, s14, s7, trend};
  });

  // ---- Bestillingsforslag ----
  html += `<div class="card"><h2>Anbefalet bestilling næste uge</h2>
    <table><tr><th>Vare</th><th>Nuværende</th><th>Forslag</th><th>Udsolgt-risiko</th></tr>`;
  aktive.forEach(v=>{
    const s14 = stats[v.ean].s14, s7 = stats[v.ean].s7;
    const nuvarende = s14.gnsModtaget ? Math.round(s14.gnsModtaget) : 0;
    let forslag = nuvarende;
    const kl13ZeroShare = s7.regDays>0 ? s7.kl13zero/s7.regDays : 0;
    if(kl13ZeroShare > 0.25){
      forslag = nuvarende + (s7.kl13zero>=5 ? 2 : 1);
    } else if(s14.gnsLuk > 3){
      forslag = Math.max(0, nuvarende - (s14.gnsLuk>=6 ? 2 : 1));
    }
    const risk = forecasts[v.ean].risk;
    const riskColor = risk.level==='Høj' ? 'var(--red)' : (risk.level==='Mellem' ? '#8a6213' : 'var(--muted)');
    html += `<tr><td>${v.navn}</td><td>${nuvarende}</td><td><b>${forslag}</b></td><td style="color:${riskColor};">${risk.level}</td></tr>`;
  });
  html += `</table></div>`;

  // ---- Smart Forecast – næste dag ----
  html += `<div class="card"><h2>Smart Forecast – næste dag</h2>
    <div class="small-muted" style="margin-bottom:10px;">Forventet for ${tWeekday} d. ${fmtDateDK(tDate).split(' ').slice(1).join(' ')}.</div>`;
  aktive.forEach((v,i)=>{
    const f = forecasts[v.ean];
    const factorTxt = f.factors.length ? f.factors.map(fa=>{
      const p = Math.round(fa.pct*100);
      return `${p>=0?'+':''}${p}% ${fa.label.toLowerCase()}`;
    }).join(', ') : 'ingen særlige påvirkninger';
    const riskColor = f.risk.level==='Høj' ? 'var(--red)' : (f.risk.level==='Mellem' ? '#8a6213' : 'var(--muted)');
    html += `<div class="row" style="display:block; ${i>0?'border-top:1px solid var(--border); padding-top:10px;':''}">
      <div class="name" style="margin-bottom:4px;">${v.navn}</div>
      <table style="margin-bottom:6px;">
        <tr><th>Basis</th><th>Påvirkninger</th><th>Anbefaling</th></tr>
        <tr><td>${f.basis} stk.</td><td style="font-size:12px;">${factorTxt}</td><td><b>${f.anbefalet} stk.</b></td></tr>
      </table>
      <div class="small-muted">${forecastExplanation(v, f)}</div>
      <div style="display:flex; gap:14px; margin-top:6px; font-size:12px; align-items:center;">
        <div>Forecast sikkerhed: <b>${f.confidence.pct}%</b> (${f.confidence.label})</div>
        <div style="color:${riskColor};">Udsolgt-risiko: <b>${f.risk.level}</b></div>
      </div>
      <button class="btn-secondary" data-explain-ai="${v.ean}" style="margin-top:8px; font-size:13px; padding:6px 14px;">🔍 Forklar AI</button>
      <div id="aiExplain_${v.ean}" style="display:none; margin-top:10px;"></div>
    </div>`;
  });
  if(anyLowQuality){
    html += `<div class="suggestion yellow" style="margin-top:10px;">🟡 Der er endnu ikke nok historik til præcis forecast for alle varer. Forslag vises stadig, baseret på seneste registreringer.</div>`;
  }
  html += `</div>`;

  // ---- Dagens vejrstatus (i dag) ----
  const todayDisp = weatherForDisplay(todayISO());
  const todayW = todayDisp.w;
  const todayCurTemp = todayW.currentTemp!=null ? todayW.currentTemp : todayW.temp;
  html += `<div class="card"><h2>Dagens vejrstatus</h2>
    <div class="small-muted" style="margin-bottom:6px;">I dag (${fmtDateDK(todayISO())}) – aktuelt vejr:</div>`;
  if(todayCurTemp==null && !todayW.sol && !todayW.regn && !todayW.vind && !todayW.sne){
    html += `<div class="name">Intet vejr registreret endnu.</div>
      <div class="small-muted" style="margin-top:4px;">Automatisk vejr ikke tilgængeligt – forecast beregnes uden vejr.</div>`;
  } else {
    const wp = [];
    if(todayCurTemp!=null) wp.push(todayCurTemp+'°C');
    if(todayW.sol) wp.push('sol');
    if(todayW.regn) wp.push('regn');
    if(todayW.vind) wp.push(todayW.vindHard ? 'kraftig vind' : 'blæst');
    if(todayW.sne) wp.push('sne');
    html += `<div class="name">${wp.join(', ')}.</div>`;
    if(todayW.currentTemp==null && todayW.temp!=null){
      html += `<div class="small-muted" style="margin-top:2px;">Aktuel temperatur ikke tilgængelig – viser dagens maks. temperatur i stedet.</div>`;
    }
    if(todayDisp.fromFallback){
      html += `<div class="small-muted" style="margin-top:4px;">⚠️ Seneste kendte vejr anvendes${todayDisp.w.date ? ' (fra '+fmtDateDK(todayDisp.w.date)+')' : ''}.</div>`;
    } else {
      html += `<div class="small-muted" style="margin-top:4px;">${weatherStatusMessage(todayW)}</div>`;
    }
  }
  html += `</div>`;

  // ---- I morgen forecast (kalenderstatus + vejr for næste salgsdag) ----
  const activeLabels = CAL_TAGS.filter(t=>tEffective.tags[t.key]).map(t=>t.label);

  html += `<div class="card"><h2>I morgen forecast</h2>
    <div class="small-muted" style="margin-bottom:6px;">Næste salgsdag: ${tWeekday} d. ${fmtDateDK(tDate).split(' ').slice(1).join(' ')}.</div>`;
  if(activeLabels.length===0 && tEvents.length===0){
    html += `<div class="name">Normal dag – ingen særlige markeringer.</div>`;
  } else {
    let summary = activeLabels.join(' + ');
    if(tEvents.length){
      const evNames = tEvents.map(e=>`${e.navn} (${IMPACT_LABEL[e.impact]})`).join(', ');
      summary = summary ? summary + ' + ' + evNames : evNames;
    }
    html += `<div class="name">${summary}.</div>`;
  }
  if(tEffective.reasons.autoText){
    html += `<div class="small-muted" style="margin-top:4px;">Automatisk markeret: ${tEffective.reasons.autoText}.</div>`;
  }
  if(tEffective.reasons.manual.length){
    html += `<div class="small-muted" style="margin-top:4px;">Manuelt markeret: ${tEffective.reasons.manual.join(', ')}.</div>`;
  }
  if(tWeather.temp==null && !tWeather.sol && !tWeather.regn && !tWeather.vind && !tWeather.sne){
    html += `<div class="name" style="margin-top:8px;">Intet vejr registreret endnu.</div>
      <div class="small-muted" style="margin-top:4px;">Automatisk vejr ikke tilgængeligt – forecast beregnes uden vejr.</div>`;
  } else {
    const wparts = [];
    if(tWeather.temp!=null) wparts.push('maks. '+tWeather.temp+'°C');
    if(tWeather.sol) wparts.push('sol');
    if(tWeather.regn) wparts.push('regn');
    if(tWeather.vind) wparts.push(tWeather.vindHard ? 'kraftig vind' : 'blæst');
    if(tWeather.sne) wparts.push('sne');
    html += `<div class="name" style="margin-top:8px;">${wparts.join(', ')}.</div>`;
    if(tWeatherDisp.fromFallback){
      html += `<div class="small-muted" style="margin-top:4px;">⚠️ Automatisk vejr kunne ikke hentes. Seneste kendte vejr anvendes${tWeatherDisp.w.date ? ' (fra '+fmtDateDK(tWeatherDisp.w.date)+')' : ''}.</div>`;
    } else {
      html += `<div class="small-muted" style="margin-top:4px;">${weatherStatusMessage(tWeather, true)}</div>`;
    }
  }
  html += `</div>`;

  const scored = aktive.map(v=>{
    const s14=stats[v.ean].s14, s7=stats[v.ean].s7;
    let score = 0, reason = [];
    if(s7.kl13zero>0){ score += s7.kl13zero*100; reason.push(`Udsolgt ${pmpLabel} på ${s7.kl13zero}/7 dage`); }
    if(s14.gnsKl13>0 && s14.gnsKl13<=1){ score += 30; reason.push(`Lav rest ${pmpLabel} (${s14.gnsKl13})`); }
    if(s14.gnsLuk>4){ score += (s14.gnsLuk-4)*5; reason.push(`Høj rest ved luk (${s14.gnsLuk})`); }
    const t = stats[v.ean].trend;
    if(t.arrow!=='→'){ score += 3; reason.push(t.arrow+' '+t.label); }
    return {v, score, reason};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,5);

  html += `<div class="card"><h2>Top 5 fokusvarer</h2>`;
  if(scored.length===0){
    html += `<div class="empty">Ingen varer kræver handling lige nu.</div>`;
  } else {
    scored.forEach(s=>{
      html += `<div class="row"><div>
        <div class="name">${s.v.navn}</div>
        <div class="sub">${s.reason.join(' · ')}</div>
      </div></div>`;
    });
  }
  html += `</div>`;

  // ---- Hurtig status ----
  let spildfriDage = 0;
  dates14.forEach(date=>{
    const day = REGS[date];
    if(!day) return;
    let allReg=true, sumLuk=0;
    aktive.forEach(v=>{
      const r = day[v.ean];
      if(!r || r.luk==null){ allReg=false; return; }
      sumLuk += r.luk;
    });
    if(allReg && sumLuk===0) spildfriDage++;
  });

  let topUdsolgt = aktive
    .map(v=>({v, n:stats[v.ean].s7.kl13zero}))
    .filter(x=>x.n>0)
    .sort((a,b)=>b.n-a.n)[0];

  html += `<div class="card"><h2>Hurtig status</h2>`;
  html += `<div class="row"><div class="name">✅ ${spildfriDage} af 14 dage uden spild</div></div>`;
  if(topUdsolgt){
    html += `<div class="row"><div class="name">⚠️ ${topUdsolgt.v.navn} udsolgt ${topUdsolgt.n} gange (seneste 7 dage)</div></div>`;
  }
  html += `</div>`;

  // ---- AI Trends ----
  let trendLines = [];
  try{
    aktive.forEach(v=>{
      const t = AI_Engine.trendStatement(v.ean, v.navn, dates56);
      if(t) trendLines.push(t.text);
    });
  }catch(e){ console.error('AI_Engine.trendStatement error:', errMsg(e)); }
  if(trendLines.length){
    html += `<div class="card"><h2>🧠 AI Trends</h2>`;
    trendLines.slice(0,5).forEach(t=>{
      html += `<div class="row"><div class="name">${t}</div></div>`;
    });
    html += `</div>`;
  }

  app.innerHTML = html;
  wireAdminBackRow();

  app.querySelectorAll('[data-explain-ai]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ean = btn.dataset.explainAi;
      const panel = $(`#aiExplain_${ean}`);
      if(!panel) return;
      if(panel.style.display==='block'){
        panel.style.display = 'none';
        btn.textContent = '🔍 Forklar AI';
        return;
      }
      const v = aktive.find(x=>x.ean===ean);
      const f = forecasts[ean];
      let exp;
      try{ exp = AI_Engine.explainForecast(v, f, dates56); }
      catch(e){ console.error('AI_Engine.explainForecast error:', errMsg(e)); }
      panel.innerHTML = aiExplainPanelHTML(exp, f);
      panel.style.display = 'block';
      btn.textContent = '🔼 Skjul forklaring';
    });
  });

  ensureWeatherAuto(todayISO(), ()=> currentTab==='admin-dashboard');
  ensureWeatherAuto(tDate, ()=> currentTab==='admin-dashboard');
}

// ---- "Forklar AI"-panel: fuld gennemsigtighed for ét vareforecast ----
function aiExplainPanelHTML(exp, f){
  if(!exp){
    return `<div class="small-muted" style="padding:8px; background:var(--bg-card); border-radius:8px;">AI-forklaring kunne ikke genereres.</div>`;
  }
  let html = `<div style="padding:12px; background:var(--bg-card); border-radius:10px; font-size:13px;">`;
  html += `<div style="font-weight:700; margin-bottom:8px;">Begrundelse for ${exp.anbefalet} stk.</div>`;

  // Faktorer Smart Forecast brugte (de samme tal som vises ovenfor – ingen dobbeltberegning)
  if(exp.factors.length){
    exp.factors.forEach(fa=>{
      const p = Math.round(fa.pct*100);
      html += `<div>✓ ${fa.label} (${p>=0?'+':''}${p}%)</div>`;
    });
  } else {
    html += `<div class="small-muted">Ingen særlige kalender- eller vejrfaktorer for i morgen.</div>`;
  }
  if(exp.learning && exp.learning.factor!==1){
    const p = Math.round((exp.learning.factor-1)*100);
    html += `<div>✓ Statistisk læringsjustering (${p>=0?'+':''}${p}%, baseret på ${exp.learning.samples} tidligere forecasts)</div>`;
  }
  html += `<div style="margin-top:6px;">Confidence: <b>${exp.confidence.pct}%</b> (${exp.confidence.label})</div>`;

  // AI-minede mønstre relevante for i morgen
  if(exp.matchingPatterns && exp.matchingPatterns.length){
    html += `<div style="font-weight:700; margin-top:12px; margin-bottom:6px;">AI-fundne mønstre der gælder i morgen</div>`;
    exp.matchingPatterns.slice(0,4).forEach(p=>{
      html += `<div style="margin-bottom:6px; padding:8px; background:var(--bg); border-radius:6px;">
        <div>${p.type==='weekday' ? p.label : AI_Engine.describeBinary(p.key, p.pct)}</div>
        <div class="small-muted" style="font-size:11px; margin-top:2px;">Confidence: ${p.confidence}% · Bygget på ${p.observations} lignende dage · Sidst observeret ${fmtDateDK(p.lastSeen)}</div>
      </div>`;
    });
  } else if(exp.dataReady){
    html += `<div class="small-muted" style="margin-top:10px;">Ingen specifikke AI-mønstre matcher i morgens forhold endnu.</div>`;
  } else {
    html += `<div class="small-muted" style="margin-top:10px;">Kun ${exp.observationCount} registrerede dage for denne vare – AI'en har brug for flere data for at finde mønstre.</div>`;
  }

  // Historiske sammenlignelige dage
  if(exp.compareDates && exp.compareDates.length){
    html += `<div style="font-weight:700; margin-top:12px; margin-bottom:6px;">Sammenlignelige historiske dage (${exp.weekday.toLowerCase()})</div>`;
    html += `<table style="width:100%;"><tr><th>Dato</th><th>Solgt</th></tr>`;
    exp.compareDates.forEach(c=>{
      html += `<tr><td>${c.label}</td><td>${c.sold} stk.</td></tr>`;
    });
    html += `</table>`;
  }

  html += `<div class="small-muted" style="margin-top:10px;">Datagrundlag: ${exp.observationCount} registrerede salgsdage for ${exp.varenavn}. Basis for ${exp.weekday.toLowerCase()}: ${exp.basis} stk.</div>`;
  html += `</div>`;
  return html;
}

function renderAdminMonstre(){
  const aktive = VARER.filter(v=>v.aktiv);

    return;
  }
  const dates = periodDates(56); // 8 uger
  const dayNames = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
  const dayIdx = [1,2,3,4,5,6,0]; // getDay() values, Monday first

  let html = adminBackRow() + `<div class="card"><h2>Ugedagsmønster</h2>
    <div class="small-muted" style="margin-bottom:8px;">Gennemsnit pr. ugedag, baseret på seneste 8 uger.</div>`;

  aktive.forEach(v=>{
    html += `<h3>${v.navn}</h3><table>
      <tr><th>Dag</th><th>Gns. modtaget</th><th>Gns. kl.13</th><th>Gns. luk</th></tr>`;
    dayIdx.forEach((dn,i)=>{
      const dDates = dates.filter(date=> isoToUTCDate(date).getUTCDay()===dn);
      const s = summarize(v.ean, dDates);
      html += `<tr><td>${dayNames[i]}</td><td>${s.gnsModtaget||'–'}</td><td>${s.gnsKl13||'–'}</td><td>${s.gnsLuk||'–'}</td></tr>`;
    });
    html += `</table>`;
  });
  html += `</div>`;

  // Tendens
  const dates14 = periodDates(14);
  html += `<div class="card"><h2>Tendens – seneste 14 dage</h2>`;
  aktive.forEach(v=>{
    const t = vareTrend(v.ean, dates14);
    html += `<div class="row"><div class="name">${v.navn}</div>
      <div class="sub">${t.arrow} ${t.label}</div></div>`;
  });
  html += `</div>`;

  // ---- Effekter: Ferie, Lønweekend, Vejr ----
  function totalSoldOnDate(date){
    let total=0, any=false;
    aktive.forEach(v=>{
      const s = soldOn(date, v.ean);
      if(s!=null){ total+=s; any=true; }
    });
    return any ? total : null;
  }
  function tagEffect(predicate){
    const withTag=[], withoutTag=[];
    dates.forEach(date=>{
      const t = totalSoldOnDate(date);
      if(t==null) return;
      if(predicate(date)) withTag.push(t); else withoutTag.push(t);
    });
    if(withTag.length<2 || withoutTag.length<2) return null;
    const a=avg(withTag), b=avg(withoutTag);
    if(b===0) return null;
    return Math.round(((a-b)/b)*100);
  }

  html += `<div class="card"><h2>Ferieeffekt</h2>`;
  const ferieEffekt = tagEffect(date=>{
    const tags = getEffectiveTags(date).tags;
    return FERIE_KEYS.some(k=>tags[k]);
  });
  html += ferieEffekt!=null
    ? `<div class="suggestion">Salg på feriedage er ${(ferieEffekt>=0?'+':'')+ferieEffekt}% sammenlignet med normale dage.</div>`
    : `<div class="small-muted">Kræver flere registreringer.</div>`;
  html += `</div>`;

  html += `<div class="card"><h2>Lønweekend-effekt</h2>`;
  const lonEffekt = tagEffect(date=>getEffectiveTags(date).tags.lonweekend);
  html += lonEffekt!=null
    ? `<div class="suggestion">Salg i lønweekender er ${(lonEffekt>=0?'+':'')+lonEffekt}% sammenlignet med andre dage.</div>`
    : `<div class="small-muted">Kræver flere registreringer.</div>`;
  html += `</div>`;

  html += `<div class="card"><h2>Vejreffekt</h2>`;
  const solEffekt = tagEffect(date=>{
    const w = getDayWeather(date);
    return w.sol && w.temp!=null && w.temp>20;
  });
  const regnEffekt = tagEffect(date=>getDayWeather(date).regn);
  if(solEffekt==null && regnEffekt==null){
    html += `<div class="small-muted">Kræver flere registreringer.</div>`;
  } else {
    if(solEffekt!=null) html += `<div class="suggestion">Salg ved sol og temperatur over 20° er ${(solEffekt>=0?'+':'')+solEffekt}% sammenlignet med andre dage.</div>`;
    if(regnEffekt!=null) html += `<div class="suggestion" style="margin-top:6px;">Salg på regnvejrsdage er ${(regnEffekt>=0?'+':'')+regnEffekt}% sammenlignet med andre dage.</div>`;
  }
  html += `</div>`;

  html += `<div class="card"><h2>Lokale arrangementers effekt</h2>`;
  const eventEffekt = tagEffect(date=>getActiveEvents(date).length>0);
  html += eventEffekt!=null
    ? `<div class="suggestion">Salg på dage med lokale arrangementer er ${(eventEffekt>=0?'+':'')+eventEffekt}% sammenlignet med andre dage.</div>`
    : `<div class="small-muted">Kræver flere registreringer.</div>`;
  html += `</div>`;

  // ---- Handelskalender ----
  html += `<div class="card"><h2>Handelskalender</h2>
    <div class="small-muted" style="margin-bottom:8px;">Beregnes automatisk. Bruges af Smart Forecast – kan overstyres manuelt pr. dato.</div>
    <div class="date-row" id="calDateRow" style="cursor:pointer; color:var(--green-d); margin-bottom:10px;">
      <span class="date-text" id="calDateLabel">${fmtDateDK(calDate)}</span>
    </div>
    <input type="date" id="calDatePicker" style="position:absolute; opacity:0; width:1px; height:1px;">`;

  html += autoChecklistHTML(calDate);

  const calEff = getEffectiveTags(calDate);
  html += `<div class="tag-grid" style="margin-top:10px;">`;
  CAL_TAGS.forEach(t=>{
    html += `<button class="tag-chip ${calEff.tags[t.key]?'active':''}" data-caltag="${t.key}">${calEff.tags[t.key]?'✓ ':''}${t.label}</button>`;
  });
  html += `</div>
    <div class="small-muted" style="margin-top:8px;">Tryk for at tilføje eller fjerne en markering manuelt. Manuel markering har altid forrang.</div>`;

  const calWeather = getDayWeather(tomorrowISO());
  const calWDisp = weatherForDisplay(tomorrowISO());
  const calWShow = calWDisp.w;
  const calHasWeather = calWShow.temp!=null || calWShow.sol || calWShow.regn || calWShow.vind || calWShow.sne;
  html += `<h3 style="margin-top:14px;">Morgendagens vejr til bestilling</h3>
    <div class="small-muted" style="margin-bottom:6px;">${fmtDateDK(tomorrowISO())}</div>`;
  if(calHasWeather){
    const parts = [];
    if(calWShow.temp!=null) parts.push(calWShow.temp+'°C');
    if(calWShow.sol) parts.push('☀️ Sol');
    if(calWShow.regn) parts.push('🌧️ Regn');
    if(calWShow.vind) parts.push('💨 Vind');
    if(calWShow.sne) parts.push('❄️ Sne');
    html += `<div class="name" style="margin-bottom:4px;">${parts.join(' · ')}</div>
      <div class="small-muted">${weatherStatusMessage(calWeather, true)}</div>`;
  } else {
    html += `<div class="small-muted">⚠️ Automatisk vejr ikke tilgængeligt – forecast beregnes uden vejr.</div>`;
  }
  html += `</div>`;
  if(calWeather.auto===false && DEV_MODE){
    html += weatherDebugCardHTML();
  }

  // ---- Lokale arrangementer ----
  html += `<div class="card">
    <h2>Lokale arrangementer</h2>
    <label>Navn på arrangement</label>
    <input type="text" id="evNavn" placeholder="f.eks. Havnefest, Festival, Byfest, Marked">
    <label>Startdato</label>
    <input type="date" id="evStart">
    <label>Slutdato</label>
    <input type="date" id="evSlut">

    </select>
    <label>Kommentar</label>
    <input type="text" id="evKommentar" placeholder="valgfri">
    <div class="row" style="padding:8px 0;">
      <div class="name" style="font-size:14px;">Gentag årligt</div>
      <input type="checkbox" id="evGentag" style="width:22px; height:22px;">
    </div>
    <button class="btn-primary" id="addEvent">Tilføj lokalt arrangement</button>
    <div id="evErr" class="small-muted" style="color:var(--red); margin-top:6px;"></div>
  </div>`;

  html += `<div class="card"><h2>Planlagte arrangementer</h2>`;
  if(EVENTS.length===0){
    html += `<div class="empty">Ingen lokale arrangementer endnu.</div>`;
  } else {
    EVENTS.slice().sort((a,b)=>a.start.localeCompare(b.start)).forEach(ev=>{
      const aktiv = ev.aktiv!==false;
      html += `<div class="row" style="display:block;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <div class="name">${ev.navn}</div>

          <button class="btn-toggle ${aktiv?'active-toggle':'inactive-toggle'}" data-toggleevent="${ev.id}" style="flex:1;">${aktiv?'Aktiv':'Inaktiv'}</button>

  app.innerHTML = html;

    dp.value = calDate;

  $('#calDatePicker').addEventListener('change', e=>{
    if(e.target.value){ calDate = e.target.value; renderAdminMonstre(); }
  });
  app.querySelectorAll('[data-caltag]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const eff = getEffectiveTags(calDate);
      const tags = getDayTags(calDate);
      const key = btn.dataset.caltag;
      tags[key] = !eff.tags[key];
      await saveRegsAuto();
      renderAdminMonstre();
    });
  });
  $('#addEvent').addEventListener('click', async ()=>{
    const navn = $('#evNavn').value.trim();
    const start = $('#evStart').value;
    const slut = $('#evSlut').value;
    const impact = $('#evImpact').value;
    const kommentar = $('#evKommentar').value.trim();
    const gentag = $('#evGentag').checked;
    const err = $('#evErr');
    err.textContent='';
    if(!navn || !start || !slut){
      err.textContent='Udfyld navn, startdato og slutdato.'; return;
    }
    if(slut<start){
      err.textContent='Slutdato skal være efter startdato.'; return;
    }
    EVENTS.push({id:'ev'+Date.now(), navn, start, slut, impact, kommentar, gentagAarligt:gentag, aktiv:true});
    await saveEventsAuto();
    renderAdminMonstre();
  });
  app.querySelectorAll('[data-delevent]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.delevent;
      EVENTS = EVENTS.filter(e=>e.id!==id);
      await saveEventsAuto();
      renderAdminMonstre();
    });
  });
  app.querySelectorAll('[data-toggleevent]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.toggleevent;
      const ev = EVENTS.find(e=>e.id===id);
      if(ev){ ev.aktiv = !ev.aktiv; }
      await saveEventsAuto();
      renderAdminMonstre();
    });
  });
  app.querySelectorAll('[data-copyevent]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.copyevent;
      const ev = EVENTS.find(e=>e.id===id);
      if(ev){
        EVENTS.push({...ev, id:'ev'+Date.now(), navn:ev.navn+' (kopi)'});
      }
      await saveEventsAuto();
      renderAdminMonstre();
    });
  });

  const _cd = tomorrowISO();
  ensureWeatherAuto(_cd, ()=> currentTab==='admin-monstre');
}

    });

    scanBtn.addEventListener('click', ()=>{
      if(typeof window.startBarcodeScanner !== 'function' || typeof FreshScanScanner === 'undefined'){
        alert('Scanner ikke tilgængelig – opdater siden og prøv igen, eller indtast EAN manuelt.'); return;
      }
      const support = FreshScanScanner.supportLevel();
      if(support==='none'){
        alert('❌ Scanner understøttes ikke på denne enhed (intet kamera fundet). Indtast EAN-nummeret manuelt i feltet ovenfor.');
        return;
      }
      window.startBarcodeScanner(ean=>{
        const eanInp = $('#newEan');
        if(eanInp){
          eanInp.value = ean;
          const existing = VARER.find(v=>v.ean===ean);
          if(existing){
            const navnInp = $('#newNavn');
            if(navnInp && !navnInp.value) navnInp.value = existing.navn;
            $('#addErr').textContent = `⚠️ EAN ${ean} findes allerede (${existing.navn}).`;

            if(navnInp){ navnInp.value = ''; navnInp.focus(); }

    if(VARER.some(v=>v.ean===ean)){ err.textContent='EAN-nummer findes allerede – det skal være unikt.'; return; }

      await saveVarerAuto();
    });

  app.querySelectorAll('[data-deletevare]').forEach(btn=>{

        : `Slet "${v.navn}"?\n\nDenne handling kan ikke fortrydes.`;
      if(!confirm(msg)) return;
      VARER = VARER.filter(x=>x.ean!==ean);
      await saveVarerAuto();
      showSaved();

let histPeriod = 14; // dage
let histVareEan = 'alle';
let histLev = 'alle';
let histUgedag = 'alle';
let histDate = isoDaysAgo(1);

function isoWeek(date){
  const d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
  const dayNum = (d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-dayNum+3);
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(),0,4));
  const diff = (d - firstThursday)/86400000;
  return 1 + Math.round(diff/7);
}
function periodDates(days){
  return Array.from({length:days},(_,i)=>isoDaysAgo(i));
}
function summarize(ean, dates){
  const pmp = getPrimaertMP();
  const pmpField = mpFieldKey(pmp);
  let mod=[],pmpVals=[],luk=[],pmpZero=0,restDays=0;
  dates.forEach(date=>{
    const r = REGS[date] && REGS[date][ean];
    if(!r) return;
    if(r.modtaget!=null) mod.push(r.modtaget);
    // Primær målepunkt: brug mp_-felt, eller ældre kl13-felt hvis primær er kl13
    const pmpVal = r[pmpField] ?? (pmpField==='mp_kl13' ? r.kl13 : null);
    if(pmpVal!=null){ pmpVals.push(pmpVal); if(pmpVal===0) pmpZero++; }
    if(r.luk!=null){ luk.push(r.luk); if(r.luk>0) restDays++; }
  });
  return {
    gnsModtaget: round1(avg(mod)),
    gnsKl13: round1(avg(pmpVals)),   // navn bevaret for bagudkompatibilitet med kaldere
    gnsLuk: round1(avg(luk)),
    kl13zero: pmpZero,               // navn bevaret for bagudkompatibilitet med kaldere
    restDays,
    regDays: dates.filter(d=>REGS[d] && REGS[d][ean]).length,
    pmpLabel: pmp.label
  };
}

  html += `<table><tr><th>Vare</th><th>Modtaget</th><th>${pmpLabelHist}</th><th>Luk</th><th>Solgt</th><th>Forecast</th><th>Afvigelse</th></tr>`;
  const histDates56 = periodDates(56).filter(d=>d<histDate);
  showVarer.forEach(v=>{
    const r = REGS[histDate] && REGS[histDate][v.ean];
    const sold = soldOn(histDate, v.ean);
    let forecastVal = '–', afvigelseTxt = '–';
    if(histDates56.length>=2){
      const f = computeForecast(v.ean, histDate, histDates56);
      forecastVal = ''+f.anbefalet;
      if(sold!=null){
        const diff = sold - f.anbefalet;
        afvigelseTxt = (diff===0) ? 'Præcist' : ((diff>0?'+':'')+diff+' stk.');
      }
    }
    html += `<tr>
      <td>${v.navn}</td>
      <td>${r&&r.modtaget!=null?r.modtaget:'–'}</td>
      <td>${(()=>{const pf=mpFieldKey(getPrimaertMP()); const val=r&&(r[pf]??r.kl13); return val!=null?val:'–'; })()}</td>
      <td>${r&&r.luk!=null?r.luk:'–'}</td>
      <td>${sold!=null?sold:'–'}</td>
      <td>${forecastVal}</td>
      <td style="font-size:12px;">${afvigelseTxt}</td>
    </tr>`;
  });
  html += `</table>`;

  html += `<h3 style="margin-top:14px;">Vejr og kalenderstatus denne dag</h3>`;
  const histWparts = [];
  if(histWeather.temp!=null) histWparts.push('maks. '+histWeather.temp+'°C');
  if(histWeather.sol) histWparts.push('sol');
  if(histWeather.regn) histWparts.push('regn');
  if(histWeather.vind) histWparts.push('blæst');
  if(histWeather.sne) histWparts.push('sne');
  html += `<div class="small-muted">Vejr: ${histWparts.length? histWparts.join(', ') : 'ikke registreret'}</div>`;
  html += `<div class="small-muted" style="margin-top:4px;">Kalenderstatus: ${histActiveLabels.length? histActiveLabels.join(', ') : 'normal dag'}${histEff.reasons.autoText ? ' ('+histEff.reasons.autoText+')' : ''}</div>`;
  if(histEvents.length){
    html += `<div class="small-muted" style="margin-top:4px;">Lokale arrangementer: ${histEvents.map(e=>`${e.navn} (${IMPACT_LABEL[e.impact]})`).join(', ')}</div>`;
  }
  html += `</div>`;

  // ---- Sammenligninger ----
  function sumSalg(ds){
    let total=0;
    showVarer.forEach(v=>{
      ds.forEach(date=>{
        const r = REGS[date]&&REGS[date][v.ean];
        if(!r) return;
        if(r.modtaget!=null && r.luk!=null) total += (r.modtaget-r.luk);
      });
    });
    return total;
  }
  function pctDiff(a,b){
    if(b===0) return a===0? '0%' : '–';
    const p = Math.round(((a-b)/b)*100);
    return (p>=0?'+':'')+p+'%';
  }
  const last7 = periodDates(7), prev7 = periodDates(14).slice(7,14);
  const last30 = periodDates(30), prev30 = periodDates(60).slice(30,60);
  const salgUge = sumSalg(last7), salgUgeForrige = sumSalg(prev7);
  const salgMaaned = sumSalg(last30), salgMaanedForrige = sumSalg(prev30);

  html += `<div class="card"><h2>Sammenligninger</h2>
    <table>
      <tr><th></th><th>Periode</th><th>Forrige</th><th>Ændring</th></tr>
      <tr><td>Denne uge vs sidste uge</td><td>${salgUge}</td><td>${salgUgeForrige}</td><td>${pctDiff(salgUge,salgUgeForrige)}</td></tr>
      <tr><td>Sidste 30 dage vs forrige 30 dage</td><td>${salgMaaned}</td><td>${salgMaanedForrige}</td><td>${pctDiff(salgMaaned,salgMaanedForrige)}</td></tr>
    </table>
    <div class="small-muted" style="margin-top:8px;">Tal viser samlet antal solgte (modtaget − rest ved luk). Ugedag-for-ugedag sammenligning findes under Mønstre & AI.</div>
  </div>`;

  app.innerHTML = html;
  wireAdminBackRow();

  app.querySelectorAll('[data-period]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const val = el.dataset.period;
      histPeriod = (val==='ytd') ? 'ytd' : parseInt(val,10);
      renderAdminHistorik();
    });
  });
  $('#histVare').addEventListener('change', e=>{
    histVareEan = e.target.value;
    renderAdminHistorik();
  });
  $('#histLev').addEventListener('change', e=>{
    histLev = e.target.value;
    renderAdminHistorik();
  });
  $('#histUgedag').addEventListener('change', e=>{
    histUgedag = e.target.value;
    renderAdminHistorik();
  });
  $('#histDateRow').addEventListener('click', ()=>{
    const dp = $('#histDatePicker');
    dp.value = histDate;
    dp.showPicker ? dp.showPicker() : dp.click();
  });
  $('#histDatePicker').addEventListener('change', e=>{
    if(e.target.value){ histDate = e.target.value; renderAdminHistorik(); }
  });

  // RODÅRSAG TIL "Vejr: ikke registreret" I DAGSOVERSIGT: automatisk
  // vejrhentning blev kun udløst for i dag og i morgen (forsiden + Mønstre).
  // Dagsoversigt viser som standard GÅRSDAGENS dato, og enhver dato brugeren
  // selv vælger her, blev derfor aldrig hentet. Open-Meteo's forecast-API
  // dækker faktisk også de seneste ~3 måneders historik, og fetchAutoWeather
  // skifter automatisk til arkiv-API'et for ældre datoer (>92 dage tilbage)
  // – så vi udnytter blot den eksisterende funktion for den valgte dato her.
  const _histDateForWeather = histDate;
  ensureWeatherAuto(_histDateForWeather, ()=> currentTab==='admin-historik' && histDate===_histDateForWeather);
}

    <div id="pinResult" class="small-muted" style="margin-top:6px;"></div>
  </div>`;

  // ---- Backup / Import ----
  const lastBackup = storageGet('lastbackup') || 'Aldrig';

  html += `<div class="card"><h3>Import</h3>
    <div class="small-muted" style="margin-bottom:8px;">Bruges til at flytte data til en ny enhed.</div>
    <label>Importer backup</label>
    <input type="file" id="adminImportFile" accept="application/json">
  </div>`;

  // ---- Nulstilling ----
  html += `<div class="card"><h3>Slet historik</h3>
    <div class="small-muted" style="margin-bottom:8px;">Sletter alle registreringer. Varer og indstillinger bevares.</div>
    <button class="btn-secondary" id="adminDeleteHistory" style="color:var(--red);">🗑️ Slet historik</button>
  </div>`;

  html += `<div class="card"><h3>Nulstil demo</h3>
    <div class="small-muted" style="margin-bottom:8px;">Sletter ALT og genstarter med demo-varer. Kan ikke fortrydes.</div>
    <button class="btn-secondary" id="adminResetDemo" style="color:var(--red);">⚠️ Nulstil demo</button>
  </div>`;

  app.innerHTML = html;
  wireAdminBackRow();

  $('#adminChangePin').addEventListener('click', async ()=>{
    const cur = $('#pinCurrent').value.trim();
    const nw = $('#pinNew').value.trim();
    const confirmPin = $('#pinConfirm').value.trim();
    const result = $('#pinResult');
    if(!cur || !nw || !confirmPin){ result.textContent = '❌ Udfyld alle tre felter.'; return; }
    if(cur !== getAdminPin()){ result.textContent = '❌ Nuværende PIN er forkert.'; return; }
    if(!/^\d{4,8}$/.test(nw)){ result.textContent = '❌ Ny PIN skal være 4-8 cifre.'; return; }
    if(nw !== confirmPin){ result.textContent = '❌ Ny PIN og gentagelse stemmer ikke overens.'; return; }
    storageSet('adminpin', nw);
    result.textContent = '✅ PIN ændret. Brug den nye PIN næste gang du åbner Administrator.';
    $('#pinCurrent').value=''; $('#pinNew').value=''; $('#pinConfirm').value='';
  });

  $('#adminExport').addEventListener('click', async ()=>{
    try{
      const backup = {
        version: 'FreshScan v2', exportedAt: new Date().toISOString(),
        VARER, REGS, SETTINGS, EVENTS
      };
      const json = safeStringify(backup);
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `freshscan-backup-${todayISO()}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      storageSet('lastbackup', new Date().toLocaleString('da-DK'));
      renderAdminSettings();
    }catch(e){ alert('Backup fejlede: '+errMsg(e)); }
  });

  $('#adminImportFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!confirm('Import overskriver al nuværende data med backuppen. Fortsæt?')) return;
      if(data.VARER) VARER = data.VARER;
      if(data.REGS) REGS = data.REGS;
      // NB: kundenavn/logo/farve importeres bevidst IKKE – de styres pr. enhed i koden,
      // ikke pr. backup-fil, så en import fra en anden butik ikke kan ændre white-label.
      if(data.SETTINGS){
        const {kundeNavn, logo, accentColor, ...importableSettings} = data.SETTINGS;
        SETTINGS = Object.assign({...SETTINGS}, importableSettings);
      }
      if(data.EVENTS) EVENTS = data.EVENTS;
      await saveVarerAuto(); await saveRegsAuto(); await saveSettingsAuto(); await saveEventsAuto();
      alert('✅ Backup importeret.');
      renderAdminSettings();
    }catch(e){ alert('Import fejlede: '+errMsg(e)); }
  });

  $('#adminDeleteHistory').addEventListener('click', async ()=>{
    if(!confirm('Slet AL registreringshistorik? Dette kan ikke fortrydes. Varer og indstillinger bevares.')) return;
    if(!confirm('Er du HELT sikker? Al historik for alle dage slettes nu.')) return;
    REGS = {};
    await saveRegsAuto();
    alert('Historik slettet.');
    renderAdminSettings();
  });

  $('#adminResetDemo').addEventListener('click', async ()=>{
    if(!confirm('Dette sletter ALT (varer, historik, indstillinger) og genindlæser demo-data. Fortsæt?')) return;
    if(!confirm('Sidste bekræftelse: ALT slettes permanent. Er du sikker?')) return;
    const keepBrand = {kundeNavn: SETTINGS.kundeNavn, logo: SETTINGS.logo, accentColor: SETTINGS.accentColor};
    VARER = []; REGS = {}; EVENTS = [];
    SETTINGS = {...DEFAULT_SETTINGS, ...keepBrand, malepunkter: DEFAULT_MALEPUNKTER.map(m=>({...m}))};
    await saveVarerAuto(); await saveRegsAuto(); await saveSettingsAuto(); await saveEventsAuto();
    await loadAll();
    alert('Nulstillet til demo-data.');
    currentTab='admin'; render();
  });
}

   UDVIKLERTILSTAND (Developer Mode)
   ---------------------------------------------------------------------
   Skjult for kunden. Nås kun ved 7 tryk på logoet + Admin-PIN. Indeholder
   tekniske værktøjer til fejlsøgning og udvikling: debug-info, API-test,
   vejr-test, database-info, en simpel in-app console, performance-måling

let DEV_LOG = [];
function devLog(msg){
  DEV_LOG.unshift(`[${new Date().toLocaleTimeString('da-DK')}] ${msg}`);
  if(DEV_LOG.length>50) DEV_LOG.length = 50;
}
// Fang konsol-fejl løbende, så de kan ses i Log-sektionen uden ekstern værktøj.
const _origConsoleError = console.error;
console.error = function(...args){
  try{ devLog('ERROR: '+args.map(a=>typeof a==='string'?a:JSON.stringify(a)).join(' ')); }catch(e){}
  _origConsoleError.apply(console, args);
};

function openDeveloperMode(){
  if(!adminUnlocked){
    const pin = prompt('Udviklertilstand kræver Admin-PIN:');
    if(pin === null) return;
    if(pin !== getAdminPin()){ alert('Forkert PIN.'); return; }
    adminUnlocked = true;
  }
  DEV_MODE = true;
  storageSet('devmode', '1');
  currentTab = 'dev-mode';
  render();
}

function storageSizeKB(){
  try{
    let total = 0;
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf('freshscan_')===0) total += (k.length + (localStorage.getItem(k)||'').length);
    }
    return Math.round(total/1024*10)/10;
  }catch(e){ return null; }
}

  $('#devClearLog').addEventListener('click', ()=>{

/* ---------- STREGKODESCANNER ----------
   Robust kamera-baseret EAN-scanner med to motorer:
   1) BarcodeDetector API (indbygget i Chrome/Android) – ingen download.
   2) ZXing via CDN (fallback for Safari/iOS, hvor BarcodeDetector mangler).
   Begge stier deler samme kamera-opsætning og samme oprydningslogik,
   så kameraet altid frigives korrekt og "Annuller" altid virker. */
const FreshScanScanner = (function(){
  let stream = null;
  let detectInterval = null;
  let zxingReader = null;
  let active = false;

  function getEls(){
    return {
      modal: document.getElementById('scanModal'),
      video: document.getElementById('scanVideo'),
      status: document.getElementById('scanStatus')
    };
  }

  // Stopper ALT (kamera, detektor-loop, ZXing) og skjuler modal.
  // Sikker at kalde flere gange / fra alle tilstande.
  function stop(){
    active = false;
    if(detectInterval){ clearInterval(detectInterval); detectInterval = null; }
    if(zxingReader){
      try{ zxingReader.reset(); }catch(e){ /* allerede stoppet */ }
      zxingReader = null;
    }
    if(stream){
      try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){}
      stream = null;
    }
    const {modal, video} = getEls();
    if(video){ try{ video.pause(); }catch(e){} video.srcObject = null; }
    if(modal) modal.style.display = 'none';
  }

  function supportLevel(){
    const hasCamera = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    if(!hasCamera) return 'none';
    if('BarcodeDetector' in window) return 'native';
    return 'fallback'; // kræver ZXing fra CDN, kræver netværk første gang
  }

  async function start(onDetected){
    if(active) stop(); // ryd op efter evt. tidligere session før vi starter en ny
    active = true;
    const {modal, video, status} = getEls();
    if(!modal || !video || !status){
      alert('Scanneren kunne ikke åbnes (manglende elementer i siden).');
      active = false;
      return;
    }
    modal.style.display = 'flex';
    status.textContent = '📷 Åbner kamera...';

    const support = supportLevel();
    if(support==='none'){
      status.textContent = '❌ Scanner understøttes ikke i denne browser – indtast EAN manuelt.';
      return;
    }

    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:720}}
      });
    }catch(e){
      status.textContent = '❌ Kamera ikke tilgængeligt: '+errMsg(e)+'. Indtast EAN manuelt.';
      active = false;
      return;
    }
    if(!active) return; // brugeren nåede at lukke modal mens kameraet åbnede

    video.srcObject = stream;
    try{ await video.play(); }catch(e){ /* nogle browsere kræver brugerinteraktion, ignoreres */ }
    status.textContent = '✅ Kamera fundet · ✅ Scanner klar – hold stregkoden i rammen';

    if(support==='native'){
      const detector = new window.BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e']});
      detectInterval = setInterval(async ()=>{
        if(!active) return;
        try{
          const codes = await detector.detect(video);
          if(codes && codes.length){
            const raw = codes[0].rawValue;
            stop();
            onDetected(raw);
          }
        }catch(e){ /* enkeltstående detect-fejl ignoreres, vi prøver igen næste tick */ }
      }, 250);
      return;
    }

    // Fallback: indlæs ZXing dynamisk (kun første gang)
    status.textContent = '📥 Indlæser scanner...';
    try{
      await new Promise((res, rej)=>{
        if(window.ZXing){ res(); return; }
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.21.3/umd/index.min.js';
        s.onload = res;
        s.onerror = ()=>rej(new Error('Kunne ikke indlæse scanner-bibliotek (tjek internetforbindelse)'));
        document.head.appendChild(s);
      });
    }catch(e){
      status.textContent = '❌ '+errMsg(e)+'. Indtast EAN manuelt.';
      stop();
      return;
    }
    if(!active) return;

    status.textContent = '✅ Scanner klar – hold stregkoden i rammen';
    try{
      zxingReader = new window.ZXing.BrowserMultiFormatReader();
      // ZXing styrer selv kamera-streamen via video-elementets id herfra.
      zxingReader.decodeFromVideoDevice(null, 'scanVideo', (result)=>{
        if(result && active){
          const text = result.getText();
          stop();
          onDetected(text);
        }
      });
    }catch(e){
      status.textContent = '❌ Scanner-fejl: '+errMsg(e)+'. Indtast EAN manuelt.';
      stop();
    }
  }

  return {start, stop, supportLevel};
})();

window.startBarcodeScanner = function(callback){
  FreshScanScanner.start(function(ean){
    if(callback) callback(ean);
  });
};
