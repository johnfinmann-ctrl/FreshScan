<style>
  :root{
    --green:#1b7a3d; --green-d:#155c2e; --red:#d0413a; --yellow:#e0a526;
    --bg:#f4f6f5; --card:#ffffff; --text:#1c2620; --muted:#6b7a72; --border:#e1e6e3;
    --accent:#1b7a3d; --ai:#7c3aed; --ai-light:#f5f3ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:24px;
    -webkit-user-select:none; user-select:none;
  }
  input,textarea{ -webkit-user-select:text; user-select:text; }
  header{
    background:var(--accent); color:#fff; padding:14px 16px;
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
  }
  header .brand{display:flex; align-items:center; gap:10px;}
  header .logo{
    width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  header h1{font-size:18px; margin:0; font-weight:800; letter-spacing:-.01em;}
  header .customer{font-size:11px; opacity:.85; margin-top:1px;}
  #menuBtn{
    background:rgba(255,255,255,.15); border:none; border-radius:10px; font-size:20px;
    padding:6px 12px; width:auto; color:#fff; cursor:pointer;
  }
  .save-indicator{
    position:fixed; top:64px; right:14px; font-size:12px; font-weight:700;
    background:#fff; color:var(--green-d); padding:5px 12px; border-radius:999px;
    box-shadow:0 2px 8px rgba(0,0,0,.12); z-index:60; opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  .save-indicator.show{opacity:1;}
  .container{padding:16px; max-width:520px; margin:0 auto;}
  .card{
    background:var(--card); border-radius:16px; padding:18px; margin-bottom:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid var(--border);
  }
  .card h2{margin:0 0 10px; font-size:17px; font-weight:700;}
  .card h3{margin:14px 0 8px; font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;}
  .row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row .name{font-weight:600; font-size:16px;}
  .row .sub{font-size:12px; color:var(--muted);}
  .small-muted{font-size:12px; color:var(--muted);}
  .empty{color:var(--muted); font-size:14px; text-align:center; padding:30px 0;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:6px 4px; border-bottom:1px solid var(--border);}
  th{color:var(--muted); font-weight:600; font-size:12px;}
  input[type=number]{
    width:120px; font-size:30px; text-align:center; padding:14px 4px; border-radius:14px;
    border:2px solid var(--border); background:#f9faf9; font-weight:800; color:var(--green-d);
  }
  input[type=number]:focus{border-color:var(--green); outline:none;}
  input[type=text],input[type=password],input[type=time],input[type=file]{
    width:100%; font-size:16px; padding:13px; border-radius:12px; border:1px solid var(--border);
    background:#f9faf9; margin-bottom:10px;
  }
  select{
    width:100%; font-size:16px; padding:13px; border-radius:12px; border:1px solid var(--border);
    background:#f9faf9; margin-bottom:10px;
  }
  label{font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:5px;}
  textarea{
    width:100%; font-size:16px; padding:13px; border-radius:12px; border:1px solid var(--border);
    background:#f9faf9; margin-bottom:10px; font-family:inherit; resize:vertical; min-height:70px;
  }
  button{
    border:none; border-radius:14px; padding:18px; font-size:17px; font-weight:700;
    cursor:pointer; width:100%;
  }
  .btn-primary{background:var(--green); color:#fff;}
  .btn-primary:active{background:var(--green-d);}
  .btn-secondary{background:#eef2ef; color:var(--text); margin-top:10px;}
  .btn-ai{background:var(--ai); color:#fff; margin-top:10px;}
  .btn-toggle{padding:10px 16px; border-radius:999px; font-size:13px; width:auto;}
  .active-toggle{background:var(--green); color:#fff;}
  .inactive-toggle{background:#eef2ef; color:var(--muted);}
  .home-tiles{display:flex; flex-direction:column; gap:14px; margin-top:6px;}
  .home-tile{
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:26px 20px; display:flex; align-items:center; gap:18px;
    box-shadow:0 1px 3px rgba(0,0,0,.06); cursor:pointer; text-align:left;
  }
  .home-tile:active{background:#f3f6f4;}
  .home-tile .ico{font-size:34px; flex-shrink:0;}
  .home-tile .label{font-size:19px; font-weight:800;}
  .home-tile .desc{font-size:13px; color:var(--muted); margin-top:2px;}
  .home-tile.primary{background:var(--green); border-color:var(--green);}
  .home-tile.primary .label,.home-tile.primary .desc{color:#fff;}
  .home-tile.primary .desc{opacity:.85;}
  .home-tile.ai-tile{background:var(--ai-light); border-color:#c4b5fd;}
  .home-tile.ai-tile .label{color:var(--ai);}
  .suggestion-banner{
    margin-top:16px; background:#fff8e8; border:1px solid #f0d896; border-radius:14px;
    padding:14px 16px; font-size:15px; font-weight:600; color:#7a5b14;
    display:flex; align-items:center; gap:10px;
  }
  .ai-banner{
    margin-top:12px; background:var(--ai-light); border:1px solid #c4b5fd; border-radius:14px;
    padding:14px 16px; font-size:14px; color:#5b21b6;
    display:flex; align-items:center; gap:10px;
  }
  .confidence-badge{
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700;
  }
  .conf-hoj{background:#dcfce7; color:#166534;}
  .conf-middel{background:#fef9c3; color:#854d0e;}
  .conf-lav{background:#fee2e2; color:#991b1b;}
  .progress-dots{display:flex; justify-content:center; gap:6px; margin-bottom:16px;}
  .progress-dots span{width:8px; height:8px; border-radius:50%; background:var(--border);}
  .progress-dots span.done{background:var(--green);}
  .progress-dots span.current{background:var(--green); width:20px; border-radius:4px;}
  .camera-tile{
    width:100%; aspect-ratio:4/3; border-radius:18px; background:#eef2ef;
    border:2px dashed var(--border); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:8px; cursor:pointer; margin-bottom:14px;
    overflow:hidden; position:relative;
  }
  .camera-tile img{width:100%; height:100%; object-fit:cover;}
  .camera-tile .ico{font-size:46px;}
  .camera-tile .lbl{font-size:15px; font-weight:700; color:var(--muted);}
  .camera-tile .retake{
    position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,.6); color:#fff;
    font-size:12px; padding:6px 12px; border-radius:999px; width:auto;
  }
  .stepper{display:flex; align-items:center; justify-content:center; gap:18px; margin:14px 0;}
  .stepper button{
    width:64px; height:64px; border-radius:50%; font-size:30px; font-weight:800;
    background:#eef2ef; color:var(--text); flex-shrink:0;
  }
  .stepper .val{font-size:44px; font-weight:800; min-width:90px; text-align:center; color:var(--green-d);}
  .sheet-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:300;
  }
  .sheet{
    background:#fff; max-width:480px; margin:0 auto; border-radius:18px 18px 0 0;
    padding:20px; position:absolute; bottom:0; left:0; right:0;
    max-height:85vh; overflow-y:auto;
  }
  .sheet-handle{width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px;}
  .sheet h2{margin:0 0 14px;}
  .menu-item{
    display:flex; align-items:center; gap:14px; padding:16px 4px; border-bottom:1px solid var(--border);
    font-size:16px; font-weight:600; cursor:pointer;
  }
  .menu-item:last-child{border-bottom:none;}
  .menu-item .ico{font-size:22px; width:28px; text-align:center;}
  .admin-badge{
    display:inline-block; background:#eef2ef; color:var(--muted); font-size:11px;
    font-weight:700; padding:3px 10px; border-radius:999px; margin-bottom:10px;
  }
  .ai-badge{
    display:inline-block; background:var(--ai-light); color:var(--ai); font-size:11px;
    font-weight:700; padding:3px 10px; border-radius:999px; margin-bottom:10px;
  }
  .pin-pad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:18px auto 0;}
  .pin-pad button{
    aspect-ratio:1; border-radius:50%; font-size:24px; font-weight:700;
    background:#eef2ef; color:var(--text);
  }
  .pin-dots{display:flex; justify-content:center; gap:12px; margin:20px 0;}
  .pin-dots span{width:14px; height:14px; border-radius:50%; background:var(--border);}
  .pin-dots span.filled{background:var(--green);}
  .back-row{display:flex; align-items:center; gap:10px; margin-bottom:14px; cursor:pointer;}
  .back-row .ico{font-size:20px;}
  .back-row .lbl{font-size:15px; font-weight:700; color:var(--muted);}
  .tag-grid{display:flex; flex-wrap:wrap; gap:8px;}
  .tag-chip{
    padding:9px 15px; border-radius:999px; font-size:13px; font-weight:600;
    background:#eef2ef; color:var(--muted); cursor:pointer; width:auto;
  }
  .tag-chip.active{background:#fdf6e3; color:#8a6213; border:1px solid #e0a526;}
  .badge{font-size:11px; padding:2px 8px; border-radius:999px; font-weight:700;}
  .topcards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .topcard{background:var(--card); border-radius:14px; padding:14px; border:1px solid var(--border); text-align:center;}
  .topcard .num{font-size:26px; font-weight:800; color:var(--green-d);}
  .topcard .lbl{font-size:12px; color:var(--muted); margin-top:2px;}
  .ai-topcard{background:var(--ai-light); border-color:#c4b5fd;}
  .ai-topcard .num{color:var(--ai);}
  .suggestion{font-size:14px; padding:10px; border-radius:10px; margin-top:6px; background:#f9faf9;}
  .suggestion.red{background:#fbeceb; color:#9c3a35;}
  .suggestion.yellow{background:#fdf6e3; color:#8a6213;}
  .suggestion.ai{background:var(--ai-light); color:#5b21b6;}
  .step-pill{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;}
  .step-pill span{background:#eef2ef; border-radius:999px; padding:4px 10px; font-size:12px; color:var(--muted); font-weight:600;}
  .step-pill span.done{background:var(--green); color:#fff;}
  .date-row{display:flex; align-items:center; gap:8px; cursor:pointer; margin-bottom:10px;}
  .date-row .date-text{font-size:14px; font-weight:600;}
  /* AI learning pulse animation */
  @keyframes aipulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .ai-thinking{animation:aipulse 1.2s infinite; color:var(--ai); font-size:13px; text-align:center; padding:8px;}
  /* Progress bar */
  .progress-bar{height:8px; border-radius:4px; background:#e5e7eb; overflow:hidden; margin:6px 0;}
  .progress-fill{height:100%; border-radius:4px; background:var(--green); transition:width .4s;}
  .progress-fill.ai{background:var(--ai);}
  /* Factor bar */
  .factor-row{display:flex; align-items:center; gap:8px; margin:4px 0; font-size:13px;}
  .factor-bar{flex:1; height:6px; border-radius:3px; background:#e5e7eb; overflow:hidden;}
  .factor-fill{height:100%; border-radius:3px; background:var(--ai);}
  .factor-fill.neg{background:var(--red);}
</style>

<script type="text/javascript" id="freshscan-sw">
// Service Worker registrering for offline PWA support
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='freshscan-ai-v2';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./',location.pathname]))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./')))));
    self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>

<script type="text/javascript" id="freshscan-main">
/* =====================================================================
   SUPABASE SQL SCHEMA  v2.1
   Kør i Supabase → SQL editor → New query
   =====================================================================

create table public.stores (
  id uuid primary key default gen_random_uuid(),
  navn text not null, by text, postnr text, land text default 'Danmark',
  lat float8, lon float8, settings_json text default '{}',
  created_at timestamptz default now(), updated_at timestamptz default now()
);
alter table public.stores enable row level security;
create policy "store_read" on public.stores for select using (id in (select store_id from public.profiles where id=auth.uid()));
create policy "store_write" on public.stores for update using (id in (select store_id from public.profiles where id=auth.uid() and role in ('ADMIN','BUTIKSCHEF')));

create table public.profiles (
  id uuid primary key references auth.users on delete cascade,
  email text, full_name text, role text not null default 'MEDARBEJDER',
  store_id uuid references public.stores(id), aktiv boolean default true,
  last_sign_in_at timestamptz, created_at timestamptz default now(), updated_at timestamptz default now()
);
alter table public.profiles enable row level security;
create policy "profile_self" on public.profiles for select using (auth.uid()=id);
create policy "profile_store_admin" on public.profiles for select using (store_id in (select store_id from public.profiles where id=auth.uid() and role in ('ADMIN','BUTIKSCHEF')));
create policy "profile_update_admin" on public.profiles for update using (store_id in (select store_id from public.profiles where id=auth.uid() and role in ('ADMIN','BUTIKSCHEF')));

create table public.products (
  ean text not null, store_id uuid not null references public.stores(id),
  navn text not null, leverandor text, aktiv boolean default true,
  omraade text, hylde text, sektion text, tilbudspris numeric,
  created_at timestamptz default now(), updated_at timestamptz default now(),
  primary key (ean, store_id)
);
alter table public.products enable row level security;
create policy "products_read" on public.products for select using (store_id in (select store_id from public.profiles where id=auth.uid()));
create policy "products_write" on public.products for all using (store_id in (select store_id from public.profiles where id=auth.uid() and role in ('ADMIN','BUTIKSCHEF','AFDELINGSLEDER')));

create table public.registrations (
  id text primary key,
  store_id uuid not null references public.stores(id),
  date date not null, ean text not null,
  modtaget int, luk int, mp_data text default '{}',
  status text default 'normal', kommentar text, foto text,
  created_by uuid references auth.users, updated_by uuid references auth.users,
  created_at timestamptz default now(), updated_at timestamptz default now()
);
alter table public.registrations enable row level security;
create policy "reg_read" on public.registrations for select using (store_id in (select store_id from public.profiles where id=auth.uid()));
create policy "reg_write" on public.registrations for all using (store_id in (select store_id from public.profiles where id=auth.uid() and aktiv=true) from public.profiles);

create table public.weather (
  id text primary key, store_id uuid not null references public.stores(id),
  date date not null, temp float8, currentTemp float8,
  sol boolean default false, regn boolean default false,
  vind boolean default false, vindHard boolean default false, sne boolean default false,
  weathercode int, updated_at timestamptz default now()
);
alter table public.weather enable row level security;
create policy "weather_all" on public.weather for all using (store_id in (select store_id from public.profiles where id=auth.uid()));

create table public.ai_memory (
  id text primary key, store_id uuid not null references public.stores(id),
  date date not null, ean text not null,
  forecast int, actual int, pct_deviation int, abs_deviation int,
  confidence text, factors_json text default '{}', mp_data_json text default '{}',
  recorded_at timestamptz default now()
);
alter table public.ai_memory enable row level security;
create policy "ai_memory_all" on public.ai_memory for all using (store_id in (select store_id from public.profiles where id=auth.uid()));

create table public.calendar_events (
  id text primary key, store_id uuid not null references public.stores(id),
  navn text not null, start date not null, slut date not null,
  impact text default 'middel', kommentar text,
  gentagAarligt boolean default false, aktiv boolean default true,
  created_at timestamptz default now(), updated_at timestamptz default now()
);
alter table public.calendar_events enable row level security;
create policy "events_all" on public.calendar_events for all using (store_id in (select store_id from public.profiles where id=auth.uid()));

create table public.day_tags (
  id text primary key, store_id uuid not null references public.stores(id),
  date date not null, tags_json text default '{}',
  updated_at timestamptz default now()
);
alter table public.day_tags enable row level security;
create policy "day_tags_all" on public.day_tags for all using (store_id in (select store_id from public.profiles where id=auth.uid()));

create table public.analytics (
  id uuid primary key default gen_random_uuid(),
  store_id uuid not null references public.stores(id),
  date date not null, metric text not null,
  value_num float8, value_json text, created_at timestamptz default now()
);
alter table public.analytics enable row level security;
create policy "analytics_all" on public.analytics for all using (store_id in (select store_id from public.profiles where id=auth.uid()));

-- Trigger: ny bruger → profile

function todayISO(){
  return new Intl.DateTimeFormat('en-CA',{
    timeZone:TIMEZONE,year:'numeric',month:'2-digit',day:'2-digit'
  }).format(new Date());
}
const DAY_NAMES=["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
const MONTH_NAMES=["januar","februar","marts","april","maj","juni","juli","august","september","oktober","november","december"];
function isoToUTCDate(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(Date.UTC(y,m-1,d));}
function utcDateToISO(d){return d.toISOString().slice(0,10);}
function fmtDateDK(iso){
  const d=isoToUTCDate(iso);
  return DAY_NAMES[d.getUTCDay()]+" "+d.getUTCDate()+". "+MONTH_NAMES[d.getUTCMonth()];
}
function weekdayName(iso){return DAY_NAMES[isoToUTCDate(iso).getUTCDay()];}
function isoDaysAgo(n){const d=isoToUTCDate(todayISO());d.setUTCDate(d.getUTCDate()-n);return utcDateToISO(d);}
function avg(arr){if(!arr.length)return 0;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function round1(n){return Math.round(n*10)/10;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

const memStore={};
function storageGet(key){
  try{const v=localStorage.getItem('freshscan_'+key);return v===null?undefined:v;}
  catch(e){return memStore[key];}
}
function storageSet(key,val){
  try{localStorage.setItem('freshscan_'+key,val);}
  catch(e){memStore[key]=val;}
}
function errMsg(e){
  try{if(e==null)return'Ukendt fejl';if(typeof e==='string')return e;if(e.message)return String(e.message);return String(e);}
  catch(x){return'Ukendt fejl';}
}
function safePlainObject(obj,seen){
  seen=seen||new Set();
  if(obj===null||obj===undefined)return null;
  const t=typeof obj;
  if(t==='string'||t==='number'||t==='boolean')return obj;
  if(t==='function')return undefined;
  if(t!=='object'){try{return String(obj);}catch(e){return null;}}
  if(Array.isArray(obj))return obj.map(item=>safePlainObject(item,seen));
  if(obj instanceof Error)return errMsg(obj);
  if(seen.has(obj))return null;
  seen.add(obj);
  const proto=Object.getPrototypeOf(obj);
  if(proto!==Object.prototype&&proto!==null){try{return String(obj);}catch(e){return null;}}
  const out={};
  for(const key of Object.keys(obj)){const val=safePlainObject(obj[key],seen);if(val!==undefined)out[key]=val;}
  return out;
}
function safeStringify(obj){try{return JSON.stringify(safePlainObject(obj));}catch(e){return'null';}}

/* =====================================================================
   FRESHSCAN AI v2.0  —  MULTI-MEDARBEJDER SYNC LAYER
   ---------------------------------------------------------------------
   Arkitektur: Én butik = én installation = ét sync-endpoint.
   Medarbejdere logger IKKE ind. Appen åbnes og bruges direkte.
   Sync sker via et enkelt delt endpoint konfigureret af admin.

   KONFIGURATION (sættes af administrator i filen før deployment):
   - SYNC_ENDPOINT : URL til din sync-server (Supabase, egen API, etc.)
   - SYNC_TOKEN    : Delt hemmelighed for butikken (ikke brugernøgle)
   - STORE_ID      : Permanent butiks-ID

   Demo-tilstand aktiveres automatisk hvis SYNC_ENDPOINT er tomt.
   ===================================================================== */

/* ---------- Butikskonfiguration (sættes pr. butik) ---------- */
const STORE_CONFIG = {
  SYNC_ENDPOINT : '',          // ← Sæt til din sync-URL ved cloud-deploy
  SYNC_TOKEN    : '',          // ← Delt sync-token for butikken
  STORE_ID      : 'lokal',     // ← Butiks-ID (bruges som database-namespace)
  STORE_NAME    : '',          // ← Tilsidesætter SETTINGS.butiksnavn hvis sat
};

/* ---------- Sync-tilstand ---------- */
let _syncEnabled = false;      // Sættes til true når SYNC_ENDPOINT er konfigureret
let _deviceId    = null;       // Unikt ID for denne enhed (telefon/tablet/PC)
let _lastSyncAt  = null;       // ISO-tidsstempel for seneste vellykkede sync
let _syncPending = 0;          // Antal operationer i kø

function _initSyncConfig() {
  _syncEnabled = !!(
    STORE_CONFIG.SYNC_ENDPOINT &&
    STORE_CONFIG.SYNC_ENDPOINT.length > 10 &&
    !STORE_CONFIG.SYNC_ENDPOINT.includes('eksempel.com')
  );
  // Tildel permanent enhed-ID (gemmes i localStorage)
  _deviceId = storageGet('device_id');
  if (!_deviceId) {
    _deviceId = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
    storageSet('device_id', _deviceId);
  }
  console.log('[FreshScan] Sync ' + (_syncEnabled ? 'aktiveret ('+STORE_CONFIG.SYNC_ENDPOINT+')' : 'deaktiveret (demo-tilstand)'));
}

/* =====================================================================
   OFFLINE QUEUE  —  simpel, robust, enhedsagnostisk
   ===================================================================== */
const OfflineQueue = (function(){
  const KEY = 'freshscan_queue';
  let _q = [];

  function load() {
    try { _q = JSON.parse(localStorage.getItem(KEY) || '[]'); }
    catch(e) { _q = []; }
    if (!Array.isArray(_q)) _q = [];
  }
  function _save() {
    try { localStorage.setItem(KEY, JSON.stringify(_q.slice(-200))); } // max 200 ops
    catch(e) {}
  }
  function enqueue(op) {
    op.qid     = 'q' + Date.now() + Math.random().toString(36).slice(2,5);
    op.device  = _deviceId;
    op.queued  = new Date().toISOString();
    _q.push(op);
    _save();
    _syncPending = _q.length;
    _scheduleFlush(2000);
  }
  let _ft = null, _busy = false;
  function _scheduleFlush(ms) {
    clearTimeout(_ft);
    _ft = setTimeout(flush, ms || 3000);
  }
  async function flush() {
    if (_busy || !_q.length || !_syncEnabled || !navigator.onLine) return;
    _busy = true;
    const list = [..._q];
    let ok = 0;
    for (const op of list) {
      try {
        await DeviceSync._sendOp(op);
        const idx = _q.findIndex(x => x.qid === op.qid);
        if (idx >= 0) _q.splice(idx, 1);
        ok++;
      } catch(e) {
        break; // Stop ved første fejl, prøv igen om 15 sek
      }
    }
    _save();
    _syncPending = _q.length;
    _busy = false;
    if (_q.length) _scheduleFlush(15000);
    if (ok > 0) _showSyncBadge(ok);
  }
  function _showSyncBadge(n) {
    const el = document.getElementById('saveIndicator');
    if (!el) return;
    el.textContent = '☁️ ' + n + ' synk.';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }
  window.addEventListener('online', () => _scheduleFlush(1000));
  function pendingCount() { return _q.length; }
  function getQueue() { return [..._q]; }
  return { load, enqueue, flush, pendingCount, getQueue };
})();

/* =====================================================================
   DEVICE SYNC ENGINE
   ---------------------------------------------------------------------
   Håndterer al kommunikation med sync-endpoint.
   Bruges direkte af save-funktionerne og OfflineQueue.
   Ingen login, ingen roller, ingen sessions — kun et delt token.
   ===================================================================== */
const DeviceSync = (function(){

  function _headers() {
    return {
      'Content-Type'  : 'application/json',
      'X-Store-ID'    : STORE_CONFIG.STORE_ID,
      'X-Device-ID'   : _deviceId || 'unknown',
      'X-Sync-Token'  : STORE_CONFIG.SYNC_TOKEN,
    };
  }

  // Generisk HTTP-kald med timeout og retry
  async function _fetch(path, method, body, timeoutMs) {
    timeoutMs = timeoutMs || 8000;
    const url = STORE_CONFIG.SYNC_ENDPOINT.replace(/\/$/, '') + path;
    let lastErr;
    for (let attempt = 1; attempt <= 2; attempt++) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const opts = { method: method || 'GET', headers: _headers(), signal: ctrl.signal };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch(e) {
        clearTimeout(timer);
        lastErr = e;
        if (attempt === 2) throw e;
        await new Promise(r => setTimeout(r, 400));
      }
    }
    throw lastErr;
  }

  // Afsend én queued operation
  async function _sendOp(op) {
    if (!_syncEnabled) return;
    return _fetch('/sync', 'POST', op);
  }

  // Gem én registrering — prøv cloud, ellers queue
  async function saveRegistration(date, ean, regData) {
    const op = {
      type    : 'registration',
      store_id: STORE_CONFIG.STORE_ID,
      date, ean,
      data    : safePlainObject(regData),
      ts      : new Date().toISOString(),
    };
    if (!_syncEnabled || !navigator.onLine) {
      OfflineQueue.enqueue(op);
      return false;
    }
    try {
      await _fetch('/sync', 'POST', op);
      return true;
    } catch(e) {
      OfflineQueue.enqueue(op);
      return false;
    }
  }

  // Gem vare
  async function saveVare(vare) {
    if (!_syncEnabled) return false;
    const op = { type:'product', store_id:STORE_CONFIG.STORE_ID, data:safePlainObject(vare), ts:new Date().toISOString() };
    if (!navigator.onLine) { OfflineQueue.enqueue(op); return false; }
    try { await _fetch('/sync','POST',op); return true; }
    catch(e) { OfflineQueue.enqueue(op); return false; }
  }

  // Gem event/arrangement
  async function saveEvent(ev) {
    if (!_syncEnabled) return false;
    const op = { type:'event', store_id:STORE_CONFIG.STORE_ID, data:safePlainObject(ev), ts:new Date().toISOString() };
    if (!navigator.onLine) { OfflineQueue.enqueue(op); return false; }
    try { await _fetch('/sync','POST',op); return true; }
    catch(e) { OfflineQueue.enqueue(op); return false; }
  }

  // Gem vejr
  async function saveWeather(date, weatherData) {
    if (!_syncEnabled) return false;
    const op = { type:'weather', store_id:STORE_CONFIG.STORE_ID, date, data:safePlainObject(weatherData), ts:new Date().toISOString() };
    if (!navigator.onLine) { OfflineQueue.enqueue(op); return false; }
    try { await _fetch('/sync','POST',op); return true; }
    catch(e) { OfflineQueue.enqueue(op); return false; }
  }

  // Gem AI-læringsdata
  async function saveAIMemory(date, ean, outcome) {
    if (!_syncEnabled) return false;
    const op = { type:'ai_memory', store_id:STORE_CONFIG.STORE_ID, date, ean, data:safePlainObject(outcome), ts:new Date().toISOString() };
    if (!navigator.onLine) { OfflineQueue.enqueue(op); return false; }
    try { await _fetch('/sync','POST',op); return true; }
    catch(e) { OfflineQueue.enqueue(op); return false; }
  }

  // Gem indstillinger
  async function saveSettings(s) {
    if (!_syncEnabled) return false;
    const op = { type:'settings', store_id:STORE_CONFIG.STORE_ID, data:safePlainObject(s), ts:new Date().toISOString() };
    if (!navigator.onLine) { OfflineQueue.enqueue(op); return false; }
    try { await _fetch('/sync','POST',op); return true; }
    catch(e) { OfflineQueue.enqueue(op); return false; }
  }

  // Gem dag-tags (handelskalender)
  async function saveDayTags(date, tags) {
    if (!_syncEnabled) return false;
    const op = { type:'day_tags', store_id:STORE_CONFIG.STORE_ID, date, data:safePlainObject(tags), ts:new Date().toISOString() };
    if (!navigator.onLine) { OfflineQueue.enqueue(op); return false; }
    try { await _fetch('/sync','POST',op); return true; }
    catch(e) { OfflineQueue.enqueue(op); return false; }
  }

  // Hent al butiksdata fra cloud (full pull ved opstart)
  async function pullStoreData() {
    if (!_syncEnabled) return false;
    try {
      const data = await _fetch('/pull?store_id=' + encodeURIComponent(STORE_CONFIG.STORE_ID) + '&since=' + encodeURIComponent(_lastSyncAt || ''), 'GET');
      if (!data) return false;

      // Varer
      if (Array.isArray(data.products) && data.products.length) {
        VARER = data.products;
        storageSet('varer', safeStringify(VARER));
      }
      // Registreringer — flet (nyeste vinder pr. ean+dato)
      if (data.registrations && typeof data.registrations === 'object') {
        Object.keys(data.registrations).forEach(date => {
          if (!REGS[date]) REGS[date] = {};
          Object.keys(data.registrations[date]).forEach(ean => {
            const remote = data.registrations[date][ean];
            const local  = REGS[date][ean];
            // Seneste vinder — brug updated_at/ts
            if (!local || (remote._ts && (!local._ts || remote._ts > local._ts))) {
              REGS[date][ean] = remote;
            }
          });
        });
        storageSet('registreringer', safeStringify(REGS));
      }
      // Events
      if (Array.isArray(data.events)) {
        EVENTS = data.events;
        storageSet('events', safeStringify(EVENTS));
      }
      // AI Memory
      if (data.ai_memory) {
        storageSet('ai_memory', JSON.stringify(data.ai_memory));
        AI_MemoryEngine.load();
      }
      // Settings (butikskonfiguration fra cloud)
      if (data.settings && typeof data.settings === 'object') {
        SETTINGS = Object.assign({ ...DEFAULT_SETTINGS, malepunkter: DEFAULT_MALEPUNKTER.map(m=>({...m})) }, data.settings);
        if (!Array.isArray(SETTINGS.malepunkter) || !SETTINGS.malepunkter.length)
          SETTINGS.malepunkter = DEFAULT_MALEPUNKTER.map(m=>({...m}));
        storageSet('settings', safeStringify(SETTINGS));
      }
      _lastSyncAt = new Date().toISOString();
      storageSet('last_sync_at', _lastSyncAt);
      return true;
    } catch(e) {
      console.error('[FreshScan] pullStoreData fejl:', errMsg(e));
      return false;
    }
  }

  // Polling: hent opdateringer fra andre enheder hvert N sekund
  let _pollTimer = null;
  function startPolling(intervalSec) {
    if (!_syncEnabled) return;
    intervalSec = intervalSec || 30;
    stopPolling();
    _pollTimer = setInterval(async () => {
      if (!navigator.onLine) return;
      const ok = await pullStoreData();
      if (ok && ['home','admin-dashboard','admin-historik'].includes(currentTab)) {
        const el = document.getElementById('saveIndicator');
        if (el) { el.textContent = '🔄 Opdateret'; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500); }
      }
    }, intervalSec * 1000);
  }
  function stopPolling() {
    if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  }

  // Enhedsaktivitet — hvornår var hver enhed sidst aktiv?
  async function getDeviceActivity() {
    if (!_syncEnabled) return [];
    try { return await _fetch('/devices?store_id=' + encodeURIComponent(STORE_CONFIG.STORE_ID), 'GET') || []; }
    catch(e) { return []; }
  }

  return { saveRegistration, saveVare, saveEvent, saveWeather, saveAIMemory, saveSettings, saveDayTags, pullStoreData, startPolling, stopPolling, getDeviceActivity, _sendOp };
})();

const AI_MemoryEngine = (function(){
  let memory = {}; // { date: { ean: { forecast, actual, pct, factors, confidence, mpData } } }
  const STORAGE_KEY = 'ai_memory';

  function load(){
    try{const v=storageGet(STORAGE_KEY);memory=v?JSON.parse(v):{};}
    catch(e){memory={};}
    if(!memory||typeof memory!=='object')memory={};
  }
  function save(){
    try{storageSet(STORAGE_KEY,safeStringify(memory));}
    catch(e){console.error('AI_MemoryEngine.save error:',errMsg(e));}
  }

  // Registrér et afsluttet salgsforløb for én vare på én dato.
  // Kaldes automatisk fra saveRegsAuto() når luk-registrering er gemt.
  function recordOutcome(date, ean, forecastGiven, actualSold, factors, confidenceLabel, mpData){
    if(!memory[date]) memory[date]={};
    const pct = forecastGiven>0 ? Math.round(((actualSold-forecastGiven)/forecastGiven)*100) : null;
    memory[date][ean]={
      forecast:forecastGiven,
      actual:actualSold,
      pctDeviation:pct,
      absDeviation:actualSold-forecastGiven,
      factors:factors||{},
      confidence:confidenceLabel||'Lav',
      mpData:mpData||{},
      recordedAt:new Date().toISOString()
    };
    save();
  }

  // Hent alle læringsdata for én vare, sorteret nyeste→ældste
  function getOutcomesForVare(ean){
    const results=[];
    Object.keys(memory).sort().reverse().forEach(date=>{
      if(memory[date]&&memory[date][ean]) results.push({date,...memory[date][ean]});
    });
    return results;
  }

  // Hent alle outcomes på tværs af varer, valgfrit filtreret
  function getAllOutcomes(filter){
    const results=[];
    Object.keys(memory).sort().reverse().forEach(date=>{
      if(!memory[date])return;
      Object.keys(memory[date]).forEach(ean=>{
        const o=memory[date][ean];
        if(filter&&!filter(date,ean,o))return;
        results.push({date,ean,...o});
      });
    });
    return results;
  }

  // Antal læringspunkter (dage × varer med komplette data)
  function getLearningCount(){return getAllOutcomes().length;}

  // Samlet forecast-præcision: pct af outcomes inden for ±15%
  function getOverallAccuracy(){
    const outcomes=getAllOutcomes((_d,_e,o)=>o.pctDeviation!=null);
    if(!outcomes.length)return null;
    const within15=outcomes.filter(o=>Math.abs(o.pctDeviation)<=15).length;
    return Math.round((within15/outcomes.length)*100);
  }

  // Gennemsnitlig absolut procentafvigelse (lavere = bedre)
  function getMAPE(){
    const outcomes=getAllOutcomes((_d,_e,o)=>o.pctDeviation!=null&&o.actual>0);
    if(!outcomes.length)return null;
    const mape=avg(outcomes.map(o=>Math.abs(o.pctDeviation)));
    return Math.round(mape);
  }

  // Præcision opdelt i konfidensklasser (bruges til Confidence_Engine kalibrering)
  function getAccuracyByConfidence(){
    const bins={Høj:[],Middel:[],Lav:[]};
    getAllOutcomes((_d,_e,o)=>o.pctDeviation!=null).forEach(o=>{
      const b=bins[o.confidence];
      if(b) b.push(Math.abs(o.pctDeviation)<=15?1:0);
    });
    const out={};
    Object.keys(bins).forEach(k=>{
      out[k]=bins[k].length?Math.round(avg(bins[k])*100):null;
    });
    return out;
  }

  // Faktor-effekt: for en binær faktor (f.eks. 'regn'), hvad er den gennemsnitlige
  // procentafvigelse på dage med vs. uden faktoren?
  function getFactorBias(factorKey){
    const withF=[],withoutF=[];
    getAllOutcomes((_d,_e,o)=>o.pctDeviation!=null).forEach(o=>{
      if(o.factors&&o.factors[factorKey]===true) withF.push(o.pctDeviation);
      else withoutF.push(o.pctDeviation);
    });
    if(withF.length<3||withoutF.length<3)return null;
    return{avgWith:round1(avg(withF)),avgWithout:round1(avg(withoutF)),count:withF.length};
  }

  // Hvilke faktorer har AI konsekvent undervurderet/overvurderet?
  function getSystematicBiases(){
    const biasKeys=['regn','sol','varmt','koldt','sne','vind',
      'cal_lonweekend','cal_turistsaeson','cal_helligdag',
      'cal_sommerferie','cal_paaskeferie','cal_vinterferie',
      'cal_efterarsferie','cal_juleferie','lokaltArrangement'];
    const found=[];
    biasKeys.forEach(k=>{
      const b=getFactorBias(k);
      if(b&&Math.abs(b.avgWith-b.avgWithout)>=10){
        found.push({factor:k,biasWhenPresent:round1(b.avgWith-b.avgWithout),count:b.count});
      }
    });
    found.sort((a,b)=>Math.abs(b.biasWhenPresent)-Math.abs(a.biasWhenPresent));
    return found;
  }

  // Præcision pr. ugedag
  function getAccuracyByWeekday(){
    const days={};
    DAY_NAMES.forEach(d=>{days[d]=[];});
    getAllOutcomes((_d,_e,o)=>o.pctDeviation!=null).forEach(o=>{
      const wd=o.factors&&o.factors.ugedag;
      if(wd&&days[wd]) days[wd].push(Math.abs(o.pctDeviation)<=15?1:0);
    });
    const out={};
    Object.keys(days).forEach(k=>{
      out[k]=days[k].length?{accuracy:Math.round(avg(days[k])*100),n:days[k].length}:null;
    });
    return out;
  }

  // Præcisionsudvikling over tid: returnerer en tidsserie af rullende præcision
  function getAccuracyTrend(windowDays){
    windowDays=windowDays||7;
    const all=getAllOutcomes((_d,_e,o)=>o.pctDeviation!=null);
    const byDate={};
    all.forEach(o=>{
      if(!byDate[o.date])byDate[o.date]=[];
      byDate[o.date].push(Math.abs(o.pctDeviation)<=15?1:0);
    });
    const dates=Object.keys(byDate).sort();
    if(dates.length<2)return[];
    const trend=[];
    for(let i=windowDays-1;i<dates.length;i++){
      const window=dates.slice(Math.max(0,i-windowDays+1),i+1);
      const vals=window.flatMap(d=>byDate[d]);
      trend.push({date:dates[i],accuracy:Math.round(avg(vals)*100),n:vals.length});
    }
    return trend;
  }

  // Vurder om ekstra målepunkter har forbedret forecast-præcision.
  // Sammenligner præcision på dage med 2 vs 3+ målepunkter registreret.
  function getMeasurementPointValue(){
    const with2=[],with3plus=[];
    getAllOutcomes((_d,_e,o)=>o.pctDeviation!=null).forEach(o=>{
      const mpCount=o.mpData?Object.keys(o.mpData).filter(k=>o.mpData[k]!=null).length:0;
      const acc=Math.abs(o.pctDeviation)<=15?1:0;
      if(mpCount>=3)with3plus.push(acc);
      else if(mpCount===2)with2.push(acc);
    });
    return{
      with2:{accuracy:with2.length?Math.round(avg(with2)*100):null,n:with2.length},
      with3plus:{accuracy:with3plus.length?Math.round(avg(with3plus)*100):null,n:with3plus.length}
    };
  }

  // Foreslå om ekstra målepunkt ville hjælpe
  function shouldSuggestExtraMP(){
    const mpVal=getMeasurementPointValue();
    if(!mpVal.with2.accuracy||mpVal.with3plus.n<5)return null;
    const gain=(mpVal.with3plus.accuracy||0)-(mpVal.with2.accuracy||0);
    if(gain>=8)return{gain,msg:`Et ekstra målepunkt har forbedret forecast-præcision med ${gain}% på dage med tilstrækkelig data.`};
    return null;
  }

  // Er vi ved at nå præcisionsloftet? (ekstra data giver ikke mere)
  function hasSufficientData(){
    const trend=getAccuracyTrend(7);
    if(trend.length<4)return false;
    const recent=trend.slice(-3).map(t=>t.accuracy);
    const older=trend.slice(-6,-3).map(t=>t.accuracy);
    if(!recent.length||!older.length)return false;
    const improvement=avg(recent)-avg(older);
    return improvement<2&&avg(recent)>80;// præcision >80% og stagnerer
  }

  function getMemory(){return memory;}
  function clear(){memory={};save();}

  return{
    load,save,recordOutcome,getOutcomesForVare,getAllOutcomes,
    getLearningCount,getOverallAccuracy,getMAPE,getAccuracyByConfidence,
    getFactorBias,getSystematicBiases,getAccuracyByWeekday,
    getAccuracyTrend,getMeasurementPointValue,shouldSuggestExtraMP,
    hasSufficientData,getMemory,clear
  };
})();

/* =====================================================================
   LEARNING ENGINE  (nyt i v2.0)
   ---------------------------------------------------------------------
   Beregner en lærings-korrektionsfaktor pr. vare og pr. faktor,
   baseret på AI_MemoryEngine's historik. Bruges af Forecast_Engine
   til at korrigere næste dags anbefaling.
   ===================================================================== */
const Learning_Engine = (function(){

  // Beregn en korrektionsmultiplikator for en given vare.
  // Logik: se på de seneste N outcomes; hvis AI konsekvent under-/overvurderer,
  // justér fremtidigt forecast proportionelt. Capper korrektionen til ±25%.
  function getCorrection(ean,n){
    n=n||20;
    const outcomes=AI_MemoryEngine.getOutcomesForVare(ean).slice(0,n);
    if(outcomes.length<5)return{factor:1,samples:outcomes.length,ready:false};
    const ratios=outcomes
      .filter(o=>o.forecast>0&&o.actual!=null)
      .map(o=>o.actual/o.forecast);
    if(ratios.length<5)return{factor:1,samples:ratios.length,ready:false};
    let factor=avg(ratios);
    factor=clamp(factor,0.75,1.25);
    // Lineær blending: vægt af lærings-faktor stiger med antal samples
    const weight=clamp((ratios.length-5)/15,0,1); // fuld vægt ved 20 samples
    const blended=1+weight*(factor-1);
    return{factor:round1(blended),samples:ratios.length,ready:true};
  }

  // Faktor-specifikke korrektioner: kalibrerer individuelle faktorer
  // baseret på systematiske bias i AI_MemoryEngine.
  function getFactorCorrections(){
    const biases=AI_MemoryEngine.getSystematicBiases();
    const corrections={};
    biases.forEach(b=>{
      // Konverter bias (pct-afvigelse) til korrektionsmultiplikator
      const adj=clamp(1+(-b.biasWhenPresent/200),0.85,1.15);
      corrections[b.factor]=round1(adj);
    });
    return corrections;
  }

  // Samlet korrekteret forecast for én vare med forklaring
  function applyCorrections(rawForecast,ean,activeFactors){
    const vareCorr=getCorrection(ean);
    const factorCorrs=getFactorCorrections();
    let adjusted=rawForecast*vareCorr.factor;
    const appliedFactors=[];
    if(activeFactors){
      Object.keys(factorCorrs).forEach(fk=>{
        if(activeFactors[fk]===true&&factorCorrs[fk]!==1){
          adjusted*=factorCorrs[fk];
          appliedFactors.push({factor:fk,multiplier:factorCorrs[fk]});
        }
      });
    }
    return{
      corrected:Math.max(0,Math.round(adjusted)),
      vareCorr,appliedFactors,
      totalAdjustment:rawForecast>0?Math.round(((adjusted-rawForecast)/rawForecast)*100):0
    };
  }

  return{getCorrection,getFactorCorrections,applyCorrections};
})();

/* =====================================================================
   CONFIDENCE ENGINE  (nyt i v2.0)
   ---------------------------------------------------------------------
   Beregner en kalibreret konfidensscore (Høj/Middel/Lav) pr. vare
   pr. dag, baseret på:
   1) Antal historiske læringsdata (mere data = højere tillid)
   2) Historisk præcision for denne vare (høj præcision = højere tillid)
   3) Faktorkompleksitet (mange usikre faktorer = lavere tillid)
   4) Kalibrering mod konfidensklassernes reelle præcision (se AI_MemoryEngine)
   ===================================================================== */
const Confidence_Engine = (function(){

  function compute(ean,qualityFlag,activeFactors){
    const outcomes=AI_MemoryEngine.getOutcomesForVare(ean);
    const n=outcomes.length;

    // Base-score fra antal datapunkter (0-50 point)
    const dataScore=clamp(n*2.5,0,50);

    // Præcisionsscore fra historik (0-35 point)
    let precisionScore=0;
    if(n>=5){
      const within15=outcomes.filter(o=>o.pctDeviation!=null&&Math.abs(o.pctDeviation)<=15).length;
      precisionScore=clamp((within15/outcomes.length)*35,0,35);
    }

    // Korrektionsscore: er læringskorr. tæt på 1? (0-10 point)
    const corr=Learning_Engine.getCorrection(ean);
    const corrScore=corr.ready?Math.max(0,10-Math.abs(corr.factor-1)*50):0;

    // Kompleksitetspenalty: flere usikre faktorer → lavere konfidens
    const uncertainFactors=['regn','sne','vind','lokaltArrangement','cal_tilbudsavis'];
    let penalty=0;
    if(activeFactors){
      uncertainFactors.forEach(f=>{if(activeFactors[f])penalty+=3;});
    }
    if(qualityFlag==='low')penalty+=8;
    if(qualityFlag==='none')penalty+=18;

    const rawScore=dataScore+precisionScore+corrScore-penalty;
    const pct=clamp(Math.round(rawScore+20),15,97);

    let label;
    if(pct>=72)label='Høj';
    else if(pct>=48)label='Middel';
    else label='Lav';

    // Kalibrér label mod historisk konfidensklasse-præcision
    const calibration=AI_MemoryEngine.getAccuracyByConfidence();
    if(calibration.Høj!=null&&calibration.Lav!=null){
      // Hvis "Høj" historisk kun rammer 50%, nedgrader
      if(label==='Høj'&&calibration.Høj<60)label='Middel';
      if(label==='Middel'&&calibration.Middel<45)label='Lav';
    }

    return{pct,label,dataPoints:n,precisionScore:Math.round(precisionScore)};
  }

  function badge(label){
    const cls={Høj:'conf-hoj',Middel:'conf-middel',Lav:'conf-lav'}[label]||'conf-lav';
    const ico={Høj:'🟢',Middel:'🟡',Lav:'🔴'}[label]||'🔴';
    return`<span class="confidence-badge ${cls}">${ico} ${label}</span>`;
  }

  return{compute,badge};
})();

/* =====================================================================
   PATTERN ENGINE  (opgraderet v2.0)
   ---------------------------------------------------------------------
   Finder gentagende salgsmønstre i butikkens egne data.
   I v2.0 kombinerer den mønstre fra REGS (pilotdata) MED
   mønstre fra AI_MemoryEngine (læringsdata), og scorer mønstre
   med en konfidens baseret på antal observationer og effektstørrelse.
   ===================================================================== */
const Pattern_Engine = (function(){
  const MIN_OBS_WITH=4,MIN_OBS_WITHOUT=4,MIN_EFFECT_PCT=8;

  function extractFactors(date){
    const d=isoToUTCDate(date);
    const eff=getEffectiveTags(date);
    const weather=getDayWeather(date);
    const events=getActiveEvents(date);
    const f={ugedag:weekdayName(date),maaned:MONTH_NAMES[d.getUTCMonth()]};
    CAL_TAGS.forEach(t=>{f['cal_'+t.key]=!!eff.tags[t.key];});
    f.lokaltArrangement=events.length>0;
    f.sol=!!weather.sol;f.regn=!!weather.regn;
    f.vind=!!weather.vind;f.sne=!!weather.sne;
    f.varmt=weather.temp!=null&&weather.temp>=20;
    f.koldt=weather.temp!=null&&weather.temp<=5;
    f.temp=weather.temp;
    return f;
  }

  function _soldOnLocal(date,ean){
    const r=REGS[date]&&REGS[date][ean];
    if(r&&r.modtaget!=null&&r.luk!=null)return Math.max(0,r.modtaget-r.luk);
    return null;
  }

  function collectObs(ean,dates){
    const obs=[];
    dates.forEach(date=>{
      const sold=_soldOnLocal(date,ean);
      if(sold==null)return;
      obs.push({date,sold,factors:extractFactors(date)});
    });
    // Berig med AI_Memory outcomes (kan have salgsdata fra ældre perioder)
    AI_MemoryEngine.getOutcomesForVare(ean).forEach(o=>{
      if(obs.find(x=>x.date===o.date))return;// undgå dubletter
      if(o.actual==null)return;
      obs.push({date:o.date,sold:o.actual,factors:o.factors||extractFactors(o.date)});
    });
    return obs;
  }

  function patternConfidence(nWith,nWithout,pct){
    const sampleScore=clamp(Math.min(nWith,nWithout)*4,0,60);
    const effectScore=clamp(Math.abs(pct)*0.7,0,35);
    return Math.round(clamp(20+sampleScore*0.5+effectScore,20,96));
  }

  const FACTOR_LABELS={
    cal_tilbudsavis:'Tilbudsavis',cal_lonweekend:'Lønweekend',cal_vinterferie:'Vinterferie',
    cal_paaskeferie:'Påskeferie',cal_sommerferie:'Sommerferie',cal_efterarsferie:'Efterårsferie',
    cal_juleferie:'Juleferie',cal_helligdag:'Helligdag',cal_turistsaeson:'Turistsæson',
    cal_lokalt:'Lokalt arrangement',lokaltArrangement:'Lokale arrangementer',
    sol:'Sol',regn:'Regn',vind:'Vind',sne:'Sne',varmt:'Temperatur over 20°',koldt:'Temperatur under 5°'
  };

  function describeBinary(key,pct){
    const dir=pct>=0?'øger':'reducerer';
    const abs=Math.abs(pct);
    return`${FACTOR_LABELS[key]||key} ${dir} salget med ${abs}%`;
  }

  function mineBinaryPatterns(obs,navn){
    const patterns=[];
    if(!obs.length)return patterns;
    const boolKeys=Object.keys(obs[0].factors).filter(k=>typeof obs[0].factors[k]==='boolean');
    boolKeys.forEach(key=>{
      const withF=obs.filter(o=>o.factors[key]===true).map(o=>o.sold);
      const withoutF=obs.filter(o=>o.factors[key]===false).map(o=>o.sold);
      if(withF.length<MIN_OBS_WITH||withoutF.length<MIN_OBS_WITHOUT)return;
      const avgWith=avg(withF),avgWithout=avg(withoutF);
      if(avgWithout<=0)return;
      const pct=Math.round(((avgWith-avgWithout)/avgWithout)*100);
      if(Math.abs(pct)<MIN_EFFECT_PCT)return;
      const lastSeen=obs.filter(o=>o.factors[key]===true).map(o=>o.date).sort().slice(-1)[0];
      patterns.push({key,type:'binary',label:describeBinary(key,pct),
        pct,avgWith:round1(avgWith),avgWithout:round1(avgWithout),
        observations:withF.length,totalObservations:obs.length,lastSeen,
        confidence:patternConfidence(withF.length,withoutF.length,pct)});
    });
    return patterns;
  }

  function mineWeekdayPatterns(obs,navn){
    const patterns=[];
    DAY_NAMES.forEach(day=>{
      const withD=obs.filter(o=>o.factors.ugedag===day).map(o=>o.sold);
      const withoutD=obs.filter(o=>o.factors.ugedag!==day).map(o=>o.sold);
      if(withD.length<MIN_OBS_WITH||withoutD.length<MIN_OBS_WITHOUT)return;
      const avgWith=avg(withD),avgWithout=avg(withoutD);
      if(avgWithout<=0)return;
      const pct=Math.round(((avgWith-avgWithout)/avgWithout)*100);
      if(pct<MIN_EFFECT_PCT)return;
      const lastSeen=obs.filter(o=>o.factors.ugedag===day).map(o=>o.date).sort().slice(-1)[0];
      patterns.push({key:'ugedag_'+day,type:'weekday',
        label:`${navn} topper altid ${day.toLowerCase()}`,
        pct,avgWith:round1(avgWith),avgWithout:round1(avgWithout),
        observations:withD.length,totalObservations:obs.length,lastSeen,
        confidence:patternConfidence(withD.length,withoutD.length,pct)});
    });
    return patterns;
  }

  function mine(ean,varenavn,dates){
    const obs=collectObs(ean,dates);
    if(obs.length<MIN_OBS_WITH+MIN_OBS_WITHOUT)
      return{patterns:[],observationCount:obs.length,dataReady:false};
    const patterns=[...mineBinaryPatterns(obs,varenavn),...mineWeekdayPatterns(obs,varenavn)];
    patterns.sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));
    return{patterns,observationCount:obs.length,dataReady:true};
  }

  function trendStatement(ean,varenavn,dates56){
    const obs=collectObs(ean,dates56);
    if(obs.length<14)return null;
    const sorted=obs.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const recent=sorted.slice(-14),earlier=sorted.slice(0,Math.max(0,sorted.length-14)).slice(-28);
    if(recent.length<5||earlier.length<5)return null;
    const avgRecent=avg(recent.map(o=>o.sold)),avgEarlier=avg(earlier.map(o=>o.sold));
    if(avgEarlier<=0)return null;
    const pct=Math.round(((avgRecent-avgEarlier)/avgEarlier)*100);
    if(Math.abs(pct)<8)return null;
    const weeks=Math.max(1,Math.round(recent.length/7));
    const dir=pct>=0?'steget':'faldet';
    return{ean,text:`Salget af ${varenavn} er ${dir} ${Math.abs(pct)}% de seneste ${weeks===1?'uge':weeks+' uger'}.`,pct,weeks};
  }

  function topInsights(varer,dates56){
    const candidates=[];
    varer.forEach(v=>{
      const mined=mine(v.ean,v.navn,dates56);
      mined.patterns.slice(0,2).forEach(p=>{
        candidates.push({
          richText:p.type==='weekday'?p.label:`${v.navn}: ${describeBinary(p.key,p.pct)}.`,
          confidence:p.confidence,abs:Math.abs(p.pct)
        });
      });
      const trend=trendStatement(v.ean,v.navn,dates56);
      if(trend) candidates.push({richText:trend.text,confidence:clamp(40+Math.abs(trend.pct),40,90),abs:Math.abs(trend.pct)});
    });
    candidates.sort((a,b)=>(b.confidence*b.abs)-(a.confidence*a.abs));
    return candidates.filter(c=>c.richText).slice(0,5);
  }

  return{mine,trendStatement,topInsights,extractFactors,describeBinary,FACTOR_LABELS};
})();

/* =====================================================================
   ANALYTICS ENGINE  (nyt i v2.0)
   ---------------------------------------------------------------------
   Sammenstiller alle AI-data til dashboards og rapporter.
   Inkluderer: AI Performance Dashboard, faktor-vigtighed,
   madspild-analyse, servicegrad-udvikling.
   ===================================================================== */
const Analytics_Engine = (function(){

  // Top-5 vigtigste faktorer baseret på absolutværdi af bias-korrektioner
  function getTopFactors(n){
    n=n||5;
    const biases=AI_MemoryEngine.getSystematicBiases();
    const factorCorrs=Learning_Engine.getFactorCorrections();
    const patterns=Pattern_Engine.topInsights(VARER.filter(v=>v.aktiv),periodDates(56));

    const scoreMap={};
    // Fra systematiske biases
    biases.forEach(b=>{
      scoreMap[b.factor]=(scoreMap[b.factor]||0)+Math.abs(b.biasWhenPresent)*2;
    });
    // Fra faktor-korrektioner
    Object.keys(factorCorrs).forEach(k=>{
      scoreMap[k]=(scoreMap[k]||0)+Math.abs(factorCorrs[k]-1)*100;
    });
    // Fra mønstre (højt konfidens-mønster = vigtig faktor)
    patterns.forEach(p=>{
      if(p.richText) scoreMap['patterns']=(scoreMap['patterns']||0)+p.abs*0.5;
    });

    const LABELS=Pattern_Engine.FACTOR_LABELS;
    return Object.entries(scoreMap)
      .filter(([k])=>k!=='patterns')
      .sort((a,b)=>b[1]-a[1])
      .slice(0,n)
      .map(([k,score])=>({key:k,label:LABELS[k]||k,score:Math.round(score)}));
  }

  // Madspild-analyse: dage med høj rest ved luk
  function getWasteAnalysis(dates){
    const aktive=VARER.filter(v=>v.aktiv);
    let totalSpild=0,totalSolgt=0,spildDage=0,dageTotal=0;
    dates.forEach(date=>{
      const day=REGS[date];
      if(!day)return;
      let anyReg=false;
      aktive.forEach(v=>{
        const r=day[v.ean];
        if(!r||r.modtaget==null)return;
        anyReg=true;
        if(r.luk!=null){
          totalSpild+=r.luk;
          totalSolgt+=Math.max(0,r.modtaget-r.luk);
          if(r.luk>2)spildDage++;
        }
      });
      if(anyReg)dageTotal++;
    });
    const spildPct=totalSolgt+totalSpild>0?Math.round((totalSpild/(totalSolgt+totalSpild))*100):null;
    return{totalSpild,totalSolgt,spildDage,dageTotal,spildPct};
  }

  // Servicegrad pr. dag
  function getServicegradTrend(dates){
    const aktive=VARER.filter(v=>v.aktiv);
    const pmp=getPrimaertMP();
    const pmpField=mpFieldKey(pmp);
    const trend=[];
    dates.forEach(date=>{
      const day=REGS[date];
      if(!day){trend.push(null);return;}
      let total=0,withStock=0;
      aktive.forEach(v=>{
        const r=day[v.ean];
        if(!r)return;
        const val=r[pmpField]??(pmpField==='mp_kl13'?r.kl13:null);
        if(val!=null){total++;if(val>0)withStock++;}
      });
      trend.push(total>0?Math.round((withStock/total)*100):null);
    });
    return trend;
  }

  // Saml alt til AI Performance Summary
  function getPerformanceSummary(){
    const accuracy=AI_MemoryEngine.getOverallAccuracy();
    const mape=AI_MemoryEngine.getMAPE();
    const learningCount=AI_MemoryEngine.getLearningCount();
    const byConf=AI_MemoryEngine.getAccuracyByConfidence();
    const trend=AI_MemoryEngine.getAccuracyTrend(7);
    const topFactors=getTopFactors(5);
    const waste=getWasteAnalysis(periodDates(14));
    const sufficient=AI_MemoryEngine.hasSufficientData();
    const mpSuggestion=AI_MemoryEngine.shouldSuggestExtraMP();
    const byWeekday=AI_MemoryEngine.getAccuracyByWeekday();
    const biases=AI_MemoryEngine.getSystematicBiases();
    return{accuracy,mape,learningCount,byConf,trend,topFactors,waste,sufficient,mpSuggestion,byWeekday,biases};
  }

  return{getTopFactors,getWasteAnalysis,getServicegradTrend,getPerformanceSummary};
})();


/* ---------- DB migration + load/save ---------- */
const CURRENT_DB_VERSION=2;
const MIGRATIONS={
  2:function(){
    let changed=false;
    Object.keys(REGS).forEach(date=>{
      const dayRegs=REGS[date];
      if(!dayRegs||typeof dayRegs!=='object')return;
      Object.keys(dayRegs).forEach(ean=>{
        if(ean.startsWith('_'))return;
        const r=dayRegs[ean];
        if(!r||typeof r!=='object')return;
        if(r.kl13!=null&&r['mp_kl13']==null){r['mp_kl13']=r.kl13;changed=true;}
      });
    });
    return changed;
  }
};
async function runMigrations(){
  let fromVersion=parseInt(storageGet('dbversion')||'1',10);
  if(isNaN(fromVersion)||fromVersion<1)fromVersion=1;
  let anyChange=false;
  for(let v=fromVersion+1;v<=CURRENT_DB_VERSION;v++){
    if(typeof MIGRATIONS[v]==='function'){
      try{const changed=MIGRATIONS[v]();if(changed)anyChange=true;}
      catch(e){console.error('Migration til v'+v+' fejlede:',errMsg(e));}
    }
  }
  if(anyChange)await saveRegs();
  storageSet('dbversion',String(CURRENT_DB_VERSION));
}

async function loadAll(){
  let varerKeyExisted=false;
  try{const v=storageGet('varer');varerKeyExisted=(v!==undefined&&v!==null);VARER=v?JSON.parse(v):[];}
  catch(e){VARER=[];}
  try{const r=storageGet('registreringer');REGS=r?JSON.parse(r):{};}
  catch(e){REGS={};}

/* ---------- AI Memory auto-recording ----------
   Når luk-registrering gemmes, tjekker vi om alle målepunkter er udfyldte
   for alle varer. Hvis ja, beregner vi forecast vs. faktisk og gemmer i AI Memory. */
async function tryRecordAIOutcomes(date){
  const aktive=VARER.filter(v=>v.aktiv);
  const mps=getMalepunkter(true);
  const dates56=periodDates(56).filter(d=>d<date);
  aktive.forEach(v=>{
    const r=REGS[date]&&REGS[date][v.ean];
    if(!r)return;
    // Tjek at luk er registreret (primær trigger)
    if(r.luk==null)return;
    if(r.modtaget==null)return;
    const actual=Math.max(0,r.modtaget-r.luk);
    // Byg mpData snapshot
    const mpData={};
    mps.forEach(mp=>{
      const key=mpFieldKey(mp);
      mpData[mp.id]=r[key]!==undefined?r[key]:null;
    });
    // Forecast
    let forecastVal=0;
    let confLabel='Lav';
    try{
      if(dates56.length>=3){
        const factors=Pattern_Engine.extractFactors(date);
        const f=computeForecast(v.ean,date,dates56);
        forecastVal=f.anbefalet;
        const conf=Confidence_Engine.compute(v.ean,f.quality,factors);
        confLabel=conf.label;
        // Gem outcome
        AI_MemoryEngine.recordOutcome(date,v.ean,forecastVal,actual,factors,confLabel,mpData);
        if(_syncEnabled){
          const outcome = AI_MemoryEngine.getOutcomesForVare(v.ean).find(o=>o.date===date);
          if(outcome) DeviceSync.saveAIMemory(date,v.ean,outcome).catch(()=>{});
        }
      }
    }catch(e){console.error('tryRecordAIOutcomes:',errMsg(e));}
  });
}

const FreshScanCamera=(function(){

    if(stream){try{stream.getTracks().forEach(t=>t.stop());}catch(e){}stream=null;}

];
const FERIE_KEYS=['vinterferie','paaskeferie','sommerferie','efterarsferie','juleferie'];
function getDayTags(date){if(!REGS[date])REGS[date]={};if(!REGS[date]._tags)REGS[date]._tags={};return REGS[date]._tags;}
function getDayWeather(date){

function easterSunday(year){
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  return new Date(Date.UTC(year,month-1,day));
}
function addDays(date,n){const d=new Date(date);d.setUTCDate(d.getUTCDate()+n);return d;}
function dISO(d){return d.toISOString().slice(0,10);}
const _autoCalCache={};
function getAutoCalendarYear(year){
  if(_autoCalCache[year])return _autoCalCache[year];
  const easter=easterSunday(year);
  const holidays={};
  holidays[dISO(new Date(Date.UTC(year,0,1)))]='Nytårsdag';
  holidays[dISO(addDays(easter,-3))]='Skærtorsdag';
  holidays[dISO(addDays(easter,-2))]='Langfredag';
  holidays[dISO(easter)]='Påskedag';
  holidays[dISO(addDays(easter,1))]='2. påskedag';
  holidays[dISO(addDays(easter,39))]='Kristi Himmelfartsdag';
  holidays[dISO(addDays(easter,49))]='Pinsedag';
  holidays[dISO(addDays(easter,50))]='2. pinsedag';
  holidays[dISO(new Date(Date.UTC(year,11,25)))]='Juledag';
  holidays[dISO(new Date(Date.UTC(year,11,26)))]='2. juledag';
  const paaskeferieStart=addDays(easter,-10);
  const ferieRanges={
    vinterferie:[dISO(new Date(Date.UTC(year,1,10))),dISO(new Date(Date.UTC(year,1,18)))],
    paaskeferie:[dISO(paaskeferieStart),dISO(addDays(easter,1))],
    sommerferie:[dISO(new Date(Date.UTC(year,5,24))),dISO(new Date(Date.UTC(year,7,9)))],
    efterarsferie:[dISO(new Date(Date.UTC(year,9,14))),dISO(new Date(Date.UTC(year,9,22)))],
    juleferie:[dISO(new Date(Date.UTC(year,11,21))),dISO(new Date(Date.UTC(year+1,0,2)))],
  };
  const result={holidays,ferieRanges};
  _autoCalCache[year]=result;
  return result;
}
function inRange(iso,range){return iso>=range[0]&&iso<=range[1];}
function getAutoTags(date){
  const d=isoToUTCDate(date);const year=d.getUTCFullYear();
  const cal=getAutoCalendarYear(year);const calPrev=getAutoCalendarYear(year-1);
  const tags={};const reasons=[];
  let holidayName=cal.holidays[date];if(!holidayName&&calPrev.holidays[date])holidayName=calPrev.holidays[date];
  if(holidayName){tags.helligdag=true;reasons.push(holidayName);}
  FERIE_KEYS.forEach(key=>{
    if(inRange(date,cal.ferieRanges[key])||inRange(date,calPrev.ferieRanges[key])){
      tags[key]=true;
      const labels={vinterferie:'vinterferie',paaskeferie:'påskeferie',sommerferie:'sommerferie',efterarsferie:'efterårsferie',juleferie:'juleferie'};
      reasons.push(labels[key]);
    }
  });
  const dow=d.getUTCDay();const lastDayOfMonth=new Date(Date.UTC(year,d.getUTCMonth()+1,0)).getUTCDate();
  if((dow===5||dow===6||dow===0)&&d.getUTCDate()>=lastDayOfMonth-6){tags.lonweekend=true;reasons.push('lønweekend');}
  const month=d.getUTCMonth()+1;
  const turistMonths=(SETTINGS.turistMonths&&SETTINGS.turistMonths.length)?SETTINGS.turistMonths:[6,7,8];
  if(turistMonths.includes(month)){tags.turistsaeson=true;reasons.push('turistsæson');}
  return{tags,reasons};
}
function getEffectiveTags(date){
  const auto=getAutoTags(date);const manual=getDayTags(date);
  const effective={};const reasons={auto:[],manual:[]};const autoActiveKeys=[];
  CAL_TAGS.forEach(t=>{
    const autoVal=!!auto.tags[t.key];if(autoVal)autoActiveKeys.push(t.key);
    if(Object.prototype.hasOwnProperty.call(manual,t.key)){effective[t.key]=!!manual[t.key];if(manual[t.key])reasons.manual.push(t.label);}
    else effective[t.key]=autoVal;
  });
  if(auto.reasons.length)reasons.autoText=auto.reasons.join(', ');
  return{tags:effective,reasons,autoActiveKeys};
}

function getActiveEvents(date){

    const countryCode=COUNTRY_CODES[(SETTINGS.land||'Danmark').trim().toLowerCase()]||'';
    if(best===results[0]&&countryCode){const ccMatch=results.find(r=>r.country_code===countryCode);if(ccMatch)best=ccMatch;}

const WEATHER_VAR_SETS=['temperature_2m_max,precipitation_sum,wind_speed_10m_max,snowfall_sum,weather_code','temperature_2m_max,precipitation_sum,windspeed_10m_max,snowfall_sum,weathercode'];
async function fetchAutoWeather(date){
  WEATHER_DEBUG.temp=null;WEATHER_DEBUG.currentTemp=null;WEATHER_DEBUG.weathercode=null;WEATHER_DEBUG.auto=null;
  const ok=await geocodeStore();if(!ok){WEATHER_DEBUG.auto=false;return false;}
  const daysFromToday=Math.round((new Date(date+"T00:00:00Z")-new Date(todayISO()+"T00:00:00Z"))/86400000);
  const useArchive=daysFromToday<-92;
  const base=useArchive?'https://archive-api.open-meteo.com/v1/archive':'https://api.open-meteo.com/v1/forecast';
  const includeCurrent=!useArchive&&date===todayISO();
  let lastError='',lastUrl='';
  for(const vars of WEATHER_VAR_SETS){
    let url=`${base}?latitude=${SETTINGS.lat}&longitude=${SETTINGS.lon}&start_date=${date}&end_date=${date}&daily=${vars}&timezone=auto`;
    if(includeCurrent)url+=`&current=temperature_2m`;

      const code=d.weathercode?d.weathercode[idx]:(d.weather_code?d.weather_code[idx]:null);
      const flags=weatherCodeFlags(code,precip,snow);
      const currentTemp=(data.current&&data.current.temperature_2m!=null)?data.current.temperature_2m:null;

      WEATHER_DEBUG.temp=w.temp;WEATHER_DEBUG.currentTemp=w.currentTemp;WEATHER_DEBUG.weathercode=w.weathercode;WEATHER_DEBUG.auto=true;
      await saveRegs();await saveLastGoodWeather(date,w,includeCurrent);
      if(_syncEnabled) DeviceSync.saveWeather(date,{temp:w.temp,currentTemp:w.currentTemp,sol:w.sol,regn:w.regn,vind:w.vind,vindHard:w.vindHard,sne:w.sne,weathercode:w.weathercode}).catch(()=>{});
      return true;

}

/* ---------- FORECAST ENGINE (opgraderet v2.0) ---------- */
function soldOn(date,ean){
  const r=REGS[date]&&REGS[date][ean];
  if(r&&r.modtaget!=null&&r.luk!=null)return Math.max(0,r.modtaget-r.luk);
  return null;
}
function tomorrowISO(){const d=isoToUTCDate(todayISO());d.setUTCDate(d.getUTCDate()+1);return utcDateToISO(d);}
function periodDates(days){return Array.from({length:days},(_,i)=>isoDaysAgo(i));}

function computeForecastRaw(ean,targetDate,dates56){
  const weekday=weekdayName(targetDate);
  const sameWeekday=dates56.filter(d=>weekdayName(d)===weekday).map(d=>soldOn(d,ean)).filter(x=>x!=null);
  // Berig med AI Memory outcomes
  AI_MemoryEngine.getOutcomesForVare(ean).forEach(o=>{
    if(weekdayName(o.date)===weekday&&o.actual!=null&&!dates56.includes(o.date))
      sameWeekday.push(o.actual);
  });
  let basis,quality;
  if(sameWeekday.length>=2){basis=avg(sameWeekday);quality='ok';}
  else{
    const allSold=dates56.map(d=>soldOn(d,ean)).filter(x=>x!=null);
    if(allSold.length>0){basis=avg(allSold);quality='low';}
    else{
      let lastMod=null;
      for(const d of dates56){const r=REGS[d]&&REGS[d][ean];if(r&&r.modtaget!=null){lastMod=r.modtaget;break;}}
      basis=lastMod!=null?lastMod:0;quality='none';
    }
  }
  const{tags,reasons}=getEffectiveTags(targetDate);
  const weather=weatherForDisplay(targetDate).w;
  const factors=[];
  if(tags.lonweekend)factors.push({label:'Lønweekend',pct:0.10});
  if(FERIE_KEYS.some(k=>tags[k]))factors.push({label:'Ferieperiode',pct:0.10});
  if(tags.turistsaeson)factors.push({label:'Turistsæson',pct:0.15});
  if(tags.helligdag)factors.push({label:'Helligdag',pct:0.10});
  if(tags.lokalt)factors.push({label:'Lokalt arrangement',pct:0.10});
  if(weather.regn)factors.push({label:'Regn',pct:0.05});
  if(weather.sol&&weather.temp!=null&&weather.temp>20)factors.push({label:'Sol >20°',pct:0.05});
  if(weather.sne)factors.push({label:'Sne',pct:0.05});
  if(weather.vind&&weather.vindHard)factors.push({label:'Kraftig vind',pct:-0.05});
  const ev=eventFactor(targetDate);
  if(ev&&!tags.lokalt)factors.push({label:`${ev.top.navn} (${IMPACT_LABEL[ev.top.impact]})`,pct:ev.pct});
  const totalPct=factors.reduce((s,f)=>s+f.pct,0);
  const forecast=Math.round(basis*(1+totalPct));
  return{weekday,basis:round1(basis),factors,totalPct,forecast,quality,calReasons:reasons};
}

function computeForecast(ean,targetDate,dates56){
  const raw=computeForecastRaw(ean,targetDate,dates56);
  const activeFactors=Pattern_Engine.extractFactors(targetDate);

  // v2.0: Anvend Learning Engine korrektioner
  const corrResult=Learning_Engine.applyCorrections(raw.basis*(1+raw.totalPct),ean,activeFactors);
  const forecast=Math.max(0,corrResult.corrected);

  // Udsolgt-buffer
  const pmpField=mpFieldKey(getPrimaertMP());
  const last7=dates56.slice(0,7);
  const kl13zero=last7.filter(d=>{const r=REGS[d]&&REGS[d][ean];if(!r)return false;const val=r[pmpField]??(pmpField==='mp_kl13'?r.kl13:null);return val===0;}).length;
  const buffer=kl13zero>=2?1:0;
  const anbefalet=forecast+buffer;

  // v2.0: Kalibreret konfidens
  const confidence=Confidence_Engine.compute(ean,raw.quality,activeFactors);

  const risk=stockoutRisk(ean,dates56);
  return{...raw,forecast,anbefalet,buffer,kl13zero,learning:corrResult,confidence,risk,activeFactors};
}

function stockoutRisk(ean,dates56){
  const pmp=getPrimaertMP();const pmpField=mpFieldKey(pmp);
  const days28=dates56.slice(0,28);let zero=0,total=0;
  days28.forEach(d=>{
    const r=REGS[d]&&REGS[d][ean];if(!r)return;
    const val=r[pmpField]??(pmpField==='mp_kl13'?r.kl13:null);
    if(val!=null){total++;if(val===0)zero++;}
  });
  if(!total)return{level:'Lav',sharePct:0};
  const share=zero/total;
  return{level:share>=0.4?'Høj':(share>=0.15?'Mellem':'Lav'),sharePct:Math.round(share*100)};
}

function forecastExplanation(v,f){
  if(f.quality==='none')return`Ingen historik for ${v.navn} – forslaget er baseret på seneste registrering.`;
  const parts=[];
  if(!f.factors.length)parts.push(`historikken for ${f.weekday.toLowerCase()} viser et gennemsnitligt salg på ${f.basis} stk.`);
  else{
    const factorTxt=f.factors.map(fa=>{const p=Math.round(fa.pct*100);return`${fa.label} ${p>=0?'+':''}${p}%`;}).join(', ');
    parts.push(`${f.weekday.toLowerCase()} med ${factorTxt}, historik: ${f.basis} stk. i snit.`);
  }
  if(f.buffer>0)parts.push(`+1 stk. buffer (udsolgt ${f.kl13zero} gange på 7 dage).`);
  if(f.learning&&f.learning.totalAdjustment!==0){
    const p=f.learning.totalAdjustment;
    parts.push(`AI læringskorr. ${p>=0?'+':''}${p}% (${f.learning.vareCorr.samples} datapunkter).`);
  }
  return parts.join(' ');
}

/* ---------- Summarize ---------- */
function isoWeek(date){
  const d=new Date(Date.UTC(date.getUTCFullYear(),date.getUTCMonth(),date.getUTCDate()));
  const dayNum=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-dayNum+3);
  const firstThursday=new Date(Date.UTC(d.getUTCFullYear(),0,4));
  const diff=(d-firstThursday)/86400000;return 1+Math.round(diff/7);
}
function summarize(ean,dates){
  const pmp=getPrimaertMP();const pmpField=mpFieldKey(pmp);
  let mod=[],pmpVals=[],luk=[],pmpZero=0,restDays=0;
  dates.forEach(date=>{
    const r=REGS[date]&&REGS[date][ean];if(!r)return;
    if(r.modtaget!=null)mod.push(r.modtaget);
    const pmpVal=r[pmpField]??(pmpField==='mp_kl13'?r.kl13:null);
    if(pmpVal!=null){pmpVals.push(pmpVal);if(pmpVal===0)pmpZero++;}
    if(r.luk!=null){luk.push(r.luk);if(r.luk>0)restDays++;}
  });
  return{gnsModtaget:round1(avg(mod)),gnsKl13:round1(avg(pmpVals)),gnsLuk:round1(avg(luk)),kl13zero:pmpZero,restDays,regDays:dates.filter(d=>REGS[d]&&REGS[d][ean]).length,pmpLabel:pmp.label};
}
function vareTrend(ean,dates14){
  const recent=dates14.slice(0,7),older=dates14.slice(7,14);
  function gnsSalg(ds){let sold=[];ds.forEach(date=>{const r=REGS[date]&&REGS[date][ean];if(r&&r.modtaget!=null&&r.luk!=null)sold.push(r.modtaget-r.luk);});return avg(sold);}
  const a=gnsSalg(recent),b=gnsSalg(older);
  if(b===0&&a===0)return{arrow:'→',label:'stabil'};if(b===0)return{arrow:'↑',label:'stigende efterspørgsel'};
  const pct=(a-b)/b;
  if(pct>0.1)return{arrow:'↑',label:'stigende efterspørgsel'};if(pct<-0.1)return{arrow:'↓',label:'faldende efterspørgsel'};
  return{arrow:'→',label:'stabil'};
}

let reportDate=todayISO();
function buildReportData(date){

  const rows=aktive.map(v=>{const r=getReg(date,v.ean);return{navn:v.navn,cells:mps.map(mp=>({label:mp.label,val:r[mpFieldKey(mp)]})),kommentar:r.kommentar||'',harFoto:!!r.foto};});

}
function renderReports(){

  $('#reportShare').addEventListener('click',async()=>{
    const text=`FreshScan AI – ${SETTINGS.kundeNavn||SETTINGS.butiksnavn} – ${fmtDateDK(reportDate)}\n`+data.rows.map(r=>`${r.navn}: `+r.cells.map(c=>`${c.label} ${c.val??'–'}`).join(', ')).join('\n');
    if(navigator.share)try{await navigator.share({title:'FreshScan-rapport',text});}catch(e){}
